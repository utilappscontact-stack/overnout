window.playerBet = function(action) {
  if(action==='raise') {
    _pendingRaise+=10;
    const se=document.getElementById('bet-side-val'); if(se)se.textContent=_pendingRaise;
    const ce=document.getElementById('bet-raise-counter');
    if(ce){ce.style.color='var(--green)';ce.textContent=`Your raise: 🪙${_pendingRaise} — AI must call or fold`;}
    const rb=document.getElementById('bet-raise-btn');
    if(rb&&G.coins.player<_pendingRaise+10) rb.disabled=true;
    return;
  }
  const actEl=document.getElementById('bet-actions');
  if(actEl) actEl.querySelectorAll('button').forEach(b=>b.disabled=true);
  if(action==='skip'||_pendingRaise===0){_pendingBet=null;_closeBetAndResolve();return;}
  const raiseAmt=Math.min(_pendingRaise,G.coins.player);
  G.coins.player-=raiseAmt;
  _pendingBet={sideAmt:raiseAmt};
  const ce=document.getElementById('bet-raise-counter');
  if(ce){ce.className='bet-ai-response thinking';ce.textContent='🤖 AI is deciding…';}
  setTimeout(()=>_aiRespondToRaise(raiseAmt),900);
};

function _aiRespondToRaise(raiseAmt) {
  const isPlayerBatting=G.currentInnings===1;
  const batterCard=isPlayerBatting?G.playerCard:G.aiCard;
  const bowlerCard=isPlayerBatting?G.aiCard:G.playerCard;
  const shot=isPlayerBatting?G.playerChoice:G.aiChoice;
  const delivery=isPlayerBatting?G.aiChoice:G.playerChoice;
  const matchMod=getMatchupMod(delivery,shot,G.pitch,_pendingHomeGround,bowlerCard);
  const expectedDiff=batterCard.rating+matchMod-bowlerCard.rating;
  const isAIBatting=!isPlayerBatting;
  let callProb=isAIBatting
    ?(expectedDiff>=2?0.78:expectedDiff>=0?0.52:0.22)
    :(expectedDiff<=-2?0.78:expectedDiff<=0?0.52:0.22);
  if(G.coins.ai<raiseAmt) callProb=0;
  const willCall=Math.random()<callProb;
  const ce=document.getElementById('bet-raise-counter');
  if(!willCall) {
    G.coins.player+=raiseAmt;
    G.coinLog.push({type:'bluff-success',ball:getCurrentInn().balls+1,inn:G.currentInnings,winner:'player',amount:0});
    if(ce){ce.className='bet-ai-response fold-resp';ce.textContent='🤖 AI FOLDS — your coins refunded. Side bet off.';}
    _pendingBet=null;
    setTimeout(_closeBetAndResolve,950);
  } else {
    const aiC=Math.min(raiseAmt,G.coins.ai);
    G.coins.ai-=aiC;
    G.ballSidePot=raiseAmt+aiC;
    _pendingBet={sideAmt:raiseAmt,aiAmt:aiC,total:G.ballSidePot};
    const se=document.getElementById('bet-side-val'); if(se)se.textContent=G.ballSidePot;
    if(ce){ce.className='bet-ai-response call-resp';ce.textContent=`🤖 AI CALLS — side pot 🪙${G.ballSidePot}!`;}
    setTimeout(_closeBetAndResolve,950);
  }
}

function _closeBetAndResolve() {
  const ov=document.getElementById('bet-overlay');
  if(ov)ov.remove();
  runDiceAnimation(_pendingHomeGround);
}

function payoutBallSidePot(outcome) {
  if(!_pendingBet||!_pendingBet.total){_pendingBet=null;return;}
  const isPlayerBatting=G.currentInnings===1;
  const batterWins=['SIX','FOUR','TWO','ONE'].includes(outcome);
  const playerWins=isPlayerBatting?batterWins:!batterWins;
  const pot=_pendingBet.total;
  if(playerWins){G.coins.player+=pot;}else{G.coins.ai+=pot;}
  G.coinLog.push({type:'side-ball',ball:getCurrentInn().balls,inn:G.currentInnings,outcome,winner:playerWins?'player':'ai',amount:pot});
  G.ballSidePot=0;_pendingBet=null;
}

function settleOverPot() {
  if(!G.overPot) return;
  let playerWins;
  if(G.currentInnings===1){playerWins=true;}
  else{playerWins=G.inn2.runs<G.inn1.runs+1;}
  if(playerWins){G.coins.player+=G.overPot;}else{G.coins.ai+=G.overPot;}
  G.coinLog.push({type:'over-settle',inn:G.currentInnings,winner:playerWins?'player':'ai',amount:G.overPot});
  G.overPot=0;
}


function runDiceAnimation(homeGround) {
  const isPlayerBatting = G.currentInnings===1;
  const batterCard = isPlayerBatting ? G.playerCard : G.aiCard;
  const bowlerCard = isPlayerBatting ? G.aiCard : G.playerCard;
  const shot       = isPlayerBatting ? G.playerChoice : G.aiChoice;
  const delivery   = isPlayerBatting ? G.aiChoice : G.playerChoice;

  const app = document.getElementById('app');
  const overlay = document.createElement('div');
  overlay.id = 'dice-overlay';
  overlay.className = 'dice-overlay';
  overlay.innerHTML = buildDiceOverlayHTML(batterCard, bowlerCard, shot, delivery, homeGround);
  app.appendChild(overlay);

  let bDice=0, wDice=0;
  const bEl = document.getElementById('die-batter');
  const wEl = document.getElementById('die-bowler');

  const rollInterval = setInterval(()=>{
    bEl.textContent = rollDie();
    wEl.textContent = rollDie();
  }, 80);

  setTimeout(()=>{
    clearInterval(rollInterval);
    bDice = rollDie();
    wDice = rollDie();
    bEl.textContent = bDice;
    wEl.textContent = wDice;
    bEl.classList.add('settled');
    wEl.classList.add('settled');

    const playerDRS = G.playerPower?.id==='drs' && G.playerPowerDeclared && !G.playerPowerUsed;
    const aiDRS = G.aiPower?.id==='drs' && G.aiPowerDeclared && !G.aiPowerUsed;
    const rerollBatter = (isPlayerBatting && aiDRS) || (!isPlayerBatting && playerDRS);
    const rerollBowler = (isPlayerBatting && playerDRS) || (!isPlayerBatting && aiDRS);
    const doDRS = rerollBatter || rerollBowler;

    if(doDRS) {
      if(playerDRS) G.playerPowerUsed=true;
      if(aiDRS) G.aiPowerUsed=true;
      setTimeout(()=>{
        const drsNotice = document.getElementById('drs-notice');
        if(drsNotice) drsNotice.style.display='block';
        const rerollEl = rerollBatter ? bEl : wEl;
        rerollEl.classList.remove('settled');
        rerollEl.classList.add('drs-flash','rolling');
        const drsInterval = setInterval(()=>{ rerollEl.textContent=rollDie(); },80);
        setTimeout(()=>{
          clearInterval(drsInterval);
          const newVal = rollDie();
          rerollEl.textContent = newVal;
          rerollEl.classList.remove('rolling','drs-flash');
          rerollEl.classList.add('settled');
          if(rerollBatter) bDice=newVal; else wDice=newVal;
          finalizeBall(bDice, wDice, batterCard, bowlerCard, shot, delivery, homeGround);
        }, 600);
      }, 500);
    } else {
      setTimeout(()=>{
        finalizeBall(bDice, wDice, batterCard, bowlerCard, shot, delivery, homeGround);
      }, 400);
    }
  }, 1000);
}

  const playerDRS = G.playerPower?.id==='drs' && G.playerPowerDeclared;
  const aiDRS = G.aiPower?.id==='drs' && G.aiPowerDeclared;

    <div class="do-reveal-row">

        <div class="do-choice">${shot}</div>
      </div>
      <div class="do-rcard bowler">
        <div class="do-role">BOWLER</div>
        <div class="do-cname">${bowlerCard.name}</div>
        <div class="do-rating">★${bowlerCard.rating}</div>
        <div class="do-choice">${delivery}</div>
      </div>
    </div>
    <div class="dice-pair">
      <div class="die-wrap">
        <div class="die-label">BATTER DIE</div>

      </div>

      </div>
    </div>
    ${hasDRS?`<div class="drs-notice" id="drs-notice" style="display:none">⚖️ DRS REVIEW — REROLLING!</div>`:''}
  `;
}

const homeGroundRef = { val: false };

function finalizeBall(bDice, wDice, batterCard, bowlerCard, shot, delivery, homeGround) {
  const inn = getCurrentInn();
  const overBall = (inn.balls % 6) + 1;
  const prevOutcome = inn.ballLog.length > 0 ? inn.ballLog[inn.ballLog.length-1].outcome : null;
  const prevShot    = inn.ballLog.length > 0 ? inn.ballLog[inn.ballLog.length-1].shot : null;
  const prevDelivery= inn.ballLog.length > 0 ? inn.ballLog[inn.ballLog.length-1].delivery : null;
  const batterBallsPlayed = inn.batterBallsPlayed || 0;
  const isPlayerBatting = G.currentInnings===1;

  // Handle extraDie: roll extra, use higher (for batter or bowler)
  if(batterCard.special==='extraDie') {
    const extra = rollDie();
    if(extra > bDice) bDice = extra;
  }
  if(bowlerCard.special==='extraDie') {
    const extra = rollDie();
    if(extra > wDice) wDice = extra;
  }

  const result = resolveBall({
    batterCard, shot, bowlerCard, delivery,
    batterDice: bDice, bowlerDice: wDice,
    pitch: G.pitch, homeGround,
    overBall, prevOutcome, batterBallsPlayed,
    prevShot, prevDelivery,
  });

  // Capture powers used this ball (before state reset)
  result.playerPowerThisBall = (G.playerPowerDeclared && G.playerPower && G.playerPower.id!=='captainsCall')
    ? G.playerPower : null;
  result.aiPowerThisBall = (G.aiPowerDeclared && G.aiPower && G.aiPower.id!=='captainsCall')
    ? G.aiPower : null;

  // Mark anchor / nightwatchman if it fired
  if(result.anchorSaved) batterCard._anchorFired = true;

  // Track delivery/shot usage
  inn.deliveriesUsed[delivery] = (inn.deliveriesUsed[delivery]||0)+1;
  inn.shotsUsed[shot] = (inn.shotsUsed[shot]||0)+1;

  // Update bouncer chips
  if(delivery==='Bouncer') inn.bouncerChips = Math.max(0, inn.bouncerChips-1);

  // Update innings stats
  inn.runs += result.runs;
  if(result.isWicket) inn.wickets++;
  inn.balls++;
  inn.batterBallsPlayed = (inn.batterBallsPlayed||0) + 1;

  // Log this ball — include shot/delivery for pattern read system
  inn.ballLog.push({ ball: inn.balls, outcome: result.outcome, runs: result.runs,
                     shot: result.shot, delivery: result.delivery });

  // Remove played cards from hands (marks _played=true, stores outcome)
  const pCard = G.playerCard, aCard = G.aiCard;
  removeCardFromHand(isPlayerBatting ? G.pBatHand : G.pBowlHand, pCard.id);
  removeCardFromHand(isPlayerBatting ? G.aiBowlHand : G.aiBatHand, aCard.id);
  // Store outcome on the played card for visual feedback
  const pHandRef = (isPlayerBatting ? G.pBatHand : G.pBowlHand).find(c=>c.id===pCard.id);
  if(pHandRef) pHandRef._playedOutcome = result.outcome;

  // Reset per-ball selections
  G.playerCard = null;
  G.playerChoice = null;
  G.playerPowerDeclared = false;
  G.captainCallActive = false;
  G.aiCard = null;
  G.aiChoice = null;
  G.aiPowerDeclared = false;
  G.lastResult = result;
  G.batterDice = bDice;
  G.bowlerDice = wDice;

  // Show result overlay
  const diceOv = document.getElementById('dice-overlay');
  if(diceOv) diceOv.remove();

  // Settle per-ball side pot
  payoutBallSidePot(result.outcome);

  showResultOverlay(result);
}

function showResultOverlay(result) {
  const app = document.getElementById('app');
  const ov = document.createElement('div');
  ov.id = 'result-overlay';
  ov.className = 'result-overlay';
  ov.onclick = dismissResult;
  ov.innerHTML = buildResultHTML(result);
  app.appendChild(ov);
  // No auto-dismiss — player must tap to continue
}

function buildBallTracker(inn) {
  const icons = { SIX:'🟡', FOUR:'🟢', TWO:'⚪', ONE:'⚪', DOT:'⚫', PRESSURE:'🔴', WICKET:'💀' };
  const dots = [];
  for(let i=0;i<6;i++) {
    const logged = inn.ballLog[i];
    if(logged) {
      dots.push(`<div class="bt-dot filled" title="${logged.outcome}">${icons[logged.outcome]||'⚪'}</div>`);
    } else {
      dots.push(`<div class="bt-dot empty">○</div>`);
    }
  }
  return `<div class="ball-tracker">${dots.join('')}</div>`;
}

function buildResultHTML(result) {
  const outLabels = {
    SIX:'SIX!', FOUR:'FOUR!', TWO:'2 RUNS', ONE:'1 RUN',
    DOT:'DOT BALL', PRESSURE:'PRESSURE!', WICKET:'WICKET!'
  };

  const isPlayerBatting = G.currentInnings === 1;
  const inn = getCurrentInn();
  const batterOwner = isPlayerBatting ? 'YOU' : 'AI';
  const bowlerOwner = isPlayerBatting ? 'AI' : 'YOU';

  const bDiceMod = result.bDiceMod;
  const wDiceMod = result.wDiceMod;
  const bDiceStr = bDiceMod > 0 ? '+1' : bDiceMod < 0 ? '−1' : '±0';
  const wDiceStr = wDiceMod > 0 ? '+1' : wDiceMod < 0 ? '−1' : '±0';
  const matchModStr = result.matchupMod >= 0 ? `+${result.matchupMod}` : String(result.matchupMod);
  const diffSign = result.difference >= 0 ? '+' : '';

  let thresholdDesc;
  const d = result.difference;
  if(d>=4)       thresholdDesc = `${diffSign}${d} ≥ +4 → SIX 🏏`;
  else if(d>=2)  thresholdDesc = `${diffSign}${d} ≥ +2 → FOUR 🔥`;
  else if(d>=1)  thresholdDesc = `${diffSign}${d} ≥ +1 → 2 Runs`;
  else if(d===0) thresholdDesc = `0 = 0 → 1 Run`;
  else if(d>=-2) thresholdDesc = `${d} ≥ −2 → Dot Ball`;
  else if(d>=-3) thresholdDesc = `${d} ≥ −3 → Pressure`;
  else           thresholdDesc = `${d} < −3 → Wicket 💀`;

  const specialNote = (result.anchorSaved || result.specialNote)
    ? `<div class="res-special">${result.anchorSaved?'⚓':'⚡'} ${result.specialNote||'Saved!'}</div>`
    : '';

  // Balance mechanic note (pattern read, yorker misfire, etc.)
  const balanceNoteHTML = result.balanceNote
    ? `<div class="res-balance">${result.balanceNote}</div>`
    : '';

  // Power badges
  const powerBadges = [];
  if(result.playerPowerThisBall) powerBadges.push(`YOU: ${result.playerPowerThisBall.icon} ${result.playerPowerThisBall.name}`);
  if(result.aiPowerThisBall)     powerBadges.push(`AI: ${result.aiPowerThisBall.icon} ${result.aiPowerThisBall.name}`);
  const powerHTML = powerBadges.length
    ? `<div class="res-power-used">${powerBadges.map(b=>`<div class="res-power-badge">⚡ ${b}</div>`).join('')}</div>`
    : '';

  // Coin feedback
  const lastCoin = G.coinLog.length ? G.coinLog[G.coinLog.length-1] : null;
  let chipFeedbackHTML = '';
  if(lastCoin && lastCoin.type==='side-ball' && lastCoin.amount>0) {
    const won = lastCoin.winner==='player';
    chipFeedbackHTML = `<div style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;
      background:${won?'rgba(74,222,128,0.1)':'rgba(230,57,70,0.08)'};
      border:1px solid ${won?'rgba(74,222,128,0.3)':'rgba(230,57,70,0.25)'};
      color:${won?'var(--green)':'var(--red)'};text-align:center">
      ${won?'🪙 Side pot WON':'🪙 Side pot LOST'} (${lastCoin.amount}) — You: 🪙${G.coins.player} AI: 🪙${G.coins.ai}
    </div>`;
  }

  // Star display helper
  const starStr = r => '★'.repeat(Math.max(1,Math.min(5,r)));

  // Bat special label
  const batSpecialLabel = result.batSpecial > 0 && result.batterCard.special
    ? SPECIAL_LABELS[result.batterCard.special] || result.batterCard.special
    : null;
  const bowlSpecialLabel = result.bowlSpecial > 0 && result.bowlerCard.special
    ? SPECIAL_LABELS[result.bowlerCard.special] || result.bowlerCard.special
    : null;

  const tracker = buildBallTracker(inn);

  return `
    ${tracker}
    ${powerHTML}

    <!-- TWO CARD THUMBNAILS -->
    <div class="res-card-row">
      <div class="res-player-card batter">
        <div class="res-pc-role bat">🏏 ${batterOwner} — BATTER</div>
        <div class="res-pc-name">${result.batterCard.name}</div>
        <div class="res-pc-rating">${starStr(result.bRating)} <span style="font-size:12px;color:var(--muted)">(${result.bRating}${result.bRating !== result.batterCard.rating ? ' buffed' : ''})</span></div>
        ${batSpecialLabel ? `<div class="res-pc-special">${batSpecialLabel} +${result.batSpecial}</div>` : ''}
        <div class="res-pc-action">${dispName(result.shot)}</div>
      </div>
      <div class="res-vs-col">VS</div>
      <div class="res-player-card bowler">
        <div class="res-pc-role bowl">🎳 ${bowlerOwner} — BOWLER</div>
        <div class="res-pc-name">${result.bowlerCard.name}</div>
        <div class="res-pc-rating">${starStr(result.wRating)} <span style="font-size:12px;color:var(--muted)">(${result.wRating}${result.wRating !== result.bowlerCard.rating ? ' buffed' : ''})</span></div>
        ${bowlSpecialLabel ? `<div class="res-pc-special">${bowlSpecialLabel} +${result.bowlSpecial}</div>` : ''}
        <div class="res-pc-action">${dispName(result.effectiveDelivery||result.delivery)}${result.effectiveDelivery&&result.effectiveDelivery!==result.delivery?` <span style="font-size:9px;color:var(--red)">(slipped from ${dispName(result.delivery)})</span>`:''}</div>
      </div>
    </div>

    <!-- MATCHUP LINE -->
    <div style="font-size:10px;color:var(--muted);text-align:center;font-weight:700">
      Matchup: ${matchModStr} (${dispName(result.effectiveDelivery||result.delivery)} vs ${dispName(result.shot)})
    </div>

    <!-- DICE -->
    <div class="res-dice-visual">
      <div class="res-die-visual bat">
        <div class="res-die-num">${result.batterDice}</div>
        <div class="res-die-mod">${bDiceStr}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div class="res-die-vs">VS</div>
        <div class="res-arrow">↓</div>
      </div>
      <div class="res-die-visual bowl">
        <div class="res-die-num">${result.bowlerDice}</div>
        <div class="res-die-mod">${wDiceStr}</div>
      </div>
    </div>

    <!-- BIG OUTCOME -->
    <div class="res-outcome-block">
      <div class="res-outcome ${result.outcome}">${outLabels[result.outcome]}</div>
      <div class="res-calc-line">${result.batterTotal} − ${result.bowlerTotal} = ${diffSign}${result.difference}</div>
      <div class="res-thresh-line">${thresholdDesc}</div>
      ${specialNote}
      ${balanceNoteHTML}
    </div>

    ${chipFeedbackHTML}
    <div class="res-commentary">"${result.commentary}"</div>
    <div class="res-skip">TAP ANYWHERE TO CONTINUE →</div>
  `;
}


window.dismissResult = function() {
  const ov = document.getElementById('result-overlay');
  if(!ov) return;
  ov.remove();

  // Refill hands
  refillAfterBall();

  // Check innings end
  const inn = getCurrentInn();
  if(isInnOver(inn)) {
    settleOverPot(); // award over pot to cricket winner
    if(G.currentInnings===1) {
      G.phase = 'inningsSwap';
      render();
    } else {
      G.phase = 'gameEnd';
      render();
    }
  } else {
    render();
  }
};

  G.currentInnings = 2;
  G.playerCard = null; G.playerChoice = null;
  G.aiCard = null; G.aiChoice = null;

};

};

function buildMatrixHint(selected, isPlayerBatting, selectedCard) {
  // BUG 3 FIX: when batting, derive spin/pace from the AI's actual available bowler
  // G.aiCard is null at pick-time, so use best available AI bowler from hand as proxy
  const aiBowlerProxy = isPlayerBatting
    ? (G.aiBowlHand || []).find(c => !c._played) || {spinner:false}
    : null;

  const counters = isPlayerBatting
    ? (aiBowlerProxy && aiBowlerProxy.spinner ? SPIN_DELIVERIES : PACE_DELIVERIES)
    : SHOTS;

  const cells = counters.map(c => {
    const mod = isPlayerBatting
      ? getMatchupMod(c, selected, G.pitch, false, aiBowlerProxy || {spinner:false})
      : getMatchupMod(selected, c, G.pitch, false, selectedCard||{spinner:false});
    const cls = mod>0?'pos':mod<0?'neg':'neu';
    const label = mod>0?`+${mod}`:String(mod);
    const abbr = c.length<=4?c:c.slice(0,4);
    return `<div class="mh-cell">
      <div class="mh-label">${abbr.toUpperCase()}</div>
      <div class="mh-val ${cls}">${label}</div>
    </div>`;
  }).join('');
  return `<div class="matrix-hint">${cells}</div>`;
}

  const target = isPlayerBatting ? '' :
    `<div class="sb-target">TARGET <span>${G.inn1.runs+1}</span></div>`;

  const coinTrend = diff>0?`<div class="sb-chip-lead ahead">+${diff} 🪙</div>`
    :diff<0?`<div class="sb-chip-lead behind">${diff} 🪙</div>`

      ${target}

function buildChoiceButtons(inn, isPlayerBatting, selectedCard, selectedChoice) {
  const choices = isPlayerBatting
    ? SHOTS
    : (selectedCard ? getAvailableDeliveries(selectedCard, inn) : PACE_DELIVERIES);
  const label = isPlayerBatting ? 'SHOT' : 'DELIVERY';
  const isSpin = !isPlayerBatting && selectedCard && selectedCard.spinner;
  const lastShot     = inn.ballLog.length>0 ? inn.ballLog[inn.ballLog.length-1].shot     : null;
  const lastDelivery = inn.ballLog.length>0 ? inn.ballLog[inn.ballLog.length-1].delivery : null;
  const aggressiveShots = ['Slog','StepDown','ReverseScoop','Pull'];

  const btns = choices.map(ch=>{
    const isSel=ch===selectedChoice;
    let capped=false;
    if(isPlayerBatting){
      if(ch==='Slog'         &&(inn.shotsUsed['Slog']        ||0)>=2) capped=true;
      if(ch==='ReverseScoop' &&(inn.shotsUsed['ReverseScoop']||0)>=2) capped=true;
    } else {
      if(ch==='Bouncer'  &&inn.bouncerChips<=0) capped=true;
      if(ch==='Yorker'   &&(inn.deliveriesUsed['Yorker']   ||0)>=2) capped=true;
      if(ch==='Googly'   &&(inn.deliveriesUsed['Googly']   ||0)>=2) capped=true;
      if(ch==='Doosra'   &&(inn.deliveriesUsed['Doosra']   ||0)>=2) capped=true;
      if(ch==='ShortBall'&&(inn.deliveriesUsed['ShortBall']||0)>=3) capped=true;
    }
    const usedCount=isPlayerBatting?(inn.shotsUsed[ch]||0):(inn.deliveriesUsed[ch]||0);
    const hasCap=['Slog','ReverseScoop','Yorker','Bouncer','Googly','Doosra','ShortBall'].includes(ch);
    const dots=hasCap?`<span class="sBtn-dots">${usedCount>=1?'●':'○'}${usedCount>=2?'●':'○'}</span>`:'';

    // Risk/warning badges
    let badge='';
    if(isPlayerBatting){
      if(ch===lastShot && aggressiveShots.includes(ch) && !capped)
        badge=`<span class="sBadge read" title="Repeat aggressive shot — bowler expects it! −1">📖−1</span>`;
    } else {
      if(ch==='FullToss')
        badge=`<span class="sBadge danger" title="Real bowlers don't bowl these. Big gift vs attacking shots.">⚠️</span>`;
      else if(ch==='Yorker')
        badge=`<span class="sBadge warn" title="Dice 1 = misfire becomes Full Toss. High risk/reward.">⚡</span>`;
    }

    return `<button class="sBtn${isSel?' active':''}${capped?' capped':''}${ch==='FullToss'?' ft-risk':''}" onclick="selectChoice('${ch}')" ${capped?'disabled':''}>
      ${dispName(ch)}${dots}${badge}
    </button>`;
  }).join('');
  const hint=selectedChoice?buildMatrixHint(selectedChoice,isPlayerBatting,selectedCard):'';
  return `<div class="shot-label">${isSpin?'🌀 SPIN ':'⚡ '}${label}</div>${btns}
    <div style="grid-column:1/-1">${hint}</div>`;
}

  const selectedCard = G.playerCard;
  const selectedChoice = G.playerChoice;
  const canConfirm = selectedCard && selectedChoice && !G.captainCallActive && G.playerPower;

  // Card preview or hint
  let centerContent;
  if(selectedCard) {
    const specialTag = selectedCard.special
      ? `<div class="hsc-special">${SPECIAL_LABELS[selectedCard.special]||selectedCard.special}</div>` : '';
    centerContent = `
    <div class="hud-selection">
      <div class="hud-selected-card">
        ${(() => {
          const st = getCardStats(selectedCard);
          const isBatter = selectedCard.type === 'batter';
          const keys = isBatter ? ['PWR','TIM','TEC','SPL'] : ['SPD','LNE','VAR','SPL'];

          const barsHTML = keys.map((k,j)=>`
            <div class="hsc-sstat">
              <span class="hsc-sstat-key">${k}</span>
              <div class="hsc-sstat-bar"><div class="hsc-sstat-fill" style="width:${vals[j]}%"></div></div>

            <div><div style="font-size:7px;color:var(--muted);letter-spacing:1px">OVR</div>

            </div>

function renderPowerRail() {
  const p = G.playerPower;
  const slotsHTML = POWERS.map(pw => {
    const isSelected = p && p.id === pw.id;
    // BUG 4 FIX: explicitly check G.playerPowerUsed (persists correctly across innings)
    const isUsed = isSelected && !!G.playerPowerUsed;
    const isDeclared = isSelected && G.playerPowerDeclared && !isUsed;
    const isPickable = !p;

    let cls = 'pr-slot';
    let onclick = '';
    if(!p) { cls += ' pick-me'; onclick = `onclick="selectAndConfirmPower(${POWERS.indexOf(pw)})"` }
    else if(isUsed) { cls += ' used ghost'; }
    else if(isDeclared) { cls += ' declared mine'; onclick = `onclick="declarePower()"`; }
    else if(isSelected) { cls += ' mine'; onclick = `onclick="declarePower()"`; }
    else { cls += ' ghost'; }

    return `<div class="${cls}" ${onclick} title="${pw.name}: ${pw.desc}">
      <div class="pr-icon">${pw.icon}</div>
      <div class="pr-name">${pw.name.split(' ')[0]}</div>
    </div>`;
  }).join('');

  return `
  <div class="power-rail">
    <div class="pr-label">PWR</div>
    ${slotsHTML}
  </div>`;
}

function renderPlayerZone(inn, isPlayerBatting) {
  // Active cards (face-up 6-card grid)
  const activeCards = isPlayerBatting ? G.pBatHand : G.pBowlHand;
  const inactiveCards = isPlayerBatting ? G.pBowlHand : G.pBatHand;
  const inactiveIcon = isPlayerBatting ? '🎳' : '🏏';
  const activeLabel = isPlayerBatting ? 'YOUR BATTERS' : 'YOUR BOWLERS';
  const inactiveLabel = isPlayerBatting ? 'BOWLING NEXT' : 'BATTING NEXT';
  const selectedCardId = G.playerCard?.id;

  const OUTCOME_ICONS  = { SIX:'🟡', FOUR:'🟢', TWO:'⚪', ONE:'⚪', DOT:'⚫', PRESSURE:'🔴', WICKET:'💀' };
  const OUTCOME_LABELS = { SIX:'SIX', FOUR:'FOUR', TWO:'2', ONE:'1', DOT:'•', PRESSURE:'!!', WICKET:'W' };

  const bCardGrid = activeCards.map((c,i) => {
    const isSel = c.id === selectedCardId;
    const isPlayed = c._played;
    const isCaptain = G.captainCallActive;

    if(isPlayed) {
      const oc = c._playedOutcome || 'DOT';
      return `<div class="bcard played">
        <div class="bc-played-result-overlay">
          <div class="bc-played-emoji">${OUTCOME_ICONS[oc]||'⚫'}</div>
          <div class="bc-played-label ${oc}">${OUTCOME_LABELS[oc]||oc}</div>
        </div>
        <div class="bc-played-name">${c.name}</div>
      </div>`;
    }

    const st = getCardStats(c);
    const isBatter = c.type === 'batter';
    const keys = isBatter ? ['PWR','TIM','TEC','SPL'] : ['SPD','LNE','VAR','SPL'];
    const vals = [st.a, st.b, st.c, st.d];
    const statsHTML = `<div class="bc-stats">${keys.map((k,j)=>`
      <div class="bc-stat">
        <span class="bc-stat-key">${k}</span>
        <div class="bc-stat-bar"><div class="bc-stat-bar-fill" style="width:${vals[j]}%"></div></div>
        <span class="bc-stat-val">${vals[j]}</span>
      </div>`).join('')}</div>`;
    const specialTag = c.special ? `<div class="bc-special">${SPECIAL_LABELS[c.special]||c.special}</div>` : '';
    const cls = `bcard tier-${st.tier}${isSel?' selected':''}${isCaptain?' captain-swap':''}`;
    const onclick = isCaptain ? `onclick="captainSwap(${i})"` : `onclick="selectCard(${i})"`;
    return `<div class="${cls}" ${onclick}>
      <div style="display:flex;align-items:flex-start;gap:4px">
        <div><div class="bc-ovr-label">OVR</div><div class="bc-ovr">${st.ovr}</div></div>
        <div style="flex:1;overflow:hidden">
          <div class="bc-name">${c.name}</div>
          <div class="bc-nick">${c.nick||''}</div>
          ${specialTag}
        </div>
      </div>
      ${statsHTML}
    </div>`;
  }).join('');

  const miniBackRow = inactiveCards.map(c => `
    <div class="mini-back-card${c._played?' played-mini':''}">
      <div class="mini-back-icon">${inactiveIcon}</div>
    </div>`).join('');

  // Bouncer chips for player when bowling
  let chipsHTML = '';
  if(!isPlayerBatting) {
    const chips = inn.bouncerChips;
    chipsHTML = `<div class="ai-chip-row">
      <span class="chip-label">BOUNCERS</span>
      <div class="chip ${chips<2?'spent':''}">⚡</div>
      <div class="chip ${chips<1?'spent':''}">⚡</div>
    </div>`;
  }

  return `
  <div class="player-zone">
    <div class="pz-label">${activeLabel}</div>
    <div class="bcard-grid">${bCardGrid}</div>
    ${chipsHTML}
    <div class="pz-label" style="margin-top:3px">${inactiveLabel}</div>
    <div class="mini-back-row">${miniBackRow}</div>
  </div>`;
}

function renderGameEnd() {
  const inn1 = G.inn1;
  const inn2 = G.inn2;
  const target = inn1.runs + 1;

  let winnerText, winnerCls, marginText;
  if(inn2.runs >= target) {
    winnerText = 'AI WINS';
    winnerCls = 'ai';
    const margin = inn2.runs - inn1.runs;
    const rem = 3 - inn2.wickets;
    marginText = `AI chased down ${target} — won by ${rem} wicket${rem!==1?'s':''} (${margin} runs clear)`;
  } else if(inn2.runs === inn1.runs) {
    winnerText = 'TIE!';
    winnerCls = 'tie';
    marginText = 'An incredible tie! Both teams level on runs.';
  } else {
    winnerText = 'YOU WIN!';
    winnerCls = 'player';
    const margin = inn1.runs - inn2.runs;
    marginText = `You defended ${inn1.runs} and bowled out the AI — won by ${margin} run${margin!==1?'s':''}!`;
  }

  // Confetti if player wins
  let confetti = '';
  if(winnerCls==='player') {
    const colors=['#d4a548','#f0c060','#4ade80','#60a5fa','#f472b6'];
    confetti = '<div class="confetti-wrap">' +
      Array.from({length:30},(_,i)=>{
        const col = colors[i%colors.length];
        const left = Math.random()*100;
        const dur = 1.5+Math.random()*2;
        const delay = Math.random()*1.5;
        return `<div class="cpiece" style="left:${left}%;background:${col};animation-duration:${dur}s;animation-delay:${delay}s"></div>`;
      }).join('') + '</div>';
  }

  // Coin winner
  const pc=G.coins.player, ac=G.coins.ai, coinDiff=pc-ac;
  let chipWinnerHTML;
  if(coinDiff>0){
    chipWinnerHTML=`<div class="bet-chip-bar" style="max-width:280px;border-color:rgba(74,222,128,0.3)">
      <div class="bet-stack"><div class="bet-stack-label">YOU</div><div class="chip-summary-player ahead" style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green)">🪙${pc}</div></div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--green);text-align:center;padding:4px 8px;background:rgba(74,222,128,0.1);border-radius:6px">COIN<br>WINNER</div>
      <div class="bet-stack"><div class="bet-stack-label">AI</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--red)">🪙${ac}</div></div>
    </div>`;
  } else if(coinDiff<0){
    chipWinnerHTML=`<div class="bet-chip-bar" style="max-width:280px;border-color:rgba(230,57,70,0.3)">
      <div class="bet-stack"><div class="bet-stack-label">YOU</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--red)">🪙${pc}</div></div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--red);text-align:center;padding:4px 8px;background:rgba(230,57,70,0.08);border-radius:6px">AI WINS<br>COINS</div>
      <div class="bet-stack"><div class="bet-stack-label">AI</div><div class="chip-summary-player ahead" style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green)">🪙${ac}</div></div>
    </div>`;
  } else {
    chipWinnerHTML=`<div style="font-size:14px;color:var(--muted);text-align:center">🤝 Coins all square — 🪙${pc} each</div>`;
  }

  return `
  <div class="screen end-bg">
    ${confetti}
    <div class="end-eyebrow">MATCH RESULT</div>
    <div class="end-winner ${winnerCls}">${winnerText}</div>
    <div class="end-scoreboard">
      <div class="end-block">
        <div class="end-block-label">YOUR SCORE</div>
        <div class="end-block-score">${inn1.runs}/${inn1.wickets}</div>
        <div class="end-block-detail">${getOvStr(inn1.balls)} overs</div>
      </div>
      <div class="end-block">
        <div class="end-block-label">AI SCORE</div>
        <div class="end-block-score">${inn2.runs}/${inn2.wickets}</div>
        <div class="end-block-detail">${getOvStr(inn2.balls)} overs</div>
      </div>
    </div>
    <div class="end-margin">${marginText}</div>
    ${chipWinnerHTML}
    <div style="font-size:11px;color:var(--muted);text-align:center">
      Pitch: ${G.pitch.icon} ${G.pitch.name}
    </div>
    <button class="end-play-again" onclick="playAgain()">PLAY AGAIN</button>
  </div>`;
}

const DB_URL = 'https://overnout-155e1-default-rtdb.asia-southeast1.firebasedatabase.app';

// Detect if running inside an iframe/preview (Claude.ai blocks external fetch)
const IS_PREVIEW = (() => {
  try { return window.self !== window.top; } catch(e) { return true; }
})();

// Simple REST helpers (no SDK needed)
async function dbGet(path) {
  if(IS_PREVIEW) throw new Error('preview_blocked');
  const r = await fetch(`${DB_URL}/${path}.json`);
  if(!r.ok) throw new Error('DB read failed');
  return r.json();
}
async function dbSet(path, data) {
  if(IS_PREVIEW) throw new Error('preview_blocked');
  const r = await fetch(`${DB_URL}/${path}.json`, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error('DB write failed');
  return r.json();
}
async function dbPatch(path, data) {
  if(IS_PREVIEW) throw new Error('preview_blocked');
  const r = await fetch(`${DB_URL}/${path}.json`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error('DB patch failed');
  return r.json();
}

// Generate a short room code
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

// Lobby event handlers
window.openLobby = function() {
  G.phase = 'lobby';
  G.mpLobbyMode = null;
  G.mpStatus = '';
  render();
};
window.lobbyBack = function() {
  _clearPolls();
  G.phase = 'home';
  render();
};
window.setLobbyMode = function(mode) {
  G.mpLobbyMode = mode;
  G.mpJoinInput = '';
  G.mpStatus = '';
  render();
};
window.lobbyInputChange = function(val) {
  G.mpJoinInput = val.toUpperCase().slice(0,4);
  // Directly toggle button without re-rendering (re-render would reset input focus)
  const btn = document.getElementById('lobby-join-btn');
  if(btn) btn.disabled = G.mpJoinInput.length !== 4;
};

window.createRoom = async function() {
  if(IS_PREVIEW) {
    G.mpStatus = 'err:Multiplayer needs the file open directly in your browser — not inside a preview. Download the HTML and open it in Chrome/Safari.';
    render(); return;
  }
  const code = genCode();
  G.mpRoomCode = code;
  G.mpIsHost = true;
  G.mpStatus = 'creating…';
  render();
  try {
    await dbSet(`rooms/${code}`, {
      created: Date.now(),
      host: 'player',
      guest: null,
      phase: 'waiting',
      pitchId: null,
    });
    G.mpStatus = 'ok';
    G.mpMode = true;
    G.phase = 'lobbyWaiting';
    // Start polling for guest join
    _pollForGuest(code);
    render();
  } catch(e) {
    G.mpStatus = 'err:Could not reach server. Check your internet connection and open the file directly in your browser (not an embed).';
    render();
  }
};

window.joinRoom = async function() {
  if(IS_PREVIEW) {
    G.mpStatus = 'err:Multiplayer needs the file open directly in your browser — not inside a preview. Download the HTML and open it in Chrome/Safari.';
    render(); return;
  }
  const code = G.mpJoinInput.trim().toUpperCase();
  if(code.length !== 4) { G.mpStatus = 'err:Enter 4-letter code'; render(); return; }
  G.mpStatus = 'joining…';
  render();
  try {
    const room = await dbGet(`rooms/${code}`);
    if(!room || room.phase === 'playing') {
      G.mpStatus = 'err:Room not found or already started';
      render();
      return;
    }
    await dbPatch(`rooms/${code}`, { guest: 'player2', phase: 'ready' });
    G.mpRoomCode = code;
    G.mpIsHost = false;
    G.mpMode = true;
    G.mpStatus = 'ok';
    G.phase = 'lobbyWaiting';
    render();
    // Guest gets host pitch choice pushed
    _pollForGameStart(code);
  } catch(e) {
    G.mpStatus = 'err:' + e.message;
    render();
  }
};

let _pollTimer = null;
let _pollTimer2 = null;
function _clearPolls() {
  if(_pollTimer)  { clearInterval(_pollTimer);  _pollTimer  = null; }
  if(_pollTimer2) { clearInterval(_pollTimer2); _pollTimer2 = null; }
}

function _pollForGuest(code) {
  _clearPolls();
  _pollTimer = setInterval(async () => {
    try {
      const room = await dbGet(`rooms/${code}`);
      if(room && room.guest) {
        _clearPolls();
        G.mpStatus = 'Guest joined! Setting stakes…';
        G.phase = 'mpStakes';
        G.mpStakeAmt = 0;
        render();
      }
    } catch(e) {}
  }, 2000);
}

function _pollForGameStart(code) {
  _clearPolls();
  _pollTimer = setInterval(async () => {
    try {
      const room = await dbGet(`rooms/${code}`);
      if(!room) return;
      // Step 1: host picked a stake — surface it to guest on mpStakes screen
      if(room.stakeAmt && G.phase === 'lobbyWaiting') {
        G.mpStakeAmt = room.stakeAmt;
        G.phase = 'mpStakes';
        render();
        return;
      }
      // Step 2: host updated stake while guest is already on mpStakes — refresh
      if(room.stakeAmt && G.phase === 'mpStakes' && G.mpStakeAmt !== room.stakeAmt) {
        G.mpStakeAmt = room.stakeAmt;
        render();
      }
      // Step 3: fallback — phase flipped to playing before guest saw mpStakes
      if(room.phase === 'playing' && G.phase === 'lobbyWaiting') {
        _clearPolls();
        initGame();
      }
    } catch(e) {}
  }, 2000);
}

// Lobby waiting screen renderer (shared for host+guest)
// ================================================================
// MP STAKES SCREEN
// ================================================================
function renderMpStakes() {
  const isHost = G.mpIsHost;
  const selected = G.mpStakeAmt || 0;
  const opts = [50, 100, 200, 500];
  const optsHTML = opts.map(v => {
    const isSel = selected === v;
    const canPick = isHost;
    return `<div class="mpstakes-opt${isSel?' selected':''}${!canPick?' disabled-opt':''}"
      ${canPick?`onclick="mpStakeSelect(${v})"`:''}>🪙${v}</div>`;
  }).join('');

  const balance = G.coins ? G.coins.player : 1000;

  if(isHost) {
    return `
    <div class="screen mpstakes-screen">
      <div class="mpstakes-title">SET MATCH STAKES</div>
      <div class="mpstakes-sub">How many coins per over?<br>Both players put this in — winner takes the pot.</div>
      <div class="mpstakes-grid">${optsHTML}</div>
      <div class="mpstakes-balance">Your balance: 🪙${balance}</div>
      <button class="mpstakes-confirm" onclick="mpStakeConfirm()" ${selected?'':'disabled'}>
        CONFIRM STAKES →
      </button>
      <div style="font-size:11px;color:var(--muted);text-align:center">Both players must confirm before the match begins</div>
    </div>`;
  } else {
    const hostAmt = G.mpStakeAmt;
    return `
    <div class="screen mpstakes-screen">
      <div class="mpstakes-title">MATCH STAKES</div>
      <div class="mpstakes-sub">Host is setting the coin stake per over. Wait for their choice.</div>
      ${hostAmt
        ? `<div class="mpstakes-opt selected" style="width:120px;margin:0 auto">🪙${hostAmt}</div>
           <div class="mpstakes-balance">Your balance: 🪙${balance}</div>
           <button class="mpstakes-confirm" onclick="mpStakeConfirm()">ACCEPT & PLAY →</button>`
        : `<div class="mpstakes-waiting">Waiting for host to pick stakes…</div>`
      }
    </div>`;
  }
}

window.mpStakeSelect = function(amt) {
  if(!G.mpIsHost) return;
  G.mpStakeAmt = amt;
  render();
  // Write to Firebase so guest can see
  if(G.mpRoomCode) dbPatch(`rooms/${G.mpRoomCode}`, { stakeAmt: amt }).catch(()=>{});
};

window.mpStakeConfirm = function() {
  if(!G.mpStakeAmt) return;
  G.overStakeAmt = G.mpStakeAmt;
  _clearPolls(); // stop all polling before game starts
  if(G.mpIsHost) {
    if(G.mpRoomCode) {
      dbPatch(`rooms/${G.mpRoomCode}`, { stakeReady: true, phase: 'playing' }).catch(()=>{});
    }
    initGame();
  } else {
    // Guest confirmed — start game independently (in-game sync is the next milestone)
    if(G.mpRoomCode) dbPatch(`rooms/${G.mpRoomCode}`, { guestStakeOk: true }).catch(()=>{});
    initGame();
  }
};

function renderLobbyWaiting() {
  const isHost = G.mpIsHost;
  const code = G.mpRoomCode || '----';
  const statusMsg = isHost
    ? 'Share this code with your opponent — waiting for them to join'
    : 'Connected! Waiting for host to start the game…';
  return `
  <div class="screen lobby-screen">
    <div class="lobby-title">${isHost ? 'ROOM CREATED' : 'JOINED!'}</div>
    <div class="lobby-code-label">ROOM CODE</div>
    <div class="lobby-code-display">${code}</div>
    <div class="lobby-waiting">${statusMsg}</div>
    <div class="lobby-back" onclick="lobbyBack()">← CANCEL & GO BACK</div>
  </div>`;
}

function renderLobby() {
  const mode = G.mpLobbyMode;
  const status = G.mpStatus;
  const statusHTML = status.startsWith('err:')
    ? `<div class="lobby-status err">${status.slice(4)}</div>`
    : status === 'ok' ? '' : (status ? `<div class="lobby-status ok">${status}</div>` : '');

  if(!mode) {
    const previewBanner = IS_PREVIEW
      ? `<div style="background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);border-radius:6px;padding:10px 14px;font-size:11px;color:#fbbf24;text-align:center;max-width:280px;line-height:1.5">
          ⚠️ Multiplayer requires the HTML file opened directly in your browser.<br>Download it and open in Chrome/Safari.
         </div>` : '';
    return `
    <div class="screen lobby-screen">
      <div class="lobby-title">MULTIPLAYER</div>
      <div class="lobby-sub">Play against a friend on two devices. Both need this page open.</div>
      ${previewBanner}
      <div class="lobby-btn-row">
        <button class="lobby-btn create" onclick="setLobbyMode('create')">CREATE<br>ROOM</button>
        <button class="lobby-btn join" onclick="setLobbyMode('join')">JOIN<br>ROOM</button>
      </div>
      <div class="lobby-back" onclick="lobbyBack()">← BACK</div>
    </div>`;
  }

  if(mode === 'create') {
    return `
    <div class="screen lobby-screen">
      <div class="lobby-title">CREATE ROOM</div>
      <div class="lobby-sub">A room code will be generated. Share it with your opponent.</div>
      ${statusHTML}
      <button class="lobby-btn create" onclick="createRoom()" style="max-width:200px;width:100%">
        GENERATE CODE
      </button>
      <div class="lobby-back" onclick="setLobbyMode(null)">← BACK</div>
    </div>`;
  }

  if(mode === 'join') {
    return `
    <div class="screen lobby-screen">
      <div class="lobby-title">JOIN ROOM</div>
      <div class="lobby-sub">Enter the 4-letter code your opponent shared with you.</div>
      <input class="lobby-input" type="text" maxlength="4" placeholder="CODE"
             oninput="lobbyInputChange(this.value)"
             value="${G.mpJoinInput||''}" autocomplete="off" autocorrect="off" spellcheck="false"/>
      ${statusHTML}
      <button id="lobby-join-btn" class="lobby-btn join" onclick="joinRoom()"
              style="max-width:200px;width:100%" ${(G.mpJoinInput||'').length===4?'':'disabled'}>
        JOIN →
      </button>
      <div class="lobby-back" onclick="setLobbyMode(null)">← BACK</div>
    </div>`;
  }

  return renderHome();
}

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  G = newState();
  render();
});
</script>
</body>
</html>
