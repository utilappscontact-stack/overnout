<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Over &amp; Out</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0a1628;
  --navy2:#0d1e3a;
  --navy3:#162640;
  --gold:#d4a548;
  --gold2:#f0c060;
  --white:#f0f4ff;
  --red:#e63946;
  --green:#4ade80;
  --muted:#7a8fa8;
  --card-bg:#0b1a30;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--navy);
  color:var(--white);
  font-family:'Rajdhani',sans-serif;
  font-size:16px;
  touch-action:manipulation;
}
#app{
  width:100%;
  max-width:430px;
  margin:0 auto;
  height:100%;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ======= SCREEN BASE ======= */
.screen{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  position:absolute;top:0;left:0;
  overflow:hidden;
}

/* ======= HOME SCREEN ======= */
.home-bg{
  background:radial-gradient(ellipse at 50% 30%,#0f2550 0%,var(--navy) 70%);
  justify-content:center;align-items:center;gap:24px;padding:40px 24px;
}
.home-bg::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(
    90deg,
    rgba(212,165,72,0.03) 0px,rgba(212,165,72,0.03) 1px,
    transparent 1px,transparent 40px
  );pointer-events:none;
}
.logo-wrap{text-align:center;position:relative;z-index:1}
.logo-main{
  font-family:'Bebas Neue',sans-serif;font-size:80px;line-height:0.9;
  color:var(--gold);letter-spacing:6px;
  text-shadow:0 0 60px rgba(212,165,72,0.4),0 0 120px rgba(212,165,72,0.15);
  animation:logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow{0%,100%{text-shadow:0 0 40px rgba(212,165,72,0.4)}50%{text-shadow:0 0 80px rgba(212,165,72,0.7),0 0 120px rgba(212,165,72,0.3)}}
.logo-sub{font-size:11px;letter-spacing:8px;color:var(--muted);font-weight:700;margin-top:4px}
.tagline{font-size:16px;color:rgba(240,244,255,0.6);text-align:center;font-weight:500}
.btn-primary{
  background:linear-gradient(135deg,#e0b050,#c89030);
  color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:26px;
  letter-spacing:3px;padding:15px 0;border:none;cursor:pointer;
  border-radius:6px;width:100%;max-width:280px;
  box-shadow:0 6px 30px rgba(212,165,72,0.35);
  transition:transform 0.1s,box-shadow 0.1s;position:relative;z-index:1;
}
.btn-primary:active{transform:scale(0.97);box-shadow:0 2px 15px rgba(212,165,72,0.2)}
.diff-row{display:flex;gap:10px;width:100%;max-width:280px;position:relative;z-index:1}
.diff-btn{
  flex:1;padding:9px 4px;background:transparent;
  border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.25);
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  border-radius:5px;cursor:default;letter-spacing:1px;
}
.diff-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,165,72,0.08)}
.home-deco{
  position:absolute;font-size:200px;opacity:0.025;user-select:none;pointer-events:none;
  font-family:'Bebas Neue',sans-serif;letter-spacing:-10px;color:var(--gold);
}
.home-deco-l{left:-40px;top:50%;transform:translateY(-50%)}
.home-deco-r{right:-40px;top:50%;transform:translateY(-50%)}
.version-tag{position:absolute;bottom:16px;font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:2px}
.home-mode-row{display:flex;gap:14px;width:100%;max-width:340px;position:relative;z-index:1}
.home-mode-card{
  flex:1;border-radius:10px;padding:18px 12px;cursor:pointer;text-align:center;
  transition:transform 0.12s,box-shadow 0.12s;
}
.home-mode-card:active{transform:scale(0.96)}
.home-mode-card.sp{
  background:linear-gradient(145deg,#e0b050,#b87820);
  box-shadow:0 6px 28px rgba(212,165,72,0.4);
}
.home-mode-card.mp{
  background:transparent;
  border:2px solid rgba(96,165,250,0.5);
  box-shadow:0 4px 20px rgba(96,165,250,0.15);
}
.home-mode-icon{font-size:28px;margin-bottom:6px}
.home-mode-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  color:var(--navy)}
.home-mode-card.mp .home-mode-title{color:#93c5fd}
.home-mode-desc{font-size:11px;font-weight:600;letter-spacing:0.5px;margin:4px 0 10px;
  color:rgba(10,22,40,0.7)}
.home-mode-card.mp .home-mode-desc{color:rgba(147,197,253,0.7)}
.home-mode-btn{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;
  background:rgba(0,0,0,0.18);border-radius:4px;padding:5px 8px;
  color:var(--navy);display:inline-block}
.home-mode-card.mp .home-mode-btn{background:rgba(96,165,250,0.15);color:#93c5fd}

/* ======= PITCH REVEAL ======= */
.pitch-bg{
  background:linear-gradient(160deg,#080f20,#0a1628 50%,#060c18);
  justify-content:center;align-items:center;gap:20px;padding:32px 24px;
}
.reveal-label{
  font-family:'Bebas Neue',sans-serif;font-size:16px;
  letter-spacing:5px;color:var(--muted);
}
.flip-wrap{perspective:900px;width:190px;height:270px;cursor:pointer}
.flip-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);
}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-face{
  position:absolute;width:100%;height:100%;border-radius:14px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border:2px solid var(--gold);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:20px;
}
.flip-back{
  background:linear-gradient(135deg,var(--navy2),var(--navy3));
}
.flip-back-pattern{
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;opacity:0.4;
}
.flip-back-pattern span{font-size:20px}
.flip-front{
  transform:rotateY(180deg);
  background:linear-gradient(145deg,#0c1e3c,#081428);
}
.pitch-card-icon{font-size:44px;filter:drop-shadow(0 0 10px rgba(212,165,72,0.4))}
.pitch-card-name{
  font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);
  text-align:center;letter-spacing:1px;line-height:1.1;
}
.pitch-card-desc{font-size:11px;color:var(--muted);text-align:center;line-height:1.4}
.pitch-card-buff{
  font-size:10px;background:rgba(212,165,72,0.12);border:1px solid rgba(212,165,72,0.3);
  border-radius:4px;padding:3px 8px;color:var(--gold);font-weight:700;letter-spacing:1px;
  text-align:center;
}
.pitch-tap-hint{
  font-size:12px;color:var(--muted);opacity:0;transition:opacity 0.5s;
  animation:blink 1.6s ease-in-out infinite;
}
.pitch-tap-hint.show{opacity:1}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:0.9}}

/* ======= DEAL ======= */
.deal-bg{
  background:linear-gradient(160deg,#080f20,#0a1628);
  justify-content:center;align-items:center;gap:20px;padding:32px 16px;
}
.deal-title{
  font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);
  letter-spacing:4px;text-align:center;
}
.deal-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:0 8px}
.deal-mini{
  width:50px;height:72px;border-radius:6px;
  border:1.5px solid var(--gold);background:var(--card-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;font-size:9px;color:var(--muted);
  opacity:0;transform:translateY(-40px);
  transition:opacity 0.35s,transform 0.35s;
}
.deal-mini.dealt{opacity:1;transform:translateY(0)}
.deal-mini.ai-mini{border-color:rgba(255,255,255,0.15)}
.deal-mini-icon{font-size:16px}
.deal-mini-label{font-size:8px;font-weight:700;letter-spacing:0.5px}
.deal-row-label{font-size:11px;color:var(--muted);letter-spacing:3px;font-weight:700;text-align:center}

/* ======= POWER PICK ======= */
.power-bg{
  background:var(--navy);padding:0;
  justify-content:flex-start;
}
.power-header{
  padding:20px 16px 12px;background:linear-gradient(180deg,#080f20,transparent);
  border-bottom:1px solid rgba(212,165,72,0.15);flex-shrink:0;
}
.power-title{
  font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);
  letter-spacing:3px;
}
.power-sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.power-list{flex:1;overflow-y:auto;padding:12px 12px;display:flex;flex-direction:column;gap:10px}
.pcard{
  border:1.5px solid rgba(255,255,255,0.08);border-radius:10px;
  background:var(--card-bg);padding:14px;cursor:pointer;
  transition:border-color 0.2s,background 0.2s;
}
.pcard.selected{border-color:var(--gold);background:rgba(212,165,72,0.06)}
.pcard:active{background:rgba(212,165,72,0.04)}
.pcard-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pcard-icon{font-size:24px}
.pcard-name{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);letter-spacing:2px}
.pcard-desc{font-size:13px;color:var(--white);line-height:1.4;font-weight:500}
.pcard-flavor{font-size:11px;color:var(--muted);margin-top:5px;font-style:italic}
.power-footer{padding:10px 12px 16px;flex-shrink:0}
.btn-confirm{
  width:100%;padding:13px;background:linear-gradient(135deg,#e0b050,#c89030);
  color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:2px;border:none;cursor:pointer;border-radius:6px;
  transition:opacity 0.2s;
}
.btn-confirm:disabled{opacity:0.2;cursor:default}

/* ======= SCOREBOARD ======= */
#sb{
  background:linear-gradient(90deg,#060c18,#0a1628);
  border-bottom:1px solid rgba(212,165,72,0.2);
  padding:8px 12px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;min-height:56px;
}
.sb-score{
  font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--white);
  line-height:1;text-shadow:0 0 20px rgba(255,255,255,0.2);
}
.sb-center{display:flex;flex-direction:column;align-items:center;gap:1px}
.sb-over{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--muted);letter-spacing:1px}
.sb-inn{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:2px;text-align:center}
.sb-pitch{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:rgba(212,165,72,0.06);border:1px solid rgba(212,165,72,0.2);
  border-radius:6px;padding:4px 8px;min-width:60px;
}
.sb-pitch-icon{font-size:15px}
.sb-pitch-name{font-size:8px;color:var(--gold);font-weight:700;letter-spacing:0.5px;text-align:center;line-height:1.2}
.sb-target{font-size:10px;color:var(--muted);font-weight:600}
.sb-target span{color:var(--gold)}

/* ======= PLAY SCREEN — SPORTS HUD ======= */
.play-screen{
  background:var(--navy);
  justify-content:flex-start;
  overflow:hidden;
  flex-direction:column;
}

/* ── AI STRIP ── */
.ai-strip{
  background:linear-gradient(180deg,#060d1e 0%,rgba(6,13,30,0.6) 100%);
  padding:6px 10px 7px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.05);
}
.ai-strip-label{
  font-size:8px;font-weight:700;letter-spacing:3px;color:var(--muted);
  text-transform:uppercase;margin-bottom:4px;
}
.ai-mini-row{display:flex;gap:5px}
.ai-mini-card{
  flex:1;height:44px;border-radius:6px;border:1px solid rgba(255,255,255,0.07);
  background:linear-gradient(135deg,#0d1a2e,#0a1425);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.ai-mini-card::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,0.015) 4px,rgba(255,255,255,0.015) 5px);
}
.ai-mini-icon{font-size:14px;opacity:0.25}
.ai-mini-played{font-size:9px;font-weight:700;color:var(--muted);opacity:0.5}
.ai-chip-row{display:flex;gap:4px;align-items:center;margin-top:4px}
.chip-label{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-right:2px}
.chip{
  width:15px;height:15px;border-radius:50%;border:1.5px solid var(--gold);
  background:rgba(212,165,72,0.15);font-size:8px;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.4s,border-color 0.4s;
}
.chip.spent{opacity:0.2;border-color:var(--muted);background:transparent}

/* ── MID HUD ── */
.mid-hud{
  display:flex;gap:0;flex-shrink:0;padding:6px 10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  min-height:100px;
}
.hud-center{
  flex:1;display:flex;flex-direction:column;gap:6px;
}
.hud-pitch-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:4px;padding:3px 7px;width:fit-content;
}
.hud-pitch-tag span{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:1px}
.hud-selection{
  display:flex;gap:8px;align-items:stretch;flex:1;
}
.hud-selected-card{
  background:rgba(212,165,72,0.07);border:1.5px solid rgba(212,165,72,0.3);
  border-radius:8px;padding:7px 10px;display:flex;flex-direction:column;gap:3px;
  min-width:90px;
}
.hsc-rating{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);line-height:1}
.hsc-name{font-size:10px;font-weight:700;color:var(--white);line-height:1.2}
.hsc-nick{font-size:8px;color:var(--muted);font-style:italic}
.hsc-special{
  font-size:7px;color:var(--navy);background:var(--gold);
  padding:1px 4px;border-radius:2px;font-weight:700;width:fit-content;margin-top:1px;
}
.hud-hint{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:11px;font-weight:600;letter-spacing:2px;
  border:1px dashed rgba(255,255,255,0.07);border-radius:8px;
  text-align:center;padding:12px;
}
.shot-col{
  display:grid;grid-template-columns:repeat(2,1fr);gap:4px;flex:1;align-content:start;
}
.shot-label{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-bottom:1px;grid-column:1/-1}
.sBtn{
  padding:0 6px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.12);
  background:transparent;color:rgba(240,244,255,0.75);font-family:'Rajdhani',sans-serif;
  font-size:11px;font-weight:700;cursor:pointer;transition:all 0.12s;text-align:left;
  display:flex;align-items:center;justify-content:space-between;min-height:28px;
}
.sBtn.active{border-color:var(--gold);background:rgba(212,165,72,0.14);color:var(--gold)}
.sBtn.capped{opacity:0.25;cursor:not-allowed;text-decoration:line-through}
.sBtn:not(.capped):not([disabled]):active{background:rgba(212,165,72,0.08)}
.sBtn.ft-risk{border-color:rgba(230,57,70,0.3);color:rgba(230,57,70,0.7)}
.sBtn.ft-risk.active{border-color:var(--red);background:rgba(230,57,70,0.1);color:var(--red)}
.sBtn-dots{font-size:8px;color:var(--gold);opacity:0.7}
.sBadge{font-size:7px;font-weight:700;border-radius:3px;padding:1px 3px;margin-left:2px;white-space:nowrap}
.sBadge.read{background:rgba(251,191,36,0.15);color:#fbbf24}
.sBadge.warn{background:rgba(251,191,36,0.1);color:#f59e0b}
.sBadge.danger{background:rgba(230,57,70,0.15);color:var(--red)}
.go-wrap{display:flex;flex-direction:column;gap:5px;justify-content:flex-end}
.go-btn{
  width:100%;padding:10px 8px;background:linear-gradient(135deg,#e0b050,#c08828);
  color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:18px;
  letter-spacing:2px;border:none;cursor:pointer;border-radius:6px;
  transition:opacity 0.2s;white-space:nowrap;
}
.go-btn:disabled{opacity:0.15;cursor:default}

/* ── POWER RAIL (right column) ── */
.power-rail{
  width:46px;display:flex;flex-direction:column;align-items:center;
  gap:6px;padding-left:8px;justify-content:flex-start;padding-top:2px;flex-shrink:0;
}
.pr-label{font-size:7px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:2px;text-align:center}
.pr-slot{
  width:40px;height:40px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;position:relative;cursor:default;
  border:1px solid transparent;transition:all 0.2s;
}
.pr-slot.ghost{
  border-color:rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);
  opacity:0.3;
}
.pr-slot.mine{
  border-color:rgba(212,165,72,0.35);background:rgba(212,165,72,0.08);
  cursor:pointer;opacity:1;
}
.pr-slot.mine:active{transform:scale(0.94)}
.pr-slot.declared{
  border-color:var(--gold);background:rgba(212,165,72,0.25);
  box-shadow:0 0 10px rgba(212,165,72,0.3);
}
.pr-slot.used{opacity:0.2;cursor:default;border-style:dashed}
.pr-slot.pick-me{
  border-color:rgba(212,165,72,0.5);background:rgba(212,165,72,0.06);
  cursor:pointer;opacity:1;animation:prPulse 1.2s ease-in-out infinite;
}
@keyframes prPulse{0%,100%{box-shadow:0 0 0 rgba(212,165,72,0)}50%{box-shadow:0 0 8px rgba(212,165,72,0.4)}}
.pr-icon{font-size:18px;line-height:1}
.pr-name{font-size:6px;color:var(--muted);font-weight:700;letter-spacing:0.5px;text-align:center}

/* ── PLAYER CARD ZONE ── */
.player-zone{
  flex:1;padding:6px 10px 6px;display:flex;flex-direction:column;gap:5px;overflow:hidden;
}
.pz-label{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:2px}

/* 6-card grid — 2 rows of 3 */
.bcard-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:5px;
}
.bcard{
  border-radius:8px;border:1.5px solid rgba(212,165,72,0.18);
  background:var(--card-bg);cursor:pointer;position:relative;overflow:hidden;
  transition:border-color 0.15s,transform 0.15s,box-shadow 0.15s,opacity 0.25s;
  padding:5px 6px 4px;min-height:82px;
}
.bcard.selected{
  border-color:var(--gold)!important;
  box-shadow:0 0 14px rgba(212,165,72,0.5);
  transform:translateY(-2px) scale(1.02);
  background:rgba(212,165,72,0.07);
}
.bcard.played{
  opacity:0.45;cursor:default;
  border-color:rgba(255,255,255,0.08);
}
.bcard.captain-swap{border-color:var(--gold);animation:swapPulse 0.8s ease-in-out infinite}
@keyframes swapPulse{0%,100%{box-shadow:0 0 0 rgba(212,165,72,0)}50%{box-shadow:0 0 12px rgba(212,165,72,0.5)}}
.bc-rating{
  font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);
  line-height:1;
}
.bc-ovr{
  font-family:'Bebas Neue',sans-serif;font-size:20px;line-height:1;
  letter-spacing:1px;
}
.bc-ovr-label{font-size:6px;letter-spacing:1px;font-weight:700;opacity:0.6;line-height:1}
.bcard.tier-gold{border-color:rgba(212,165,72,0.5);background:linear-gradient(160deg,#0d1e35,#0a1628)}
.bcard.tier-silver{border-color:rgba(192,192,192,0.35);background:linear-gradient(160deg,#111c2e,#0a1628)}
.bcard.tier-bronze{border-color:rgba(160,120,60,0.3);background:linear-gradient(160deg,#0f1a2c,#0a1628)}
.bcard.tier-gold .bc-ovr{color:#f0c060}
.bcard.tier-silver .bc-ovr{color:#c8d0dc}
.bcard.tier-bronze .bc-ovr{color:#a07840}
.bc-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px 4px;margin-top:3px}
.bc-stat{display:flex;align-items:center;gap:2px}
.bc-stat-key{font-size:6px;color:var(--muted);font-weight:700;letter-spacing:0.3px;min-width:18px}
.bc-stat-bar{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.bc-stat-bar-fill{height:100%;border-radius:2px;background:var(--gold);transition:width 0.3s}
.bcard.tier-silver .bc-stat-bar-fill{background:#a0b0c8}
.bcard.tier-bronze .bc-stat-bar-fill{background:#907038}
.bc-stat-val{font-size:6px;color:var(--muted);min-width:12px;text-align:right}
/* HUD selected card sub-stats (larger bars) */
.hsc-substats{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.hsc-sstat{display:flex;align-items:center;gap:4px}
.hsc-sstat-key{font-size:8px;font-weight:700;color:var(--muted);min-width:24px;letter-spacing:0.5px}
.hsc-sstat-bar{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.hsc-sstat-fill{height:100%;background:var(--gold);border-radius:2px}
.hsc-sstat-val{font-size:8px;color:var(--gold);min-width:20px;text-align:right;font-weight:700}
.bc-name{font-size:8.5px;font-weight:700;color:var(--white);line-height:1.2;margin-top:1px}
.bc-nick{font-size:7px;color:var(--muted);font-style:italic;line-height:1}
.bc-special{
  font-size:7px;color:var(--navy);background:var(--gold);
  padding:1px 3px;border-radius:2px;font-weight:700;
  display:inline-block;margin-top:2px;
}
.bc-result{
  position:absolute;top:4px;right:5px;
  font-size:13px;line-height:1;
}
.bc-played-badge{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;opacity:0.35;pointer-events:none;
}

/* 6 mini face-down bowler/batting cards */
.mini-back-row{display:flex;gap:4px;margin-top:2px}
.mini-back-card{
  flex:1;height:36px;border-radius:5px;
  border:1px dashed rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.02);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  position:relative;overflow:hidden;
}
.mini-back-card.played-mini{border-color:rgba(255,255,255,0.06);opacity:0.4}
.mini-back-icon{font-size:12px;opacity:0.3}

/* legacy compat */
.player-cards-row{display:flex;gap:7px}
.hcard{border-radius:9px;border:1.5px solid rgba(212,165,72,0.2);background:var(--card-bg);cursor:pointer;transition:border-color 0.15s,transform 0.15s,box-shadow 0.15s;overflow:hidden;position:relative;flex-shrink:0}
.hcard.player-hcard{width:82px;min-height:115px}
.hcard.ai-hcard-back{width:72px;height:90px;cursor:default;border-color:rgba(255,255,255,0.08)}
.hcard.selected{border-color:var(--gold)!important;box-shadow:0 0 14px rgba(212,165,72,0.45);transform:translateY(-5px)}
.hcard-rating{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);padding:6px 7px 0;line-height:1}
.hcard-name{font-size:9px;font-weight:700;color:var(--white);padding:2px 7px;line-height:1.2}
.hcard-nick{font-size:8px;color:var(--muted);line-height:1;margin-top:1px;font-style:italic}
.hcard-special{font-size:8px;color:var(--navy);background:var(--gold);padding:2px 5px;margin:4px 7px;border-radius:2px;display:inline-block;font-weight:700}
.hcard-hidden{display:flex;height:100%;align-items:center;justify-content:center;font-size:22px;opacity:0.15}
.zone-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.ai-cards-row{display:flex;gap:7px;align-items:flex-end}
.choice-row{display:flex;gap:7px}
.cbtn{flex:1;padding:10px 4px;border:1.5px solid rgba(255,255,255,0.12);background:transparent;color:rgba(240,244,255,0.7);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:6px;transition:all 0.15s;letter-spacing:0.5px}
.cbtn:disabled{opacity:0.2;cursor:default}
.cbtn.selected{border-color:var(--gold);background:rgba(212,165,72,0.12);color:var(--gold)}
.action-row{display:flex;gap:7px;align-items:stretch}
.pbtn{padding:8px 11px;border:1.5px solid rgba(212,165,72,0.35);background:rgba(212,165,72,0.06);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border-radius:6px;transition:all 0.15s;letter-spacing:0.5px;white-space:nowrap;flex-shrink:0}
.pbtn.used{opacity:0.2;cursor:default;border-style:dashed}
.pbtn.declared{border-color:var(--gold2);background:rgba(212,165,72,0.25);color:var(--navy)}
.swap-hint{font-size:12px;color:var(--gold);font-weight:600;text-align:center;background:rgba(212,165,72,0.08);border:1px solid rgba(212,165,72,0.25);border-radius:5px;padding:6px}
.pitch-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.25;margin:0;flex-shrink:0}
.dice-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(6,11,24,0.94);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;z-index:50;padding:20px;
}
.do-label{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--muted);letter-spacing:4px}
.do-reveal-row{
  display:flex;gap:12px;width:100%;justify-content:center;
}
.do-rcard{
  flex:1;max-width:140px;border-radius:9px;
  border:1.5px solid;background:var(--card-bg);
  padding:10px 8px;text-align:center;
}
.do-rcard.batter{border-color:var(--green)}
.do-rcard.bowler{border-color:var(--red)}
.do-role{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:3px}
.do-cname{font-size:11px;font-weight:700;color:var(--white);line-height:1.2}
.do-rating{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)}
.do-choice{
  font-size:11px;font-weight:700;color:var(--gold2);margin-top:3px;
  background:rgba(212,165,72,0.1);border-radius:3px;padding:2px 4px;
}
.dice-pair{display:flex;gap:24px;align-items:center}
.die-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.die-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:2px}
.die{
  width:72px;height:72px;border-radius:10px;
  background:var(--navy2);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--white);
  box-shadow:0 0 18px rgba(212,165,72,0.2);
  transition:border-color 0.2s,box-shadow 0.2s;
}
.die.rolling{animation:diceShake 0.1s linear infinite}
@keyframes diceShake{
  0%{transform:rotate(-3deg)}25%{transform:rotate(3deg)}50%{transform:translateY(-2px)}75%{transform:rotate(-2deg)}100%{transform:rotate(0deg)}
}
.die.settled{border-color:var(--gold2);box-shadow:0 0 25px rgba(212,165,72,0.55);animation:diceSettle 0.35s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes diceSettle{0%{transform:scale(1.25)}100%{transform:scale(1)}}
.die.drs-flash{border-color:var(--red);box-shadow:0 0 20px rgba(230,57,70,0.6)}
.vs-badge{
  width:36px;height:36px;border-radius:50%;
  background:var(--navy3);border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);
}
.drs-notice{
  font-size:12px;color:var(--red);font-weight:700;letter-spacing:2px;
  background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.3);
  border-radius:4px;padding:5px 12px;
  animation:drsPulse 0.5s ease-in-out infinite;
}
@keyframes drsPulse{0%,100%{opacity:0.7}50%{opacity:1}}

/* ======= RESULT OVERLAY ======= */
.result-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(6,11,24,0.95);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;overflow-y:auto;
  gap:12px;z-index:100;cursor:pointer;padding:16px 16px 48px;
}
.res-outcome{
  font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1;
  text-align:center;margin-top:8px;
  animation:resPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes resPop{0%{transform:scale(0.4);opacity:0}100%{transform:scale(1);opacity:1}}
.res-outcome.SIX{color:var(--gold2);text-shadow:0 0 50px rgba(240,192,96,0.7)}
.res-outcome.FOUR{color:var(--green);text-shadow:0 0 35px rgba(74,222,128,0.5)}
.res-outcome.TWO,.res-outcome.ONE{color:var(--white)}
.res-outcome.DOT,.res-outcome.PRESSURE{color:var(--muted)}
.res-outcome.WICKET{color:var(--red);text-shadow:0 0 50px rgba(230,57,70,0.7)}
/* narrative */
.res-narrative{
  font-size:13px;color:var(--muted);text-align:center;line-height:1.7;max-width:310px;
}
.res-narrative .rn-batter{color:var(--green);font-weight:700}
.res-narrative .rn-bowler{color:var(--red);font-weight:700}
.res-narrative .rn-shot{color:var(--gold);font-weight:700}
.res-narrative .rn-delivery{color:var(--gold2);font-weight:700}
/* dice row */
.res-dice-row{display:flex;align-items:center;gap:12px;width:100%;justify-content:center}
.res-die-box{
  flex:1;max-width:120px;border-radius:10px;border:1.5px solid;
  padding:10px 8px;background:var(--card-bg);text-align:center;
}
.res-die-box.batter{border-color:var(--green)}
.res-die-box.bowler{border-color:var(--red)}
.rdb-label{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:4px}
.rdb-val{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--white);line-height:1}
.rdb-mod{font-size:11px;font-weight:700;color:var(--gold);margin-top:2px}
.res-vs{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted)}
/* breakdown panel */
.res-breakdown{
  width:100%;max-width:340px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);border-radius:12px;
  padding:14px;
}
.rb-title{
  font-size:9px;font-weight:700;letter-spacing:3px;color:var(--muted);
  text-align:center;margin-bottom:10px;
}
.rb-row{display:flex;gap:10px;align-items:flex-start;justify-content:center}
.rb-side{flex:1;max-width:130px}
.rb-label{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:6px}
.rb-side.batter .rb-label{color:var(--green)}
.rb-side.bowler .rb-label{color:var(--red)}
.rb-line{font-size:11px;color:var(--white);opacity:0.7;line-height:1.8}
.rb-total{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  border-top:1px solid rgba(255,255,255,0.15);margin-top:4px;padding-top:2px;
}
.rb-side.batter .rb-total{color:var(--green)}
.rb-side.bowler .rb-total{color:var(--red)}
.rb-minus{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--muted);padding-top:20px}
.rb-diff{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;
  color:var(--gold);text-align:center;margin-top:10px;
}
.rb-threshold{
  font-size:12px;font-weight:700;color:var(--white);
  text-align:center;margin-top:4px;opacity:0.85;
}
.res-special{
  font-size:11px;color:var(--gold);background:rgba(212,165,72,0.1);
  border:1px solid rgba(212,165,72,0.3);border-radius:4px;
  padding:4px 8px;margin-top:6px;text-align:center;font-weight:700;
}
.res-balance{
  font-size:10px;font-weight:700;color:#fbbf24;background:rgba(251,191,36,0.07);
  border:1px solid rgba(251,191,36,0.2);border-radius:4px;
  padding:3px 8px;margin-top:4px;text-align:center;
}
.res-commentary{
  font-size:13px;color:var(--white);text-align:center;font-weight:500;
  line-height:1.5;max-width:300px;font-style:italic;opacity:0.8;
}
.res-skip{
  font-size:10px;color:var(--muted);opacity:0.5;
  position:fixed;bottom:14px;left:0;right:0;text-align:center;
  letter-spacing:2px;font-weight:700;
}

/* ======= TEEN PATTI BETTING OVERLAY ======= */
.bet-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(160deg,#040b18 0%,#071020 50%,#060e1c 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:11px;z-index:50;padding:14px 16px;
}
.bet-eyebrow{
  font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:6px;color:var(--gold);
  opacity:0.8;
}
.bet-chip-bar{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:310px;
  background:rgba(212,165,72,0.05);border:1px solid rgba(212,165,72,0.2);
  border-radius:12px;padding:10px 18px;
  animation:prvCardIn 0.35s 0.3s both;
}
.bet-stack{display:flex;flex-direction:column;align-items:center;gap:2px}
.bet-stack-label{font-size:8px;color:var(--muted);font-weight:700;letter-spacing:2px}
.bet-stack-val{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--white);line-height:1}
.bet-stack-val.low{color:var(--red)}
.bet-pot-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.bet-pot-label{font-size:8px;color:var(--gold);font-weight:700;letter-spacing:2px}
.bet-pot-val{
  font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);line-height:1;
  text-shadow:0 0 20px rgba(212,165,72,0.5);
}
.bet-actions{
  display:flex;gap:8px;width:100%;max-width:310px;
  animation:prvCardIn 0.35s 0.4s both;
}
.bet-btn{
  flex:1;padding:13px 4px;border-radius:8px;
  font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;
  border:1.5px solid;cursor:pointer;transition:transform 0.1s,opacity 0.1s;
}
.bet-btn:active{transform:scale(0.95)}
.bet-btn:disabled{opacity:0.2;cursor:not-allowed}
.bet-btn.fold{
  border-color:rgba(230,57,70,0.45);background:rgba(230,57,70,0.07);color:var(--red);
}
.bet-btn.play{
  background:linear-gradient(135deg,#e0b050,#c08828);
  border-color:transparent;color:var(--navy);flex:1.4;
}
.bet-btn.raise{
  border-color:rgba(74,222,128,0.45);background:rgba(74,222,128,0.07);color:var(--green);
}
.bet-sub{
  font-size:9px;color:var(--muted);text-align:center;letter-spacing:0.5px;
  max-width:260px;line-height:1.5;
}
.bet-ai-response{
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
  text-align:center;padding:9px 20px;border-radius:8px;width:100%;max-width:310px;
}
.bet-ai-response.thinking{
  color:var(--muted);background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  animation:blink 0.9s ease-in-out infinite;
}
.bet-ai-response.call-resp{
  color:var(--green);background:rgba(74,222,128,0.1);
  border:1px solid rgba(74,222,128,0.3);
}
.bet-ai-response.fold-resp{
  color:var(--red);background:rgba(230,57,70,0.1);
  border:1px solid rgba(230,57,70,0.3);
}
/* Chip count in scoreboard */
.sb-chip-wrap{
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:62px;
}
.sb-chip-row{font-size:9px;font-weight:700;letter-spacing:0.5px;white-space:nowrap}
.sb-chip-row.you{color:var(--green)}
.sb-chip-row.opp{color:rgba(230,57,70,0.8)}
.sb-chip-lead{
  font-size:8px;font-weight:700;letter-spacing:1px;
  padding:2px 5px;border-radius:3px;text-align:right;margin-top:1px;
}
.sb-chip-lead.ahead{background:rgba(74,222,128,0.1);color:var(--green)}
.sb-chip-lead.behind{background:rgba(230,57,70,0.08);color:var(--red)}
.sb-chip-lead.even{color:var(--muted)}
/* Fold result */
.fold-result-msg{
  font-size:15px;color:rgba(240,244,255,0.8);text-align:center;
  line-height:1.5;max-width:280px;font-weight:500;
}
/* Chip summary panels */
.chip-summary{
  width:100%;max-width:310px;border-radius:10px;
  background:rgba(212,165,72,0.05);border:1px solid rgba(212,165,72,0.2);
  padding:12px 16px;
}
.chip-summary-title{
  font-size:9px;font-weight:700;letter-spacing:3px;color:var(--gold);
  text-align:center;margin-bottom:8px;
}
.chip-summary-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.chip-summary-player{
  font-family:'Bebas Neue',sans-serif;font-size:28px;
  line-height:1;
}
.chip-summary-player.ahead{color:var(--green)}
.chip-summary-player.behind{color:var(--red)}
.chip-summary-player.even{color:var(--white)}
.chip-winner-label{
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;
  padding:3px 8px;border-radius:4px;text-align:center;
}
.chip-winner-label.you{background:rgba(74,222,128,0.15);color:var(--green)}
.chip-winner-label.ai{background:rgba(230,57,70,0.12);color:var(--red)}
.chip-winner-label.tied{background:rgba(255,255,255,0.05);color:var(--muted)}

/* ======= INNINGS SWAP ======= */
.swap-bg{
  background:linear-gradient(160deg,#080f20,var(--navy));
  justify-content:center;align-items:center;padding:32px 20px;gap:20px;
}
.swap-title{
  font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--gold);
  letter-spacing:4px;text-align:center;
}
.swap-score-wrap{text-align:center}
.swap-big{font-family:'Bebas Neue',sans-serif;font-size:60px;color:var(--white);line-height:1}
.swap-sub{font-size:12px;color:var(--muted);letter-spacing:2px;font-weight:600;margin-top:2px}
.target-box{
  background:rgba(212,165,72,0.08);border:1px solid rgba(212,165,72,0.3);
  border-radius:8px;padding:12px 24px;text-align:center;
}
.target-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-bottom:2px}
.target-val{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--gold)}
.swap-msg{font-size:15px;color:rgba(240,244,255,0.7);text-align:center;line-height:1.5;max-width:280px}

/* ======= GAME END ======= */
.end-bg{
  background:linear-gradient(160deg,#080f20,#0a1628);
  justify-content:center;align-items:center;padding:32px 20px;gap:18px;
  position:relative;overflow:hidden;
}
.end-eyebrow{font-size:12px;color:var(--muted);letter-spacing:5px;font-weight:700}
.end-winner{
  font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;
  text-align:center;
  animation:winnerPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
@keyframes winnerPop{0%{transform:scale(0.6);opacity:0}100%{transform:scale(1);opacity:1}}
.end-winner.player{color:var(--gold);text-shadow:0 0 50px rgba(212,165,72,0.5)}
.end-winner.ai{color:var(--red);text-shadow:0 0 40px rgba(230,57,70,0.4)}
.end-winner.tie{color:var(--muted)}
.end-scoreboard{display:flex;gap:16px;justify-content:center}
.end-block{
  background:var(--card-bg);border:1px solid rgba(212,165,72,0.15);
  border-radius:10px;padding:14px 20px;text-align:center;
}
.end-block-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-bottom:3px}
.end-block-score{font-family:'Bebas Neue',sans-serif;font-size:46px;color:var(--white);line-height:1}
.end-block-detail{font-size:11px;color:var(--muted);margin-top:2px}
.end-margin{font-size:14px;color:rgba(240,244,255,0.6);text-align:center;max-width:260px;line-height:1.5}
.end-play-again{
  width:100%;max-width:260px;padding:13px;
  background:linear-gradient(135deg,#e0b050,#c08828);
  color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:2px;border:none;cursor:pointer;border-radius:6px;
  box-shadow:0 4px 20px rgba(212,165,72,0.3);
}
/* Confetti */
.confetti-wrap{position:absolute;top:0;left:0;right:0;height:100%;pointer-events:none;overflow:hidden}
.cpiece{
  position:absolute;top:-10px;width:7px;height:7px;border-radius:2px;
  animation:cfall linear forwards;
}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ======= XI SELECTION SCREEN ======= */
.xi-screen{
  background:var(--navy);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.xi-header{
  background:linear-gradient(180deg,#060d1e,#0a1628);
  border-bottom:1px solid rgba(212,165,72,0.2);
  padding:10px 12px 0;flex-shrink:0;
}
.xi-header-top{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;
}
.xi-title{
  font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:3px;
}
.xi-tally{
  display:flex;gap:10px;align-items:center;
}
.xi-count{
  font-size:11px;font-weight:700;letter-spacing:1px;
  padding:3px 8px;border-radius:4px;border:1px solid;
}
.xi-count.bat{border-color:rgba(74,222,128,0.4);color:var(--green);background:rgba(74,222,128,0.06)}
.xi-count.bat.full{background:rgba(74,222,128,0.18);border-color:var(--green)}
.xi-count.bowl{border-color:rgba(96,165,250,0.4);color:#60a5fa;background:rgba(96,165,250,0.06)}
.xi-count.bowl.full{background:rgba(96,165,250,0.18);border-color:#60a5fa}
.xi-tab-row{display:flex;gap:0;border-bottom:none;margin-top:6px}
.xi-tab{
  flex:1;padding:8px 4px;text-align:center;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  transition:color 0.15s,border-color 0.15s;
}
.xi-tab.active.bat{color:var(--green);border-color:var(--green)}
.xi-tab.active.bowl{color:#60a5fa;border-color:#60a5fa}
.xi-filter-row{
  display:flex;gap:5px;padding:7px 12px;flex-shrink:0;
  background:rgba(0,0,0,0.15);border-bottom:1px solid rgba(255,255,255,0.05);
}
.xi-filter-btn{
  padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;
  border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);
  cursor:pointer;transition:all 0.12s;
}
.xi-filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,165,72,0.08)}
.xi-pitch-tip{
  flex:1;text-align:right;font-size:9px;color:var(--gold);
  font-weight:700;letter-spacing:0.5px;line-height:1.3;align-self:center;
}
.xi-pool{
  flex:1;overflow-y:auto;padding:8px 10px 90px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:6px;
  align-content:start;
}
.xi-card{
  border-radius:9px;border:1.5px solid rgba(212,165,72,0.15);
  background:var(--card-bg);cursor:pointer;position:relative;
  padding:7px 7px 5px;min-height:80px;
  transition:border-color 0.12s,transform 0.12s,box-shadow 0.12s,opacity 0.15s;
  display:flex;flex-direction:column;gap:2px;
}
.xi-card:active{transform:scale(0.96)}
.xi-card.selected{
  border-color:var(--green)!important;
  box-shadow:0 0 12px rgba(74,222,128,0.35);
  background:rgba(74,222,128,0.05);
  transform:scale(1.02);
}
.xi-card.bowl-selected{
  border-color:#60a5fa!important;
  box-shadow:0 0 12px rgba(96,165,250,0.35);
  background:rgba(96,165,250,0.05);
}
.xi-card.pitch-buffed{
  border-color:rgba(212,165,72,0.5);
}
.xi-card.pitch-buffed::after{
  content:'🔥';position:absolute;top:3px;right:4px;font-size:9px;
}
.xi-card.disabled{
  opacity:0.25;cursor:not-allowed;
}
.xi-card-rating{
  font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);line-height:1;
}
.xi-card-name{font-size:8px;font-weight:700;color:var(--white);line-height:1.2}
.xi-card-nick{font-size:7px;color:var(--muted);font-style:italic;line-height:1}
.xi-card-special{
  font-size:6.5px;color:var(--navy);background:var(--gold);
  padding:1px 3px;border-radius:2px;font-weight:700;
  display:inline-block;margin-top:1px;width:fit-content;
}
.xi-card-type-badge{
  position:absolute;bottom:3px;right:4px;font-size:7px;font-weight:700;letter-spacing:0.5px;
}
.xi-card-type-badge.seam{color:rgba(230,57,70,0.7)}
.xi-card-type-badge.spin{color:rgba(212,165,72,0.7)}
.xi-card-type-badge.big{color:rgba(74,222,128,0.6)}
.xi-selected-overlay{
  position:absolute;inset:0;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;pointer-events:none;
}
/* Footer confirm bar */
.xi-footer{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,var(--navy) 60%,transparent);
  padding:14px 12px 18px;
}
.xi-confirm-btn{
  width:100%;padding:13px;background:linear-gradient(135deg,#e0b050,#c08828);
  color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:22px;
  letter-spacing:2px;border:none;cursor:pointer;border-radius:8px;
  box-shadow:0 4px 20px rgba(212,165,72,0.35);
  transition:opacity 0.2s;
}
.xi-confirm-btn:disabled{opacity:0.2;cursor:default}
/* Pitch banner inside XI screen */
.xi-pitch-bar{
  display:flex;align-items:center;gap:6px;padding:5px 12px;
  background:rgba(212,165,72,0.05);border-bottom:1px solid rgba(212,165,72,0.12);
  flex-shrink:0;
}
.xi-pitch-bar-icon{font-size:14px}
.xi-pitch-bar-text{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:0.5px;flex:1}
.xi-pitch-bar-buff{
  font-size:9px;color:var(--gold);font-weight:700;letter-spacing:0.5px;
  background:rgba(212,165,72,0.1);border:1px solid rgba(212,165,72,0.25);
  padding:2px 6px;border-radius:3px;
}


/* ── Over Stake Screen ── */
.stake-bg{
  background:linear-gradient(160deg,#040a1a,#070f1e);
  justify-content:center;align-items:center;gap:18px;padding:28px 20px;
}
.stake-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);letter-spacing:4px;text-align:center}
.stake-pot-circle{
  width:130px;height:130px;border-radius:50%;
  border:3px solid rgba(212,165,72,0.6);
  background:radial-gradient(circle,rgba(212,165,72,0.1) 0%,transparent 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  box-shadow:0 0 40px rgba(212,165,72,0.2);
  animation:logoGlow 2.5s ease-in-out infinite;
}
.stake-pot-val{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--gold);line-height:1}
.stake-pot-label{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:3px;opacity:0.7}
.stake-breakdown{display:flex;gap:16px;align-items:center}
.stake-side{text-align:center}
.stake-side-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:3px}
.stake-side-coins{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--white)}
.stake-divider{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted)}
.stake-desc{font-size:14px;color:rgba(240,244,255,0.6);text-align:center;max-width:280px;line-height:1.6;font-weight:500}
.stake-bluff{
  font-size:11px;color:var(--gold);opacity:0.75;text-align:center;max-width:270px;line-height:1.5;
  border:1px dashed rgba(212,165,72,0.25);border-radius:8px;padding:10px 14px;
}
/* Bet overlay extras */
.bet-raise-counter{
  font-size:12px;font-weight:700;text-align:center;min-height:18px;color:var(--muted);letter-spacing:0.5px;
}
.bet-overpot{
  font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(212,165,72,0.7);text-align:center;
  border:1px solid rgba(212,165,72,0.2);border-radius:4px;padding:4px 10px;background:rgba(212,165,72,0.04);
}
.bet-btn.skip{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.03);color:var(--muted)}

/* ── PRE-REVEAL OVERLAY (before dice roll) ── */
.prereveal-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(160deg,#060d1e 0%,#0a1628 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:50;padding:16px;
}
.prv-ball-label{
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:5px;color:var(--muted);
}
.prv-reveal-row{
  display:flex;gap:10px;width:100%;justify-content:center;align-items:stretch;
}
.prv-card{
  flex:1;max-width:150px;border-radius:12px;border:2px solid;
  background:var(--card-bg);padding:12px 10px;text-align:center;
  animation:prvCardIn 0.4s cubic-bezier(0.34,1.4,0.64,1) both;
}
.prv-card.batter{border-color:var(--green)}
.prv-card.bowler{border-color:var(--red)}
@keyframes prvCardIn{0%{transform:scale(0.7) translateY(12px);opacity:0}100%{transform:none;opacity:1}}
.prv-card.bowler{animation-delay:0.1s}
.prv-role{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:4px}
.prv-rating{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);line-height:1}
.prv-pitch-bump{font-size:14px;color:#86efac;vertical-align:middle}
.prv-ovr{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;letter-spacing:1px}
.prv-ovr-label{font-size:7px;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:3px}
.prv-substats{display:flex;flex-direction:column;gap:2px;margin:4px 0}
.prv-sstat{display:flex;align-items:center;gap:3px}
.prv-sstat-key{font-size:7px;font-weight:700;color:var(--muted);min-width:20px;letter-spacing:0.3px}
.prv-sstat-bar{flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.prv-sstat-fill{height:100%;border-radius:2px}
.prv-sstat-val{font-size:7px;color:var(--muted);min-width:14px;text-align:right}
.prv-name{font-size:11px;font-weight:700;color:var(--white);line-height:1.3;margin:3px 0}
.prv-nick{font-size:9px;color:var(--muted);font-style:italic}
.prv-choice{
  margin-top:6px;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:700;
  display:inline-block;
}
.prv-card.batter .prv-choice{background:rgba(74,222,128,0.15);color:var(--green)}
.prv-card.bowler .prv-choice{background:rgba(230,57,70,0.15);color:var(--red)}
.prv-vs{
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);
}
.prv-matchup-banner{
  width:100%;max-width:310px;border-radius:10px;padding:10px 14px;text-align:center;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  animation:prvCardIn 0.4s 0.2s both;
}
.prv-matchup-label{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-bottom:4px}
.prv-matchup-val{
  font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;
}
.prv-matchup-val.pos{color:var(--green)}
.prv-matchup-val.neg{color:var(--red)}
.prv-matchup-val.neu{color:var(--muted)}
.prv-matchup-desc{font-size:10px;color:var(--muted);margin-top:2px}
.prv-power-row{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  animation:prvCardIn 0.3s 0.3s both;
}
.prv-power-badge{
  font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;
  border:1px solid rgba(212,165,72,0.4);background:rgba(212,165,72,0.1);color:var(--gold);
}
.prv-roll-btn{
  margin-top:4px;padding:14px 40px;
  background:linear-gradient(135deg,#e0b050,#c08828);
  color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:26px;
  letter-spacing:3px;border:none;cursor:pointer;border-radius:10px;
  box-shadow:0 4px 24px rgba(212,165,72,0.4);
  animation:rollBtnPulse 1.2s ease-in-out infinite, prvCardIn 0.5s 0.35s both;
  transition:transform 0.1s;
}
.prv-roll-btn:active{transform:scale(0.96)}
@keyframes rollBtnPulse{0%,100%{box-shadow:0 4px 24px rgba(212,165,72,0.4)}50%{box-shadow:0 4px 36px rgba(212,165,72,0.7)}}

/* ── Matrix hint strip in mid-HUD ── */
.matrix-hint{
  display:flex;gap:4px;margin-top:4px;
}
.mh-cell{
  flex:1;border-radius:5px;padding:4px 3px;text-align:center;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
}
.mh-label{font-size:8px;color:var(--muted);font-weight:600;letter-spacing:1px}
.mh-val{font-family:'Bebas Neue',sans-serif;font-size:15px;line-height:1}
.mh-val.pos{color:var(--green)}
.mh-val.neg{color:var(--red)}
.mh-val.neu{color:var(--muted)}

/* ── Played card - center result display ── */
.bcard.played{
  opacity:1;cursor:default;
  border-color:rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.02);
}
.bc-played-result-overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:4px;
}
.bc-played-emoji{font-size:20px;line-height:1}
.bc-played-label{
  font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;line-height:1;
}
.bc-played-label.SIX{color:var(--gold2)}
.bc-played-label.FOUR{color:var(--green)}
.bc-played-label.TWO,.bc-played-label.ONE{color:rgba(240,244,255,0.7)}
.bc-played-label.DOT{color:rgba(255,255,255,0.3)}
.bc-played-label.PRESSURE{color:var(--red)}
.bc-played-label.WICKET{color:var(--red)}
.bc-played-name{
  position:absolute;bottom:3px;left:0;right:0;
  font-size:6.5px;color:var(--muted);font-weight:700;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 3px;
}

/* ── Result screen — redesigned card-first layout ── */
.res-card-row{
  display:flex;gap:8px;width:100%;max-width:360px;align-items:stretch;
}
.res-player-card{
  flex:1;border-radius:12px;border:2px solid;
  background:var(--card-bg);padding:10px 9px 8px;
  display:flex;flex-direction:column;gap:3px;
}
.res-player-card.batter{border-color:rgba(74,222,128,0.5)}
.res-player-card.bowler{border-color:rgba(230,57,70,0.5)}
.res-pc-role{font-size:8px;font-weight:700;letter-spacing:3px;color:var(--muted);margin-bottom:2px}
.res-pc-role.bat{color:rgba(74,222,128,0.8)}
.res-pc-role.bowl{color:rgba(230,57,70,0.8)}
.res-pc-name{font-size:11px;font-weight:700;color:var(--white);line-height:1.2}
.res-pc-rating{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);line-height:1}
.res-pc-special{
  font-size:7px;color:var(--navy);background:var(--gold);
  padding:1px 4px;border-radius:2px;font-weight:700;
  display:inline-block;width:fit-content;
}
.res-pc-action{
  margin-top:4px;padding:3px 6px;border-radius:4px;font-size:10px;font-weight:700;
  display:inline-block;
}
.res-player-card.batter .res-pc-action{background:rgba(74,222,128,0.15);color:var(--green)}
.res-player-card.bowler .res-pc-action{background:rgba(230,57,70,0.15);color:var(--red)}
.res-vs-col{
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);
  flex-shrink:0;
}
/* Dice visual */
.res-dice-visual{
  display:flex;align-items:center;gap:14px;margin:2px 0;
}
.res-die-visual{
  width:48px;height:48px;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px solid;gap:0;
}
.res-die-visual.bat{border-color:rgba(74,222,128,0.6);background:rgba(74,222,128,0.06)}
.res-die-visual.bowl{border-color:rgba(230,57,70,0.6);background:rgba(230,57,70,0.06)}
.res-die-num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--white)}
.res-die-mod{font-size:9px;font-weight:700;color:var(--gold)}
.res-arrow{font-size:20px;color:var(--muted);line-height:1}
.res-die-vs{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted)}
/* Outcome block */
.res-outcome-block{
  width:100%;max-width:340px;text-align:center;
}
.res-calc-line{
  font-size:13px;font-weight:700;color:rgba(240,244,255,0.7);margin-top:4px;
}
.res-thresh-line{
  font-size:11px;color:var(--muted);margin-top:2px;
}

/* ── Result screen power section ── */
.res-power-used{
  width:100%;max-width:340px;
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}
.res-power-badge{
  padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;
  border:1px solid rgba(212,165,72,0.4);background:rgba(212,165,72,0.1);color:var(--gold);
}

/* ── Ball tracker in result overlay ── */
.ball-tracker{display:flex;gap:8px;justify-content:center;margin-bottom:4px}
.bt-dot{font-size:18px;line-height:1}
.bt-dot.empty{color:rgba(255,255,255,0.15);font-size:14px}
.bt-dot.filled{filter:drop-shadow(0 0 4px rgba(255,255,255,0.3))}

/* ======= BUNDLE SELECT SCREEN ======= */
.bundle-screen{
  background:var(--navy);display:flex;flex-direction:column;overflow:hidden;
}
.bundle-header{
  background:linear-gradient(180deg,#060d1e,#0a1628);
  border-bottom:1px solid rgba(212,165,72,0.2);
  padding:12px 14px 8px;flex-shrink:0;
}
.bundle-header-top{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;
}
.bundle-title{
  font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:3px;
}
.bundle-pitch-tag{
  display:flex;align-items:center;gap:5px;
  background:rgba(212,165,72,0.08);border:1px solid rgba(212,165,72,0.25);
  border-radius:5px;padding:4px 9px;
}
.bundle-pitch-tag-icon{font-size:13px}
.bundle-pitch-tag-name{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:0.5px}
.bundle-subtitle{font-size:11px;color:var(--muted);font-weight:600}
/* Horizontal scroll row */
.bundle-scroll-wrap{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
}
.bundle-scroll-hint{
  font-size:9px;color:var(--muted);letter-spacing:2px;text-align:center;
  padding:5px 0 3px;flex-shrink:0;opacity:0.7;
}
.bundle-row-h{
  display:flex;flex-direction:row;gap:10px;
  overflow-x:auto;overflow-y:hidden;
  padding:8px 14px 10px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  flex:1;align-items:flex-start;
}
.bundle-row-h::-webkit-scrollbar{display:none}
/* Individual bundle card */
.bc-h{
  min-width:158px;width:158px;flex-shrink:0;
  scroll-snap-align:start;
  border-radius:14px;border:2px solid rgba(255,255,255,0.1);
  background:var(--card-bg);cursor:pointer;overflow:hidden;

// ================================================================

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function rollDie() { return Math.floor(Math.random()*6)+1; }

function applyDiceMod(roll) {
  // Symmetric: 1-2→-1, 3-4→0, 5-6→+1 (each exactly 1/3 probability)
  if(roll<=2)return -1;
  if(roll<=4)return 0;
  return 1;
}

function cloneCard(c) { return {...c, _anchorFired:false}; }

// ── OPTION B SUB-STATS (display only — does not affect formula) ──────────────
// Generates 4 deterministic sub-stats per card based on rating + special + type.
// Batter stats: PWR (power), TIM (timing), TEC (technique), SPL (special)
// Bowler stats: SPD (speed/flight), LNE (line/accuracy), VAR (variation), SPL
function getCardStats(card) {
  // Base from star rating: ★1→54 ★2→63 ★3→72 ★4→82 ★5→93
  const base = [0,54,63,72,82,93][card.rating] || 60;
  // Deterministic pseudo-random from card id (FNV-1a style)
  let h = 2166136261;
  for(let i=0;i<card.id.length;i++){ h ^= card.id.charCodeAt(i); h = (h*16777619)>>>0; }
  const rng = (n, range) => (((h ^ (h>>>n*5)) * (n*2654435769))>>>0) % range;
  const clamp = n => Math.max(30, Math.min(99, Math.round(n)));

  // Special bonuses to specific stat slots
  const B = {a:0,b:0,c:0,d:0};
  if(card.type === 'batter') {
    // a=PWR  b=TIM  c=TEC  d=SPL
    if(card.bigHitter)                                        { B.a+=8; }
    if(card.special==='bigHitter'||card.special==='rangeHitter') { B.a+=10; B.d+=6; }
    if(card.special==='anchor'||card.special==='wicketShield')   { B.b+=10; B.c+=6; }
    if(card.special==='steadyEddie')                             { B.b+=8; }
    if(card.special==='fastStarter'||card.special==='powerSurge'){ B.a+=7; B.d+=5; }
    if(card.special==='counterPunch'||card.special==='resilient'){ B.c+=8; B.d+=5; }
    if(card.special==='antiPace'||card.special==='antiSpin')     { B.c+=10; B.d+=8; }
    if(card.special==='underrated')                              { B.d+=14; }
    if(card.special==='finisher')                                { B.a+=6; B.d+=10; }
    if(card.special==='hookShot')                                { B.c+=10; }
    if(card.special==='tieWinner')                               { B.b+=8; B.d+=8; }
    if(card.special==='tailEnder')                               { B.a+=12; B.b-=8; B.d+=10; }
  } else {
    // a=SPD  b=LNE  c=VAR  d=SPL
    if(card.seamer)                                              { B.a+=5; }
    if(card.spinner)                                             { B.c+=5; }
    if(card.special==='deathBowler')                             { B.b+=10; B.d+=8; }
    if(card.special==='strikeFirst')                             { B.a+=8; B.d+=6; }
    if(card.special==='paceDemon')                               { B.a+=12; B.d+=8; }
    if(card.special==='unreadable')                              { B.c+=12; B.d+=10; }
    if(card.special==='googly'||card.special==='yorkerSpecialist'){ B.c+=10; B.d+=8; }
    if(card.special==='netBowler')                               { B.b+=10; }
    if(card.special==='luckyBreak'||card.special==='phoenix')    { B.d+=12; }
    if(card.special==='steadyBowler')                            { B.b+=10; }
    if(card.special==='underdog')                                { B.d+=14; }
  }

  return {
    a: clamp(base - 8 + rng(1,16) + B.a),
    b: clamp(base - 7 + rng(2,14) + B.b),
    c: clamp(base - 7 + rng(3,14) + B.c),
    d: clamp(base - 9 + rng(4,18) + B.d),
    ovr: clamp(Math.round((base + B.a*0.25 + B.b*0.1 + B.c*0.1 + B.d*0.1) * 0.95)),
    tier: card.rating>=5?'gold':card.rating>=4?'gold':card.rating>=3?'silver':'bronze',
  };
}
function getAvailableDeliveries(bowlerCard,inn) {
  const base=(bowlerCard&&bowlerCard.spinner)?SPIN_DELIVERIES:PACE_DELIVERIES;
  return base.filter(d=>{
    if(d==='Bouncer')   return inn.bouncerChips>0;
    if(d==='Yorker')    return (inn.deliveriesUsed['Yorker']   ||0)<2;
    if(d==='Googly')    return (inn.deliveriesUsed['Googly']   ||0)<2;
    if(d==='Doosra')    return (inn.deliveriesUsed['Doosra']   ||0)<2;
    if(d==='ShortBall') return (inn.deliveriesUsed['ShortBall']||0)<3;
    return true;
  });
}
function getAvailableShots(inn) {
  return SHOTS.filter(s=>{
    if(s==='Slog')         return (inn.shotsUsed['Slog']        ||0)<2;
    if(s==='ReverseScoop') return (inn.shotsUsed['ReverseScoop']||0)<2;
    return true;
  });
}

function getOvStr(balls) {
  const ov=Math.floor(balls/6);
  const b=balls%6;
  return `${ov}.${b}`;
}

function getMatchupMod(delivery, shot, pitch, homeGround, bowlerCard) {
  const bm=(bowlerCard&&bowlerCard.spinner)?SPIN_MATRIX:PACE_MATRIX;
  const base=JSON.parse(JSON.stringify(bm));
  const m=homeGround?base:pitch.bendMatrix(base);
  return (m[delivery]&&m[delivery][shot]!==undefined)?m[delivery][shot]:0;
}

// AMBIGUITY: applyPitchToCard applies pitch buffCard unless homeGround is active.
function applyPitchToCard(card, pitch, homeGround) {
  if(homeGround) return card;
  return pitch.buffCard(card);
}

// resolveBall — pure function, all inputs explicit
function resolveBall({ batterCard, shot, bowlerCard, delivery, batterDice, bowlerDice,
                       pitch, homeGround, overBall, prevOutcome, batterBallsPlayed,
                       prevShot, prevDelivery }) {
  // Modified ratings via pitch
  let bRating = applyPitchToCard({...batterCard}, pitch, homeGround).rating;
  let wRating = applyPitchToCard({...bowlerCard}, pitch, homeGround).rating;

  // Dice: steadyEddie/steadyBowler convert a 1 roll to 2
  let effectiveBDice = batterDice;
  let effectiveWDice = bowlerDice;
  if(batterCard.special==='steadyEddie' && batterDice===1) effectiveBDice=2;
  if(bowlerCard.special==='steadyBowler' && bowlerDice===1) effectiveWDice=2;

  // tailEnder: +3 on dice 6, but auto-dot on dice 1
  if(batterCard.special==='tailEnder' && batterDice===1) {
    return { outcome:'DOT', runs:0, isWicket:false, anchorSaved:false,
      batterTotal:0, bowlerTotal:0, difference:0, matchupMod:0,
      bDiceMod:0, wDiceMod:0, batterDice, bowlerDice, batterCard, bowlerCard,
      shot, delivery, batSpecial:0, bowlSpecial:0, bRating, wRating,
      commentary: pick(COMMENTARY.DOT), specialNote:'tail-ender flinched on 1!' };
  }

  // Matchup modifier (base)
  let effectiveDelivery = delivery;
  let matchupMod = getMatchupMod(delivery, shot, pitch, homeGround, bowlerCard);

  // ── BALANCE MECHANICS ────────────────────────────────────────────────────────
  let balanceNote = '';

  // 1. YORKER MISFIRE: bowler dice 1 → execution fails, slips to FullToss trajectory
  //    Real cricket: a missed Yorker often ends up a full-toss gift
  if(delivery==='Yorker' && bowlerDice===1) {
    effectiveDelivery = 'FullToss';
    matchupMod = getMatchupMod('FullToss', shot, pitch, homeGround, bowlerCard);
    balanceNote = '⚡ Yorker slipped — Full Toss!';
  }

  // 2. PATTERN READ: same shot as last ball → bowler "clocked" the tendency, -1
  //    Doesn't apply on ball 1 (no prevShot), or for defensive shots (GroundShot/Drive = smart repeat)
  let patternPenalty = 0;
  const aggressiveShots = ['Slog','StepDown','ReverseScoop','Pull'];
  if(prevShot && prevShot === shot && aggressiveShots.includes(shot)) {
    patternPenalty = -1;
    if(!balanceNote) balanceNote = '📖 Pattern read! −1';
  }

  // 3. FULLTOSS PUNISHMENT: If bowler deliberately bowls FullToss vs attacking shot,
  //    bowler pays an extra -1 (reflecting real risk of gift delivery)
  //    This is already handled by the matrix (+3 for Slog vs FullToss), but
  //    we add a further disincentive: FullToss vs any attacking shot gives bowler -1 extra
  //    so bowler is penalised doubly for choosing it — matching real cricket
  let ftPunish = 0;
  const attackingShots = ['Slog','StepDown','Pull','Drive'];
  if(delivery==='FullToss' && attackingShots.includes(shot) && effectiveDelivery!=='FullToss') {
    // Only for INTENTIONAL FullToss (not misfires — effectiveDelivery check skips misfires)
    ftPunish = 1; // batter gets +1 extra — the bowler "gifted" it
    if(!balanceNote) balanceNote = '🎁 Full Toss punished! +1';
  }
  // ─────────────────────────────────────────────────────────────────────────────

  const bDiceMod = applyDiceMod(effectiveBDice);
  const wDiceMod = applyDiceMod(effectiveWDice);

  let batSpecial=0, bowlSpecial=0, specialNote='';

  // ── BATTER SPECIALS ──
  if(batterCard.special==='hookShot' && (delivery==='Bouncer'||delivery==='ShortBall') && shot==='Pull') { batSpecial+=2; specialNote='Hook Shot! +2'; }
  if(batterCard.special==='bigHitter' && batterDice===6)                          { batSpecial+=2; specialNote='Big Hit! +2'; }
  if(batterCard.special==='fastStarter' && overBall<=3)                           { batSpecial+=2; specialNote='Fast Start!'; }
  if(batterCard.special==='powerSurge' && batterBallsPlayed<3)                   { batSpecial+=1; specialNote='Power Surge!'; }
  if(batterCard.special==='finisher' && overBall>=5)                              { batSpecial+=1; specialNote='Finisher!'; }
  if(batterCard.special==='tailEnder' && batterDice===6)                          { batSpecial+=3; specialNote='+3 on 6!'; }
  if(batterCard.special==='counterPunch' && prevOutcome==='WICKET')               { batSpecial+=1; specialNote='Counter Punch!'; }
  if(batterCard.special==='resilient' && (prevOutcome==='DOT'||prevOutcome==='PRESSURE'||prevOutcome==='WICKET')) { batSpecial+=1; specialNote='Resilient!'; }
  if(batterCard.special==='antiPace' && bowlerCard.seamer)                        { batSpecial+=2; specialNote='Anti-Pace!'; }
  if(batterCard.special==='antiSpin' && bowlerCard.spinner)                       { batSpecial+=2; specialNote='Anti-Spin!'; }
  if(batterCard.special==='underrated' && bowlerCard.rating>=3)                   { batSpecial+=2; specialNote='Underrated!'; }

  // ── BOWLER SPECIALS ──
  if(bowlerCard.special==='yorkerSpecialist' && delivery==='Yorker' && effectiveDelivery==='Yorker') { bowlSpecial+=1; }
  if(bowlerCard.special==='deathBowler' && overBall>=4)                           { bowlSpecial+=2; if(!specialNote)specialNote='Death Bowler!'; }
  if(bowlerCard.special==='strikeFirst' && overBall<=3)                           { bowlSpecial+=2; if(!specialNote)specialNote='Strike First!'; }
  if(bowlerCard.special==='unreadable')                                            { bowlSpecial+=1; if(!specialNote)specialNote='Unreadable!'; }
  if(bowlerCard.special==='paceDemon' && (bowlerDice===5||bowlerDice===6))        { bowlSpecial+=1; if(!specialNote)specialNote='Pace Demon!'; }
  if(bowlerCard.special==='netBowler' && batterCard.rating>=3)                    { bowlSpecial+=2; if(!specialNote)specialNote='Net Bowler!'; }
  if(bowlerCard.special==='underdog' && batterCard.rating>=5)                     { bowlSpecial+=3; if(!specialNote)specialNote='Underdog!'; }
  if(bowlerCard.special==='phoenix' && prevOutcome==='SIX')                       { bowlSpecial+=2; if(!specialNote)specialNote='Phoenix!'; }

  const batterTotal = bRating + matchupMod + batSpecial + bDiceMod + patternPenalty + ftPunish;
  const bowlerTotal = wRating + bowlSpecial + wDiceMod;
  const difference = batterTotal - bowlerTotal;

  let outcome, runs=0, isWicket=false;
  if(difference>=4){outcome='SIX';runs=6;}
  else if(difference>=2){outcome='FOUR';runs=4;}
  else if(difference>=1){outcome='TWO';runs=2;}
  else if(difference===0){outcome='ONE';runs=1;}
  else if(difference>=-2){outcome='DOT';runs=0;}
  else if(difference>=-3){outcome='PRESSURE';runs=0;}
  else{outcome='WICKET';runs=0;isWicket=true;}

  // tieWinner: diff=0 → TWO instead of ONE
  if(batterCard.special==='tieWinner' && difference===0) { outcome='TWO'; runs=2; if(!specialNote)specialNote='Tie Winner!'; }

  // googly: ties vs low-rated batters → wicket
  if(bowlerCard.special==='googly' && difference===0 && batterCard.rating<=2) { outcome='WICKET'; runs=0; isWicket=true; if(!specialNote)specialNote='Googly!'; }

  // luckyBreak: on bowlerDice=6 → auto-wicket (only if not already worse for bowler)
  if(bowlerCard.special==='luckyBreak' && bowlerDice===6 && !isWicket) { outcome='WICKET'; runs=0; isWicket=true; if(!specialNote)specialNote='Lucky Break!'; }

  // rangeHitter: SIX → 7 runs
  if(batterCard.special==='rangeHitter' && outcome==='SIX') { runs=7; if(!specialNote)specialNote='7 Run Six!'; }

  // Anchor: absorbs first wicket for this card → DOT instead
  let anchorSaved=false;
  if(isWicket && (batterCard.special==='anchor'||batterCard.special==='wicketShield') && !batterCard._anchorFired){
    outcome='DOT'; isWicket=false; anchorSaved=true; specialNote='Anchor saved!';
  }

  // nightwatchman: cannot be dismissed on first ball ever played by this card
  if(isWicket && batterCard.special==='nightwatchman' && batterBallsPlayed===0) {
    outcome='DOT'; isWicket=false; anchorSaved=true; specialNote='Nightwatchman holds!';
  }

  const commentary = pick(COMMENTARY[outcome]);

  return {
    outcome, runs, isWicket, anchorSaved,
    batterTotal, bowlerTotal, difference,
    matchupMod, bDiceMod, wDiceMod, batterDice, bowlerDice,
    batterCard, bowlerCard, shot, delivery, effectiveDelivery, commentary,
    batSpecial, bowlSpecial, bRating, wRating, specialNote,
    balanceNote, patternPenalty, ftPunish,
  };
}

let G = null;

function newState() {
  return {
    phase: 'home',
    pitch: null,

    // Decks & hands (populated on deal)
    pBatDeck:[], pBatHand:[],
    pBowlDeck:[], pBowlHand:[],
    aiBatDeck:[], aiBatHand:[],
    aiBowlDeck:[], aiBowlHand:[],

    // Powers
    playerPower: null,
    playerPowerUsed: false,
    aiPower: null,
    aiPowerUsed: false,

    // Innings
    currentInnings: 1,
    inn1: { runs:0, wickets:0, balls:0, bouncerChips:2,
            deliveriesUsed:{}, shotsUsed:{},
            ballLog:[], batterBallsPlayed:0 },
    inn2: { runs:0, wickets:0, balls:0, bouncerChips:2,
            deliveriesUsed:{}, shotsUsed:{},
            ballLog:[], batterBallsPlayed:0 },

    // Current ball selections
    playerCard: null,
    playerChoice: null,
    playerPowerDeclared: false,
    captainCallActive: false,
    aiCard: null,
    aiChoice: null,
    aiPowerDeclared: false,

    // Dice & result
    batterDice: null,
    bowlerDice: null,
    lastResult: null,

    // Coins + betting
    coins: { player: 1000, ai: 1000 },
    overPot: 0,        // combined over stake pot
    overStakeAmt: 50,  // per player per innings
    ballSidePot: 0,    // active per-ball side pot
    coinLog: [],       // audit trail

    // UI helpers
    selectedPowerIdx: null,
    selectedBundle: null,   // id of chosen bundle
    // multiplayer
    mpMode: false,
    mpRoomCode: null,
    mpIsHost: false,
    mpLobbyMode: null,    // 'create' | 'join'
    mpJoinInput: '',
    mpStatus: '',
  };
}

function initGame() {
  G = newState();
  G.pitch = pick(PITCHES);
  G.aiPower = pick(POWERS);

  // Shuffle all decks
  // Player decks are built during bundle selection (bundleConfirm)
  // AI decks are built by aiPickBundle() during bundleConfirm
  // Pre-init empty so state is clean
  G.pBatDeck = []; G.pBowlDeck = [];
  G.aiBatDeck = []; G.aiBowlDeck = [];

  G.phase = 'pitchReveal';
  render();

  // Trigger flip after DOM painted
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const fi = document.querySelector('.flip-inner');
    if(fi) fi.classList.add('flipped');
    setTimeout(() => {
      const h = document.querySelector('.pitch-tap-hint');
      if(h) h.classList.add('show');
    }, 800);
  }));
}

function dealHands() {
  G.pBatHand  = G.pBatDeck.splice(0,6);
  G.aiBowlHand= G.aiBowlDeck.splice(0,6);
  G.pBowlHand = G.pBowlDeck.splice(0,6);
  G.aiBatHand = G.aiBatDeck.splice(0,6);
}

function getCurrentHands() {
  if(G.currentInnings===1) return { ph:G.pBatHand, ah:G.aiBowlHand };
  return { ph:G.pBowlHand, ah:G.aiBatHand };
}

function getCurrentInn() {
  return G.currentInnings===1 ? G.inn1 : G.inn2;
}

function refill(hand, deck) {
  while(hand.length<3 && deck.length>0) hand.push(deck.shift());
}

function refillAfterBall() { /* no-op — all 6 cards dealt upfront and marked played */ }

function removeCardFromHand(hand, cardId) {
  // Mark as played rather than removing, so all 6 remain visible
  const c = hand.find(c=>c.id===cardId);
  if(c) c._played = true;
}

function isInnOver(inn) {
  if(inn.balls>=6||inn.wickets>=3) return true;
  if(G&&G.currentInnings===2&&G.inn1&&inn.runs>=G.inn1.runs+1) return true;
  return false;
}

// ================================================================
// AI LOGIC (Medium difficulty)
// ================================================================
// AMBIGUITY: Medium AI picks strategically 60% of the time, randomly 40%.
// AMBIGUITY: AI always picks highest-rated available card 80% of the time.

function aiMakeDecision() {
  const isAIBatting=G.currentInnings===2;
  const hand=isAIBatting?G.aiBatHand:G.aiBowlHand;
  const inn=getCurrentInn();
  const strategic=Math.random()<0.6;
  // Card: 80% highest rated from unplayed
  const unplayed=hand.filter(c=>!c._played);
  let card;
  if(unplayed.length===0){card=pick(hand);}
  else if(Math.random()<0.8){card=unplayed.reduce((b,c)=>c.rating>b.rating?c:b,unplayed[0]);}
  else{card=pick(unplayed);}
  let choice;
  if(isAIBatting) {
    // Evaluate against player's bowler type (use player's selected card if available)
    const pBowler=G.playerCard||{spinner:false};
    const bm=pBowler.spinner?SPIN_MATRIX:PACE_MATRIX;
    const base=JSON.parse(JSON.stringify(bm));
    const m=G.pitch.bendMatrix(base);
    const deliveries=pBowler.spinner?SPIN_DELIVERIES:PACE_DELIVERIES;
    const avail=getAvailableShots(inn);
    if(strategic){
      let best=null,bestVal=-Infinity;
      for(const s of avail){
        const avg=deliveries.reduce((sum,d)=>sum+(m[d]?.[s]||0),0)/deliveries.length;
        if(avg>bestVal){bestVal=avg;best=s;}
      }
      const target=G.inn1.runs+1,needed=target-inn.runs,rem=6-inn.balls;
      if(needed>rem*3&&Math.random()<0.5&&avail.includes('Slog')) best='Slog';
      choice=best||pick(avail);
    } else {choice=pick(avail);}
  } else {
    const avail=getAvailableDeliveries(card,inn);
    const bm=card.spinner?SPIN_MATRIX:PACE_MATRIX;
    const base=JSON.parse(JSON.stringify(bm));
    const m=G.pitch.bendMatrix(base);
    const shots=getAvailableShots(inn);
    if(strategic){
      let best=null,bestVal=Infinity;
      for(const d of avail){
        const avg=shots.reduce((sum,s)=>sum+(m[d]?.[s]||0),0)/shots.length;
        if(avg<bestVal){bestVal=avg;best=d;}
      }
      choice=best||pick(avail);
    } else {choice=pick(avail);}
  }
  let aiPowerDeclared=false;
  if(!G.aiPowerUsed&&G.aiPower&&G.aiPower.id!=='captainsCall'&&Math.random()<0.15) aiPowerDeclared=true;
  return {card,choice,aiPowerDeclared};
}

window.advancePitch = function() {
  G.selectedBundle = null;
  G.phase = 'bundleSelect';
  render();
};

window.selectBundle = function(bundleId) {
  G.selectedBundle = bundleId;
  render();
};

window.bundleConfirm = function() {
  if(!G.selectedBundle) return;
  const bundle = BUNDLES.find(b => b.id === G.selectedBundle);
  if(!bundle) return;

  // Build player decks from bundle
  G.pBatDeck  = bundle.batIds.map(id  => cloneCard(BATTER_CARDS.find(c => c.id === id)));
  G.pBowlDeck = bundle.bowlIds.map(id => cloneCard(BOWLER_CARDS.find(c => c.id === id)));

  // AI picks the bundle best suited to the pitch (or counters player's choice)
  aiPickBundle();

  // Deal and transition
  G.phase = 'deal';
  render();
  setTimeout(() => {
    dealHands();
    const cards = [...document.querySelectorAll('.deal-mini')];
    cards.forEach((c, i) => setTimeout(() => c.classList.add('dealt'), i * 120));
    setTimeout(() => { G.phase = 'powerPick'; render(); }, cards.length * 120 + 800);
  }, 100);
};

function aiPickBundle() {
  // AI picks the bundle that fits the pitch best; avoid player's bundle
  const pitchId = G.pitch.id;
  const candidates = BUNDLES.filter(b => b.id !== G.selectedBundle);
  // Score by pitch fit
  let best = candidates.find(b => b.pitchFit.includes(pitchId));
  if(!best) best = candidates[Math.floor(Math.random() * candidates.length)];
  G.aiBatDeck  = best.batIds.map(id  => cloneCard(BATTER_CARDS.find(c => c.id === id)));
  G.aiBowlDeck = best.bowlIds.map(id => cloneCard(BOWLER_CARDS.find(c => c.id === id)));
}

window.confirmOverStake = function() {
  const amt = Math.min(G.overStakeAmt, G.coins.player, G.coins.ai);
  G.coins.player -= amt;
  G.coins.ai     -= amt;
  G.overPot       = amt * 2;
  G.phase = 'play';
  render();
};

window.selectCard = function(idx) {
  if(G.captainCallActive) return;
  const isPlayerBatting = G.currentInnings === 1;
  const activeCards = isPlayerBatting ? G.pBatHand : G.pBowlHand;
  if(idx>=activeCards.length) return;
  const c = activeCards[idx];
  if(c._played) return; // can't reselect played cards
  G.playerCard = c;
  render();
};

window.selectChoice = function(choice) {
  const isPlayerBatting=G.currentInnings===1;
  const inn=getCurrentInn();
  if(isPlayerBatting){
    if(choice==='Slog'         &&(inn.shotsUsed['Slog']        ||0)>=2) return;
    if(choice==='ReverseScoop' &&(inn.shotsUsed['ReverseScoop']||0)>=2) return;
  } else {
    if(choice==='Bouncer'  &&inn.bouncerChips<=0) return;
    if(choice==='Yorker'   &&(inn.deliveriesUsed['Yorker']   ||0)>=2) return;
    if(choice==='Googly'   &&(inn.deliveriesUsed['Googly']   ||0)>=2) return;
    if(choice==='Doosra'   &&(inn.deliveriesUsed['Doosra']   ||0)>=2) return;
    if(choice==='ShortBall'&&(inn.deliveriesUsed['ShortBall']||0)>=3) return;
  }
  G.playerChoice=choice;
  render();
};

window.declarePower = function() {
  if(G.playerPowerUsed || !G.playerPower) return;
  if(G.playerPower.id==='captainsCall') {
    G.captainCallActive = !G.captainCallActive;
    render();
  } else {
    G.playerPowerDeclared = !G.playerPowerDeclared;
    render();
  }
};

window.captainSwap = function(idx) {
  if(!G.captainCallActive) return;
  const {ph} = getCurrentHands();
  const deck = G.currentInnings===1 ? G.pBatDeck : G.pBowlDeck;
  if(deck.length===0) return;
  ph.splice(idx,1);
  ph.splice(idx,0,deck.shift());
  G.captainCallActive = false;
  G.playerPowerUsed = true;
  if(G.playerCard && !ph.includes(G.playerCard)) G.playerCard=null;
  render();
};

window.confirmPick = function() {
  if(!G.playerCard || !G.playerChoice) return;

  // AI makes decision
  const aiDec = aiMakeDecision();
  G.aiCard = aiDec.card;
  G.aiChoice = aiDec.choice;
  G.aiPowerDeclared = aiDec.aiPowerDeclared;

  // Handle HomeGround power
  const homeGround = (G.playerPower?.id==='homeGround' && G.playerPowerDeclared);
  if(homeGround) G.playerPowerUsed = true;

  _pendingHomeGround = homeGround;

  // Route through Teen Patti betting overlay (replaces old showPreReveal)
  showBettingOverlay();
};
