function getMatchupMod(delivery, shot, pitch, homeGround, bowlerCard) {
  const bm=(bowlerCard&&bowlerCard.spinner)?SPIN_MATRIX:PACE_MATRIX;
  const base=JSON.parse(JSON.stringify(bm));
  const m=homeGround?base:pitch.bendMatrix(base);
  return (m[delivery]&&m[delivery][shot]!==undefined)?m[delivery][shot]:0;
}

// AMBIGUITY: applyPitchToCard applies pitch buffCard unless homeGround is active.
function applyPitchToCard(card, pitch, homeGround) {
  if(homeGround) return card;
  return pitch.buffCard(card);
}

// resolveBall — pure function, all inputs explicit
function resolveBall({ batterCard, shot, bowlerCard, delivery, batterDice, bowlerDice,
                       pitch, homeGround, overBall, prevOutcome, batterBallsPlayed,
                       prevShot, prevDelivery }) {
  // Modified ratings via pitch
  let bRating = applyPitchToCard({...batterCard}, pitch, homeGround).rating;
  let wRating = applyPitchToCard({...bowlerCard}, pitch, homeGround).rating;

  // Dice: steadyEddie/steadyBowler convert a 1 roll to 2
  let effectiveBDice = batterDice;
  let effectiveWDice = bowlerDice;
  if(batterCard.special==='steadyEddie' && batterDice===1) effectiveBDice=2;
  if(bowlerCard.special==='steadyBowler' && bowlerDice===1) effectiveWDice=2;

  // tailEnder: +3 on dice 6, but auto-dot on dice 1
  if(batterCard.special==='tailEnder' && batterDice===1) {
    return { outcome:'DOT', runs:0, isWicket:false, anchorSaved:false,
      batterTotal:0, bowlerTotal:0, difference:0, matchupMod:0,
      bDiceMod:0, wDiceMod:0, batterDice, bowlerDice, batterCard, bowlerCard,
      shot, delivery, batSpecial:0, bowlSpecial:0, bRating, wRating,
      commentary: pick(COMMENTARY.DOT), specialNote:'tail-ender flinched on 1!' };
  }

  // Matchup modifier (base)
  let effectiveDelivery = delivery;
  let matchupMod = getMatchupMod(delivery, shot, pitch, homeGround, bowlerCard);

  // ── BALANCE MECHANICS ────────────────────────────────────────────────────────
  let balanceNote = '';

  // 1. YORKER MISFIRE: bowler dice 1 → execution fails, slips to FullToss trajectory
  //    Real cricket: a missed Yorker often ends up a full-toss gift
  if(delivery==='Yorker' && bowlerDice===1) {
    effectiveDelivery = 'FullToss';
    matchupMod = getMatchupMod('FullToss', shot, pitch, homeGround, bowlerCard);
    balanceNote = '⚡ Yorker slipped — Full Toss!';
  }

  // 2. PATTERN READ: same shot as last ball → bowler "clocked" the tendency, -1
  //    Doesn't apply on ball 1 (no prevShot), or for defensive shots (GroundShot/Drive = smart repeat)
  let patternPenalty = 0;
  const aggressiveShots = ['Slog','StepDown','ReverseScoop','Pull'];
  if(prevShot && prevShot === shot && aggressiveShots.includes(shot)) {
    patternPenalty = -1;
    if(!balanceNote) balanceNote = '📖 Pattern read! −1';
  }

  // 3. FULLTOSS PUNISHMENT: If bowler deliberately bowls FullToss vs attacking shot,
  //    bowler pays an extra -1 (reflecting real risk of gift delivery)
  //    This is already handled by the matrix (+3 for Slog vs FullToss), but
  //    we add a further disincentive: FullToss vs any attacking shot gives bowler -1 extra
  //    so bowler is penalised doubly for choosing it — matching real cricket
  let ftPunish = 0;
  const attackingShots = ['Slog','StepDown','Pull','Drive'];
  if(delivery==='FullToss' && attackingShots.includes(shot) && effectiveDelivery!=='FullToss') {
    // Only for INTENTIONAL FullToss (not misfires — effectiveDelivery check skips misfires)
    ftPunish = 1; // batter gets +1 extra — the bowler "gifted" it
    if(!balanceNote) balanceNote = '🎁 Full Toss punished! +1';
  }
  // ─────────────────────────────────────────────────────────────────────────────

  const bDiceMod = applyDiceMod(effectiveBDice);
  const wDiceMod = applyDiceMod(effectiveWDice);

  let batSpecial=0, bowlSpecial=0, specialNote='';

  // ── BATTER SPECIALS ──
  if(batterCard.special==='hookShot' && (delivery==='Bouncer'||delivery==='ShortBall') && shot==='Pull') { batSpecial+=2; specialNote='Hook Shot! +2'; }
  if(batterCard.special==='bigHitter' && batterDice===6)                          { batSpecial+=2; specialNote='Big Hit! +2'; }
  if(batterCard.special==='fastStarter' && overBall<=3)                           { batSpecial+=2; specialNote='Fast Start!'; }
  if(batterCard.special==='powerSurge' && batterBallsPlayed<3)                   { batSpecial+=1; specialNote='Power Surge!'; }
  if(batterCard.special==='finisher' && overBall>=5)                              { batSpecial+=1; specialNote='Finisher!'; }
  if(batterCard.special==='tailEnder' && batterDice===6)                          { batSpecial+=3; specialNote='+3 on 6!'; }
  if(batterCard.special==='counterPunch' && prevOutcome==='WICKET')               { batSpecial+=1; specialNote='Counter Punch!'; }
  if(batterCard.special==='resilient' && (prevOutcome==='DOT'||prevOutcome==='PRESSURE'||prevOutcome==='WICKET')) { batSpecial+=1; specialNote='Resilient!'; }
  if(batterCard.special==='antiPace' && bowlerCard.seamer)                        { batSpecial+=2; specialNote='Anti-Pace!'; }
  if(batterCard.special==='antiSpin' && bowlerCard.spinner)                       { batSpecial+=2; specialNote='Anti-Spin!'; }
  if(batterCard.special==='underrated' && bowlerCard.rating>=3)                   { batSpecial+=2; specialNote='Underrated!'; }

  // ── BOWLER SPECIALS ──
  if(bowlerCard.special==='yorkerSpecialist' && delivery==='Yorker' && effectiveDelivery==='Yorker') { bowlSpecial+=1; }
  if(bowlerCard.special==='deathBowler' && overBall>=4)                           { bowlSpecial+=2; if(!specialNote)specialNote='Death Bowler!'; }
  if(bowlerCard.special==='strikeFirst' && overBall<=3)                           { bowlSpecial+=2; if(!specialNote)specialNote='Strike First!'; }
  if(bowlerCard.special==='unreadable')                                            { bowlSpecial+=1; if(!specialNote)specialNote='Unreadable!'; }
  if(bowlerCard.special==='paceDemon' && (bowlerDice===5||bowlerDice===6))        { bowlSpecial+=1; if(!specialNote)specialNote='Pace Demon!'; }
  if(bowlerCard.special==='netBowler' && batterCard.rating>=3)                    { bowlSpecial+=2; if(!specialNote)specialNote='Net Bowler!'; }
  if(bowlerCard.special==='underdog' && batterCard.rating>=5)                     { bowlSpecial+=3; if(!specialNote)specialNote='Underdog!'; }
  if(bowlerCard.special==='phoenix' && prevOutcome==='SIX')                       { bowlSpecial+=2; if(!specialNote)specialNote='Phoenix!'; }

  const batterTotal = bRating + matchupMod + batSpecial + bDiceMod + patternPenalty + ftPunish;
  const bowlerTotal = wRating + bowlSpecial + wDiceMod;
  const difference = batterTotal - bowlerTotal;

  let outcome, runs=0, isWicket=false;
  if(difference>=4){outcome='SIX';runs=6;}
  else if(difference>=2){outcome='FOUR';runs=4;}
  else if(difference>=1){outcome='TWO';runs=2;}
  else if(difference===0){outcome='ONE';runs=1;}
  else if(difference>=-2){outcome='DOT';runs=0;}
  else if(difference>=-3){outcome='PRESSURE';runs=0;}
  else{outcome='WICKET';runs=0;isWicket=true;}

  // tieWinner: diff=0 → TWO instead of ONE
  if(batterCard.special==='tieWinner' && difference===0) { outcome='TWO'; runs=2; if(!specialNote)specialNote='Tie Winner!'; }

  // googly: ties vs low-rated batters → wicket
  if(bowlerCard.special==='googly' && difference===0 && batterCard.rating<=2) { outcome='WICKET'; runs=0; isWicket=true; if(!specialNote)specialNote='Googly!'; }

  // luckyBreak: on bowlerDice=6 → auto-wicket (only if not already worse for bowler)
  if(bowlerCard.special==='luckyBreak' && bowlerDice===6 && !isWicket) { outcome='WICKET'; runs=0; isWicket=true; if(!specialNote)specialNote='Lucky Break!'; }

  // rangeHitter: SIX → 7 runs
  if(batterCard.special==='rangeHitter' && outcome==='SIX') { runs=7; if(!specialNote)specialNote='7 Run Six!'; }

  // Anchor: absorbs first wicket for this card → DOT instead
  let anchorSaved=false;
  if(isWicket && (batterCard.special==='anchor'||batterCard.special==='wicketShield') && !batterCard._anchorFired){
    outcome='DOT'; isWicket=false; anchorSaved=true; specialNote='Anchor saved!';
  }

  // nightwatchman: cannot be dismissed on first ball ever played by this card
  if(isWicket && batterCard.special==='nightwatchman' && batterBallsPlayed===0) {
    outcome='DOT'; isWicket=false; anchorSaved=true; specialNote='Nightwatchman holds!';
  }

  const commentary = pick(COMMENTARY[outcome]);

  return {
    outcome, runs, isWicket, anchorSaved,
    batterTotal, bowlerTotal, difference,
    matchupMod, bDiceMod, wDiceMod, batterDice, bowlerDice,
    batterCard, bowlerCard, shot, delivery, effectiveDelivery, commentary,
    batSpecial, bowlSpecial, bRating, wRating, specialNote,
    balanceNote, patternPenalty, ftPunish,
  };
}

// Host always bats inn1, guest always bats inn2

  if(!G.mpMode) return G.currentInnings === 1;
  return G.mpIsHost ? (G.currentInnings === 1) : (G.currentInnings === 2);
}

  G = newState();

  // Shuffle all decks

  // AI decks are built by aiPickBundle() during bundleConfirm

function dealHands() {
  G.pBatHand  = G.pBatDeck.splice(0,6);
  G.aiBowlHand= G.aiBowlDeck.splice(0,6);
  G.pBowlHand = G.pBowlDeck.splice(0,6);

function getCurrentHands() {
  const batting = playerIsBatting();
  if(batting) return { ph:G.pBatHand, ah:G.aiBowlHand };
  return { ph:G.pBowlHand, ah:G.aiBatHand };
}

function getCurrentInn() {
  return G.currentInnings===1 ? G.inn1 : G.inn2;
}

function refill(hand, deck) {
  while(hand.length<3 && deck.length>0) hand.push(deck.shift());
}

function refillAfterBall() { /* no-op — all 6 cards dealt upfront and marked played */ }

function removeCardFromHand(hand, cardId) {
  // Mark as played rather than removing, so all 6 remain visible
  const c = hand.find(c=>c.id===cardId);
  if(c) c._played = true;
}

function isInnOver(inn) {
  if(inn.balls>=6||inn.wickets>=3) return true;
  if(G&&G.currentInnings===2&&G.inn1&&inn.runs>=G.inn1.runs+1) return true;
  return false;
}

// ================================================================
// AI LOGIC (Medium difficulty)
// ================================================================
// AMBIGUITY: Medium AI picks strategically 60% of the time, randomly 40%.
// AMBIGUITY: AI always picks highest-rated available card 80% of the time.

function aiMakeDecision() {
  const isAIBatting=G.currentInnings===2;
  const hand=isAIBatting?G.aiBatHand:G.aiBowlHand;
  const inn=getCurrentInn();
  const strategic=Math.random()<0.6;
  // Card: 80% highest rated from unplayed
  const unplayed=hand.filter(c=>!c._played);
  let card;
  if(unplayed.length===0){card=pick(hand);}
  else if(Math.random()<0.8){card=unplayed.reduce((b,c)=>c.rating>b.rating?c:b,unplayed[0]);}
  else{card=pick(unplayed);}
  let choice;
  if(isAIBatting) {
    // Evaluate against player's bowler type (use player's selected card if available)
    const pBowler=G.playerCard||{spinner:false};
    const bm=pBowler.spinner?SPIN_MATRIX:PACE_MATRIX;
    const base=JSON.parse(JSON.stringify(bm));
    const m=G.pitch.bendMatrix(base);
    const deliveries=pBowler.spinner?SPIN_DELIVERIES:PACE_DELIVERIES;
    const avail=getAvailableShots(inn);
    if(strategic){
      let best=null,bestVal=-Infinity;
      for(const s of avail){
        const avg=deliveries.reduce((sum,d)=>sum+(m[d]?.[s]||0),0)/deliveries.length;
        if(avg>bestVal){bestVal=avg;best=s;}
      }
      const target=G.inn1.runs+1,needed=target-inn.runs,rem=6-inn.balls;
      if(needed>rem*3&&Math.random()<0.5&&avail.includes('Slog')) best='Slog';
      choice=best||pick(avail);
    } else {choice=pick(avail);}
  } else {
    const avail=getAvailableDeliveries(card,inn);
    const bm=card.spinner?SPIN_MATRIX:PACE_MATRIX;
    const base=JSON.parse(JSON.stringify(bm));
    const m=G.pitch.bendMatrix(base);
    const shots=getAvailableShots(inn);

    // Shot pattern counter — detect if player used same aggressive shot 2+ times
    const aggressiveShots = ['Slog','StepDown','ReverseScoop','Pull'];
    const lastTwo = inn.ballLog.slice(-2).map(b => b.shot);
    const repeatedShot = (lastTwo.length === 2 && lastTwo[0] === lastTwo[1]) ? lastTwo[0] : null;
    const counterMap = { Slog:'Yorker', StepDown:'FullToss', ReverseScoop:'Bouncer', Pull:'Bouncer' };
    const counterDelivery = repeatedShot && aggressiveShots.includes(repeatedShot) ? counterMap[repeatedShot] : null;

    if(counterDelivery && avail.includes(counterDelivery) && Math.random() < 0.72) {
      // AI counters the pattern — smart adjustment
      choice = counterDelivery;
    } else if(strategic){
      let best=null,bestVal=Infinity;
      for(const d of avail){
        const avg=shots.reduce((sum,s)=>sum+(m[d]?.[s]||0),0)/shots.length;
        if(avg<bestVal){bestVal=avg;best=d;}
      }
      choice=best||pick(avail);
    } else {choice=pick(avail);}
  }
  let aiPowerDeclared=false;
  if(!G.aiPowerUsed&&G.aiPower&&G.aiPower.id!=='captainsCall'&&Math.random()<0.15) aiPowerDeclared=true;
  return {card,choice,aiPowerDeclared};
}

window.bundleConfirm = function() {
  if(!G.selectedBundle) return;

  if(G.selectedBundle === 'random') {
    // Use the stored random IDs
    if(!G.randomBatIds || !G.randomBowlIds) return;
    G.pBatDeck  = G.randomBatIds.map(id  => cloneCard(BATTER_CARDS.find(c => c.id === id))).filter(Boolean);
    G.pBowlDeck = G.randomBowlIds.map(id => cloneCard(BOWLER_CARDS.find(c => c.id === id))).filter(Boolean);
  } else {
    const bundle = BUNDLES.find(b => b.id === G.selectedBundle);
    if(!bundle) return;
    G.pBatDeck  = bundle.batIds.map(id  => cloneCard(BATTER_CARDS.find(c => c.id === id)));
    G.pBowlDeck = bundle.bowlIds.map(id => cloneCard(BOWLER_CARDS.find(c => c.id === id)));
  }

  if(G.mpMode) {
    const myKey = G.mpIsHost ? 'bundleHost' : 'bundleGuest';
    const payload = G.selectedBundle === 'random'
      ? { batIds: G.randomBatIds, bowlIds: G.randomBowlIds }
      : G.selectedBundle;
    window._mpBundleSubmit(myKey, payload);
    G.phase = 'mpBundleWait';
    render();
    return;
  }

  // SP: AI picks bundle and proceed
  aiPickBundle();
  G.phase = 'deal';
  render();
  setTimeout(() => {
    dealHands();
    const cards = [...document.querySelectorAll('.deal-mini')];
    cards.forEach((c, i) => setTimeout(() => c.classList.add('dealt'), i * 120));
    G.playerPower = pick(POWERS);
    G.selectedPowerIdx = POWERS.indexOf(G.playerPower);
    setTimeout(() => { G.phase = 'overStake'; render(); }, cards.length * 120 + 800);
  }, 100);
};

function aiPickBundle() {
  // Bot prefers its own signature bundle; fall back to pitch-fit or random
  const bot = G.opponent;
  if(bot && bot.preferredBundle) {
    const preferred = BUNDLES.find(b => b.id === bot.preferredBundle);
    if(preferred) {
      G.aiBatDeck  = preferred.batIds.map(id => cloneCard(BATTER_CARDS.find(c => c.id === id)));
      G.aiBowlDeck = preferred.bowlIds.map(id => cloneCard(BOWLER_CARDS.find(c => c.id === id)));
      return;
    }
  }
  // Ghost or no preference: pick randomly
  const pitchId = G.pitch.id;
  const candidates = BUNDLES.filter(b => b.id !== G.selectedBundle);
  // Score by pitch fit
  let best = candidates.find(b => b.pitchFit.includes(pitchId));
  if(!best) best = candidates[Math.floor(Math.random() * candidates.length)];
  G.aiBatDeck  = best.batIds.map(id  => cloneCard(BATTER_CARDS.find(c => c.id === id)));
  G.aiBowlDeck = best.bowlIds.map(id => cloneCard(BOWLER_CARDS.find(c => c.id === id)));
}

window.confirmOverStake = function() {
  if(G.mpMode) {
    // MP: each player pays their own share; host writes initial ball node
    const amt = Math.min(G.overStakeAmt, G.coins.player);
    G.coins.player -= amt;
    G.overPot = amt; // guest's pot tracked separately server-side
    G.phase = 'play';
    render();
    if(G.mpIsHost) window._mpHostInitBall();
    else _startGuestMasterPoll(G.mpRoomCode);
    return;
  }
  const amt = Math.min(G.overStakeAmt, G.coins.player, G.coins.ai);
  G.coins.player -= amt;
  G.coins.ai     -= amt;
  G.overPot       = amt * 2;
  G.phase = 'play';
  render();
};

window.selectCard = function(idx) {

  const isPlayerBatting = playerIsBatting();
  const activeCards = isPlayerBatting ? G.pBatHand : G.pBowlHand;
  if(idx>=activeCards.length) return;
  const c = activeCards[idx];
  if(c._played) return;

window.selectChoice = function(choice) {
  const isPlayerBatting=playerIsBatting();
  const inn=getCurrentInn();
  if(isPlayerBatting){
    if(choice==='Slog'         &&(inn.shotsUsed['Slog']        ||0)>=2) return;
    if(choice==='ReverseScoop' &&(inn.shotsUsed['ReverseScoop']||0)>=2) return;
  } else {
    if(choice==='Bouncer'  &&inn.bouncerChips<=0) return;
    if(choice==='Yorker'   &&(inn.deliveriesUsed['Yorker']   ||0)>=2) return;
    if(choice==='Googly'   &&(inn.deliveriesUsed['Googly']   ||0)>=2) return;
    if(choice==='Doosra'   &&(inn.deliveriesUsed['Doosra']   ||0)>=2) return;

window.captainSwap = function(idx) {
  if(!G.captainCallActive) return;
  const {ph} = getCurrentHands();
  const deck = playerIsBatting() ? G.pBatDeck : G.pBowlDeck;
  if(deck.length===0) return;
  ph.splice(idx,1);
  ph.splice(idx,0,deck.shift());
  G.captainCallActive = false;
  G.playerPowerUsed = true;
  if(G.playerCard && !ph.includes(G.playerCard)) G.playerCard=null;

// ──────────────────────────────────────────────
// COIN BETTING — per-ball side bets
// ──────────────────────────────────────────────
let _pendingHomeGround = false;
let _pendingBet = null;
let _pendingRaise = 0;

function showBettingOverlay() {
  const homeGround=_pendingHomeGround;
  const isPlayerBatting=playerIsBatting();
  const batterCard=isPlayerBatting?G.playerCard:G.aiCard;
  const bowlerCard=isPlayerBatting?G.aiCard:G.playerCard;
  const shot      =isPlayerBatting?G.playerChoice:G.aiChoice;
  const delivery  =isPlayerBatting?G.aiChoice:G.playerChoice;
  const inn=getCurrentInn();
  _pendingRaise=0;
  const matchMod=getMatchupMod(delivery,shot,G.pitch,homeGround,bowlerCard);
  const modStr=matchMod>0?`+${matchMod}`:String(matchMod);
  const modCls=matchMod>0?'pos':matchMod<0?'neg':'neu';
  const modDesc=matchMod>0?'Batter edge':matchMod<0?'Bowler edge':'Neutral';
  const ballNum=inn.balls+1;
  // BUG 2 FIX: show pitch-buffed ratings, not raw base ratings
  const buffedBat  = applyPitchToCard({...batterCard},  G.pitch, homeGround);
  const buffedBowl = applyPitchToCard({...bowlerCard}, G.pitch, homeGround);
  const batRatingStr  = buffedBat.rating  !== batterCard.rating  ? `★${buffedBat.rating}<span class="prv-pitch-bump"> (+1⛰)</span>` : `★${batterCard.rating}`;

window.playerBet = function(action) {
  if(action==='raise') {
    _pendingRaise+=10;
    const se=document.getElementById('bet-side-val'); if(se)se.textContent=_pendingRaise;
    const ce=document.getElementById('bet-raise-counter');
    if(ce){ce.style.color='var(--green)';ce.textContent=`Your raise: 🪙${_pendingRaise} — ${G.opponent?G.opponent.name.split(' ')[0]:'Opponent'} must call or fold`;}
    const rb=document.getElementById('bet-raise-btn');
    if(rb&&G.coins.player<_pendingRaise+10) rb.disabled=true;
    return;
  }
  const actEl=document.getElementById('bet-actions');
  if(actEl) actEl.querySelectorAll('button').forEach(b=>b.disabled=true);
  if(action==='skip'||_pendingRaise===0){_pendingBet=null;_closeBetAndResolve();return;}
  const raiseAmt=Math.min(_pendingRaise,G.coins.player);
  G.coins.player-=raiseAmt;
  _pendingBet={sideAmt:raiseAmt};
  const ce=document.getElementById('bet-raise-counter');
  if(ce){ce.className='bet-ai-response thinking';ce.textContent=getBotMsg('thinking');}
  setTimeout(()=>_aiRespondToRaise(raiseAmt),900);
};

function _aiRespondToRaise(raiseAmt) {
  const isPlayerBatting=playerIsBatting();
  const batterCard=isPlayerBatting?G.playerCard:G.aiCard;
  const bowlerCard=isPlayerBatting?G.aiCard:G.playerCard;
  const shot=isPlayerBatting?G.playerChoice:G.aiChoice;
  const delivery=isPlayerBatting?G.aiChoice:G.playerChoice;
  const matchMod=getMatchupMod(delivery,shot,G.pitch,_pendingHomeGround,bowlerCard);
  const expectedDiff=batterCard.rating+matchMod-bowlerCard.rating;
  const isAIBatting=!isPlayerBatting;

  // Base call probability from match position
  let callProb=isAIBatting
    ?(expectedDiff>=2?0.78:expectedDiff>=0?0.52:0.22)
    :(expectedDiff<=-2?0.78:expectedDiff<=0?0.52:0.22);

  // Adjust by bot betting personality
  const bot = G.opponent;
  if(bot) {
    if(bot.betStyle==='aggressive') callProb = Math.min(0.95, callProb + 0.30); // almost never folds
    else if(bot.betStyle==='conservative') callProb = Math.max(0.05, callProb - 0.30); // folds big raises
    else if(bot.betStyle==='random') callProb = Math.random(); // pure chaos
    else if(bot.betStyle==='bluffer') callProb = isAIBatting ? Math.min(0.9, callProb + 0.25) : callProb; // bluffs when batting
    else if(bot.betStyle==='erratic') callProb = Math.random() < 0.4 ? Math.random() : callProb; // occasionally erratic
    // 'calculated' keeps base prob unchanged
  }

  if(G.coins.ai<raiseAmt) callProb=0;
  const willCall=Math.random()<callProb;
  const ce=document.getElementById('bet-raise-counter');
  if(!willCall) {
    G.coins.player+=raiseAmt;
    G.coinLog.push({type:'bluff-success',ball:getCurrentInn().balls+1,inn:G.currentInnings,winner:'player',amount:0});
    if(ce){ce.className='bet-ai-response fold-resp';ce.textContent=getBotMsg('fold');}
    _pendingBet=null;
    setTimeout(_closeBetAndResolve,950);
  } else {
    const aiC=Math.min(raiseAmt,G.coins.ai);
    G.coins.ai-=aiC;
    G.ballSidePot=raiseAmt+aiC;
    _pendingBet={sideAmt:raiseAmt,aiAmt:aiC,total:G.ballSidePot};
    const se=document.getElementById('bet-side-val'); if(se)se.textContent=G.ballSidePot;
    if(ce){ce.className='bet-ai-response call-resp';ce.textContent=`${getBotMsg('call')} Side pot 🪙${G.ballSidePot}!`;}
    setTimeout(_closeBetAndResolve,950);
  }
}

function _closeBetAndResolve() {
  const ov=document.getElementById('bet-overlay');
  if(ov)ov.remove();
  runDiceAnimation(_pendingHomeGround);
}

function payoutBallSidePot(outcome) {
  if(!_pendingBet||!_pendingBet.total){_pendingBet=null;return;}
  const isPlayerBatting=playerIsBatting();
  const batterWins=['SIX','FOUR','TWO','ONE'].includes(outcome);
  const playerWins=isPlayerBatting?batterWins:!batterWins;
  const pot=_pendingBet.total;
  if(playerWins){G.coins.player+=pot;}else{G.coins.ai+=pot;}
  G.coinLog.push({type:'side-ball',ball:getCurrentInn().balls,inn:G.currentInnings,outcome,winner:playerWins?'player':'ai',amount:pot});
  G.ballSidePot=0;_pendingBet=null;
}

function settleOverPot() {
  if(!G.overPot) return;
  let playerWins;
  if(G.currentInnings===1){
    // After inn1 — batter's over pot goes to whoever scored more runs (player wins if they batted)
    playerWins = playerIsBatting(); // host batted inn1 → host wins inn1 over pot
  } else {
    // Inn2 — whoever is batting tries to chase; bowler wins if not reached
    const inn2batting = playerIsBatting(); // guest bats inn2
    const chaseSucceeded = G.inn2.runs >= G.inn1.runs + 1;
    playerWins = inn2batting ? chaseSucceeded : !chaseSucceeded;
  }
  if(playerWins){G.coins.player+=G.overPot;}else{G.coins.ai+=G.overPot;}
  G.coinLog.push({type:'over-settle',inn:G.currentInnings,winner:playerWins?'player':'ai',amount:G.overPot});
  G.overPot=0;
}

    const rerollBowler = (isPlayerBatting && playerDRS) || (!isPlayerBatting && aiDRS);

    } else {

        finalizeBall(bDice, wDice, batterCard, bowlerCard, shot, delivery, homeGround);
      }, 400);
    }
  }, 1000);
}

function finalizeBall(bDice, wDice, batterCard, bowlerCard, shot, delivery, homeGround) {
  try {
  const inn = getCurrentInn();
  const overBall = (inn.balls % 6) + 1;
  const prevOutcome = inn.ballLog.length > 0 ? inn.ballLog[inn.ballLog.length-1].outcome : null;
  const prevShot    = inn.ballLog.length > 0 ? inn.ballLog[inn.ballLog.length-1].shot : null;
  const prevDelivery= inn.ballLog.length > 0 ? inn.ballLog[inn.ballLog.length-1].delivery : null;
  const batterBallsPlayed = inn.batterBallsPlayed || 0;
  const isPlayerBatting = playerIsBatting(); // host bats inn1, guest bats inn2
  if(batterCard.special==='extraDie') {
    const extra = rollDie();
    if(extra > bDice) bDice = extra;
  }
  if(bowlerCard.special==='extraDie') {
    const extra = rollDie();
    if(extra > wDice) wDice = extra;
  }

  // Power: POWER SURGE — double batter die modifier when batting
  let powerSurgeMod = 0;
  if(G.playerPower?.id==='powerPlay' && G.playerPowerDeclared && !G.playerPowerUsed && isPlayerBatting) {
    powerSurgeMod = 1; // signal to double via extra batter dice
    G.playerPowerUsed = true;
  }
  // Power: DEATH TRAP — double bowler die modifier when bowling
  let deathTrapMod = 0;
  if(G.playerPower?.id==='deathBowling' && G.playerPowerDeclared && !G.playerPowerUsed && !isPlayerBatting) {
    deathTrapMod = 1;
    G.playerPowerUsed = true;
  }

  const result = resolveBall({
    batterCard, shot, bowlerCard, delivery,
    batterDice: bDice, bowlerDice: wDice,
    pitch: G.pitch, homeGround,
    overBall, prevOutcome, batterBallsPlayed,
    prevShot, prevDelivery,
    powerSurgeMod, deathTrapMod,
  });

  // Power: MAX MAXIMUM — SIX → 9 runs + auto win side pot
  if(G.playerPower?.id==='megaSix' && G.playerPowerDeclared && !G.playerPowerUsed && isPlayerBatting) {
    if(result.outcome === 'SIX') {
      result.runs = 9;
      result.megaSixFired = true;
      G.playerPowerUsed = true;
    }
  }

  // Capture powers used this ball (before state reset)
  result.playerPowerThisBall = (G.playerPowerDeclared && G.playerPower && G.playerPower.id!=='captainsCall')
    ? G.playerPower : null;
  result.aiPowerThisBall = (G.aiPowerDeclared && G.aiPower && G.aiPower.id!=='captainsCall')
    ? G.aiPower : null;

  // Mark anchor / nightwatchman if it fired
  if(result.anchorSaved) batterCard._anchorFired = true;

  // Track delivery/shot usage
  inn.deliveriesUsed[delivery] = (inn.deliveriesUsed[delivery]||0)+1;
  inn.shotsUsed[shot] = (inn.shotsUsed[shot]||0)+1;

  // Update bouncer chips
  if(delivery==='Bouncer') inn.bouncerChips = Math.max(0, inn.bouncerChips-1);

  // Update innings stats
  inn.runs += result.runs;
  if(result.isWicket) inn.wickets++;
  inn.balls++;
  inn.batterBallsPlayed = (inn.batterBallsPlayed||0) + 1;

  // Log this ball — include shot/delivery for pattern read system
  inn.ballLog.push({ ball: inn.balls, outcome: result.outcome, runs: result.runs,
                     shot: result.shot, delivery: result.delivery });

  // Remove played cards from hands (marks _played=true, stores outcome)
  const pCard = G.playerCard, aCard = G.aiCard;
  removeCardFromHand(isPlayerBatting ? G.pBatHand : G.pBowlHand, pCard.id);
  removeCardFromHand(isPlayerBatting ? G.aiBowlHand : G.aiBatHand, aCard.id);
  // Store outcome on the played card for visual feedback
  const pHandRef = (isPlayerBatting ? G.pBatHand : G.pBowlHand).find(c=>c.id===pCard.id);
  if(pHandRef) pHandRef._playedOutcome = result.outcome;

  // Reset per-ball selections
  G.playerCard = null;
  G.playerChoice = null;
  G.playerPowerDeclared = false;
  G.captainCallActive = false;
  G.aiCard = null;
  G.aiChoice = null;
  G.aiPowerDeclared = false;
  G.lastResult = result;
  G.batterDice = bDice;
  G.bowlerDice = wDice;

  // Show result overlay
  const diceOv = document.getElementById('dice-overlay');
  if(diceOv) diceOv.remove();

  // Settle per-ball side pot
  payoutBallSidePot(result.outcome);
  // MAX MAXIMUM: auto-win full side pot on SIX
  if(result.megaSixFired && _pendingBet && _pendingBet.total) {
    G.coins.player += _pendingBet.total; _pendingBet = null; G.ballSidePot = 0;
  }

  showResultOverlay(result);
  } catch(err) {
    console.error('finalizeBall error:', err);
    // Remove any stale overlays and return to play
    ['dice-overlay','bet-overlay','result-overlay'].forEach(id=>{const e=document.getElementById(id);if(e)e.remove();});
    G.playerCard=null; G.playerChoice=null;
    render();
  }
}

function buildBallTracker(inn) {
  const icons = { SIX:'🟡', FOUR:'🟢', TWO:'⚪', ONE:'⚪', DOT:'⚫', PRESSURE:'🔴', WICKET:'💀' };
  const dots = [];
  for(let i=0;i<6;i++) {
    const logged = inn.ballLog[i];
    if(logged) {
      dots.push(`<div class="bt-dot filled" title="${logged.outcome}">${icons[logged.outcome]||'⚪'}</div>`);
    } else {
      dots.push(`<div class="bt-dot empty">○</div>`);
    }
  }
  return `<div class="ball-tracker">${dots.join('')}</div>`;
}

function buildResultHTML(result) {
  const outLabels = {
    SIX:'SIX!', FOUR:'FOUR!', TWO:'2 RUNS', ONE:'1 RUN',
    DOT:'DOT BALL', PRESSURE:'PRESSURE!', WICKET:'WICKET!'
  };

  const isPlayerBatting = playerIsBatting();
  const inn = getCurrentInn();
  const oppLabel = G.mpMode ? 'OPP' : (G.opponent ? G.opponent.name.split(' ')[0] : 'OPP');
  const batterOwner = isPlayerBatting ? 'YOU' : oppLabel;
  const bowlerOwner = isPlayerBatting ? oppLabel : 'YOU';

  const bDiceMod = result.bDiceMod;
  const wDiceMod = result.wDiceMod;
  const fmtMod = v => v > 0 ? `+${v}` : v < 0 ? `${v}` : '±0';
  const bDiceStr = fmtMod(bDiceMod);
  const wDiceStr = fmtMod(wDiceMod);
  const matchModStr = result.matchupMod >= 0 ? `+${result.matchupMod}` : String(result.matchupMod);
  const diffSign = result.difference >= 0 ? '+' : '';

  let thresholdDesc;
  const d = result.difference;
  if(d>=4)       thresholdDesc = `${diffSign}${d} ≥ +4 → SIX 🏏`;
  else if(d>=2)  thresholdDesc = `${diffSign}${d} ≥ +2 → FOUR 🔥`;
  else if(d>=1)  thresholdDesc = `${diffSign}${d} ≥ +1 → 2 Runs`;
  else if(d===0) thresholdDesc = `0 = 0 → 1 Run`;
  else if(d>=-2) thresholdDesc = `${d} ≥ −2 → Dot Ball`;
  else if(d>=-3) thresholdDesc = `${d} ≥ −3 → Pressure`;
  else           thresholdDesc = `${d} < −3 → Wicket 💀`;

  const megaSixNote = result.megaSixFired
    ? `<div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:#f0c060;text-align:center;letter-spacing:2px;animation:resPop 0.4s both">🚀 MAX MAXIMUM FIRED! +9 RUNS!</div>` : '';
  const specialNote = (result.anchorSaved || result.specialNote)
    ? `<div class="res-special">${result.anchorSaved?'⚓':'⚡'} ${result.specialNote||'Saved!'}</div>`
    : '';

  // Balance mechanic note (pattern read, yorker misfire, etc.)
  const balanceNoteHTML = result.balanceNote
    ? `<div class="res-balance">${result.balanceNote}</div>`
    : '';

  // Power badges
  const powerBadges = [];
  if(result.playerPowerThisBall) powerBadges.push(`YOU: ${result.playerPowerThisBall.icon} ${result.playerPowerThisBall.name}`);
  if(result.aiPowerThisBall)     powerBadges.push(`AI: ${result.aiPowerThisBall.icon} ${result.aiPowerThisBall.name}`);
  const powerHTML = powerBadges.length
    ? `<div class="res-power-used">${powerBadges.map(b=>`<div class="res-power-badge">⚡ ${b}</div>`).join('')}</div>`
    : '';

  // Coin feedback
  const lastCoin = G.coinLog.length ? G.coinLog[G.coinLog.length-1] : null;
  let chipFeedbackHTML = '';
  if(lastCoin && lastCoin.type==='side-ball' && lastCoin.amount>0) {
    const won = lastCoin.winner==='player';
    chipFeedbackHTML = `<div style="font-size:10px;font-weight:700;padding:3px 10px;border-radius:5px;
      background:${won?'rgba(74,222,128,0.1)':'rgba(230,57,70,0.08)'};
      border:1px solid ${won?'rgba(74,222,128,0.3)':'rgba(230,57,70,0.25)'};
      color:${won?'var(--green)':'var(--red)'};text-align:center">
      ${won?'🪙 Side pot WON':'🪙 Side pot LOST'} (${lastCoin.amount}) — You: 🪙${G.coins.player} AI: 🪙${G.coins.ai}
    </div>`;
  }

  // Star display helper
  const ovrStr = (card, ratingUsed) => {
    const st = getCardStats(card);
    const col = st.tier==='gold'?'#f0c060':st.tier==='silver'?'#c8d0dc':'#a07840';
    const bump = ratingUsed !== card.rating ? ` <span style="font-size:9px;color:#86efac">⛰+1</span>` : '';
    return `<span style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:${col}">${st.ovr}</span><span style="font-size:8px;color:var(--muted);font-weight:700;margin-left:2px">OVR</span>${bump}`;
  };

  // Bat special label
  const batSpecialLabel = result.batSpecial > 0 && result.batterCard.special
    ? SPECIAL_LABELS[result.batterCard.special] || result.batterCard.special
    : null;
  const bowlSpecialLabel = result.bowlSpecial > 0 && result.bowlerCard.special
    ? SPECIAL_LABELS[result.bowlerCard.special] || result.bowlerCard.special
    : null;

  // Build detailed breakdown lines
  const effectiveDel = result.effectiveDelivery || result.delivery;
  const batOvr = getCardStats(result.batterCard).ovr;
  const bowlOvr = getCardStats(result.bowlerCard).ovr;
  const matchupLine = `${matchModStr} matchup (${dispName(effectiveDel)} vs ${dispName(result.shot)})`;

  const batBreakLines = [
    `★${result.bRating} card · ${batOvr} OVR = <b style="color:var(--green)">${result.bRating} pts</b>`,
    matchupLine,
    ...(result.batSpecial ? [`+${result.batSpecial} ${batSpecialLabel||'special'}`] : []),
    ...(result.patternPenalty ? [`${result.patternPenalty} pattern read`] : []),
    ...(result.ftPunish ? [`+${result.ftPunish} full toss bonus`] : []),
    `${bDiceStr} dice roll (${result.batterDice})`,
  ];
  const bowlBreakLines = [
    `★${result.wRating} card · ${bowlOvr} OVR = <b style="color:var(--red)">${result.wRating} pts</b>`,
    ...(result.bowlSpecial ? [`+${result.bowlSpecial} ${bowlSpecialLabel||'special'}`] : []),
    `${wDiceStr} dice roll (${result.bowlerDice})`,
  ];

  const tracker = buildBallTracker(inn);

  return `
    ${tracker}
    ${powerHTML}

    <!-- TWO CARD THUMBNAILS -->
    <div class="res-card-row">
      <div class="res-player-card batter">
        <div class="res-pc-role bat">🏏 ${batterOwner} — BATTER</div>
        <div class="res-pc-name">${result.batterCard.name}</div>
        <div class="res-pc-rating">${ovrStr(result.batterCard, result.bRating)}</div>
        ${batSpecialLabel ? `<div class="res-pc-special">${batSpecialLabel} +${result.batSpecial}</div>` : ''}
        <div class="res-pc-action">${dispName(result.shot)}</div>
      </div>
      <div class="res-vs-col">VS</div>
      <div class="res-player-card bowler">
        <div class="res-pc-role bowl">🎳 ${bowlerOwner} — BOWLER</div>
        <div class="res-pc-name">${result.bowlerCard.name}</div>
        <div class="res-pc-rating">${ovrStr(result.bowlerCard, result.wRating)}</div>
        ${bowlSpecialLabel ? `<div class="res-pc-special">${bowlSpecialLabel} +${result.bowlSpecial}</div>` : ''}
        <div class="res-pc-action">${dispName(result.effectiveDelivery||result.delivery)}${result.effectiveDelivery&&result.effectiveDelivery!==result.delivery?` <span style="font-size:9px;color:var(--red)">(slipped)</span>`:''}</div>
      </div>
    </div>

    <!-- BIG OUTCOME -->
    <div class="res-outcome ${result.outcome}">${outLabels[result.outcome]}</div>

    <!-- DICE VISUAL ROW -->
    <div style="display:flex;align-items:center;gap:16px;justify-content:center">
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(74,222,128,0.7)">BATTER</div>
        ${dieFaceHTML(result.batterDice||1, 56, '#4ade80', '#061a0c')}
        <div style="font-size:10px;font-weight:700;color:var(--gold)">${bDiceStr} mod</div>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted)">VS</div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(230,57,70,0.7)">BOWLER</div>
        ${dieFaceHTML(result.bowlerDice||1, 56, '#e63946', '#1a0608')}
        <div style="font-size:10px;font-weight:700;color:var(--gold)">${wDiceStr} mod</div>
      </div>
    </div>

    <!-- BALL CALCULATION BREAKDOWN -->
    <div class="res-breakdown">
      <div class="rb-title">BALL CALCULATION</div>
      <div style="font-size:8px;color:var(--muted);text-align:center;margin-bottom:6px;opacity:0.7">★ rating = pts in formula · OVR is visual only</div>
      <div class="rb-row">
        <div class="rb-side batter">
          <div class="rb-label">BATTER TOTAL</div>
          ${batBreakLines.map(l=>`<div class="rb-line">${l}</div>`).join('')}
          <div class="rb-total">= ${result.batterTotal}</div>
        </div>
        <div class="rb-minus">−</div>
        <div class="rb-side bowler">
          <div class="rb-label">BOWLER TOTAL</div>

      </div>
      <div class="rb-diff">${result.batterTotal} − ${result.bowlerTotal} = ${diffSign}${result.difference}</div>
      <div class="rb-threshold">${thresholdDesc}</div>
    </div>

    ${megaSixNote}
    ${specialNote}
    ${balanceNoteHTML}

    ${chipFeedbackHTML}
    <div class="res-commentary">"${result.commentary}"</div>
    <div class="res-skip">TAP ANYWHERE TO CONTINUE →</div>
  `;
}


window.dismissResult = function() {
  const ov = document.getElementById('result-overlay');
  if(!ov) return;
  ov.remove();
  refillAfterBall();

  if(G.mpMode) {
    if(G.mpIsHost) {
      window._mpHostAdvance(); // host drives next state
    } else {
      // Guest: just wait — master poll detects the next ball/swap/end
      G.phase = 'mpWaitingContinue';
      render();
    }
    return;
  }

  // Single player
  const inn = getCurrentInn();
  if(isInnOver(inn)) {
    settleOverPot();
    G.phase = 'overScorecard'; // show 6-ball summary before swap/end
    render();
  } else {
    render();
  }
};

function renderOverScorecard() {
  const inn = getCurrentInn();
  const isPlayerBatting = playerIsBatting();
  const innNum = G.currentInnings;
  const innLabel = innNum === 1 ? 'INNINGS 1' : 'INNINGS 2';
  const roleLabel = isPlayerBatting ? 'YOU BATTED' : 'YOU BOWLED';

  const OUTCOME_ICONS  = { SIX:'🟡', FOUR:'🟢', TWO:'⚪', ONE:'⚪', DOT:'⚫', PRESSURE:'🔴', WICKET:'💀' };
  const OUTCOME_COLORS = { SIX:'var(--gold2)', FOUR:'var(--green)', TWO:'rgba(240,244,255,0.8)', ONE:'rgba(240,244,255,0.7)', DOT:'var(--muted)', PRESSURE:'var(--red)', WICKET:'var(--red)' };

  const ballRows = inn.ballLog.map((b, i) => {
    const rowCls = b.outcome==='SIX' ? ' is-six' : b.outcome==='FOUR' ? ' is-four' : b.outcome==='WICKET' ? ' is-wicket' : '';
    const runsDisp = b.outcome==='WICKET' ? 'W' : (b.outcome==='DOT'||b.outcome==='PRESSURE') ? '\u2013' : `+${b.runs}`;
    const shotDisp = b.shot ? `${dispName(b.shot)} vs ${dispName(b.delivery)}` : '';
    return `<div class="osc-ball-row${rowCls}">
      <div class="osc-ball-num">B${i+1}</div>
      <div class="osc-ball-icon">${OUTCOME_ICONS[b.outcome]||'\u25cb'}</div>
      <div class="osc-ball-outcome" style="color:${OUTCOME_COLORS[b.outcome]||'var(--white)'}">${b.outcome==='PRESSURE'?'PRESS':b.outcome}</div>
      <div class="osc-ball-matchup">${shotDisp}</div>
      <div class="osc-ball-runs" style="color:${OUTCOME_COLORS[b.outcome]||'var(--white)'}">${runsDisp}</div>
    </div>`;
  }).join('');

  const totalRuns = inn.runs;
  const totalWkts = inn.wickets;
  const sixes = inn.ballLog.filter(b=>b.outcome==='SIX').length;
  const fours = inn.ballLog.filter(b=>b.outcome==='FOUR').length;
  const dots  = inn.ballLog.filter(b=>b.outcome==='DOT'||b.outcome==='PRESSURE').length;
  const nextLabel = innNum === 1
    ? (isPlayerBatting ? 'NOW YOU BOWL \u2192' : 'NOW YOU BAT \u2192')
    : 'SEE RESULT \u2192';
  const targetInfo = innNum === 2
    ? `<div style="text-align:center;font-size:12px;color:var(--muted);margin-top:4px">Target: <b style="color:var(--gold)">${G.inn1.runs+1}</b> \u00b7 ${totalRuns >= G.inn1.runs+1 ? '<span style="color:var(--green)">CHASE SUCCESS \ud83c\udfc6</span>' : '<span style="color:var(--red)">CHASE FAILED</span>'}</div>` : '';

  return `
  <div class="screen osc-screen" onclick="dismissOverScorecard()">
    <div class="osc-header">
      <div class="osc-eyebrow">${innLabel} COMPLETE \u00b7 ${roleLabel}</div>
      <div class="osc-score-big">${totalRuns}/${totalWkts}</div>
      <div class="osc-overs">${getOvStr(inn.balls)} OVERS</div>
      ${targetInfo}
    </div>
    <div class="osc-balls-grid">${ballRows}</div>
    <div class="osc-stats-row">
      <div class="osc-stat-box"><div class="osc-stat-val" style="color:var(--gold2)">${sixes}</div><div class="osc-stat-lbl">SIXES</div></div>
      <div class="osc-stat-box"><div class="osc-stat-val" style="color:var(--green)">${fours}</div><div class="osc-stat-lbl">FOURS</div></div>
      <div class="osc-stat-box"><div class="osc-stat-val">${dots}</div><div class="osc-stat-lbl">DOTS</div></div>
      <div class="osc-stat-box"><div class="osc-stat-val" style="color:var(--red)">${totalWkts}</div><div class="osc-stat-lbl">WICKETS</div></div>
    </div>
    <div class="osc-continue-hint">${nextLabel}</div>
    <div class="osc-tap-hint">TAP ANYWHERE TO CONTINUE</div>
  </div>`;
}

    // Just show a waiting screen if guest taps before host writes inn2

  // Single player

  G.playerCard=null; G.playerChoice=null; G.aiCard=null; G.aiChoice=null;

function renderLeaderboard() {
  const hist    = JSON.parse(localStorage.getItem('oo_history')||'[]');
  const stats   = JSON.parse(localStorage.getItem('oo_stats')||'{"wins":0,"losses":0,"ties":0,"coins":0,"played":0}');
  const botStats= JSON.parse(localStorage.getItem('oo_bot_stats')||'{}');
  const winPct  = stats.played > 0 ? Math.round(stats.wins/stats.played*100) : 0;

  // ── Build global standings ──────────────────────────────────────
  // Each bot has a persistent score based on their base stats + dynamic adjustments from games played
  const playerEntry = {
    id: 'you', name: 'YOU', avatar: '⭐', tag: 'PLAYER',
    matchesPlayed: stats.played,
    wins: stats.wins,
    netSp: stats.coins || 0,
    isPlayer: true,
  };

  const boardEntries = BOT_PLAYERS.map(bot => {
    const bs = botStats[bot.id] || {wins:0, losses:0, sp:0, played:0};
    // Bot's wins = base wins + wins against player; net SP = base SP adjusted by player matches
    const totalWins = Math.round(bot.matchesPlayed * bot.winRatio) + bs.wins;
    const totalPlayed = bot.matchesPlayed + bs.played;
    const netSp = bot.netSp + (bs.sp || 0);
    return {
      id: bot.id, name: bot.name, avatar: bot.avatar, tag: bot.tag,
      matchesPlayed: totalPlayed, wins: totalWins, netSp, isPlayer: false,
    };
  });

  // Sort by netSp descending
  const allEntries = [...boardEntries, playerEntry].sort((a,b) => b.netSp - a.netSp);
  const playerRank = allEntries.findIndex(e => e.isPlayer) + 1;

  // ── Render standings — show ±3 around player, always show top 3 ──
  const showSet = new Set();
  [0,1,2].forEach(i=>{ if(i<allEntries.length) showSet.add(i); });
  const pi = allEntries.findIndex(e=>e.isPlayer);
  for(let i=Math.max(0,pi-2); i<=Math.min(allEntries.length-1,pi+2); i++) showSet.add(i);
  const showIdxs = [...showSet].sort((a,b)=>a-b);

  let lastIdx = -1;
  const boardRows = showIdxs.map(idx => {
    const e = allEntries[idx];
    const rank = idx+1;
    const gap = idx > lastIdx+1 ? `<div style="text-align:center;color:var(--muted);font-size:11px;padding:2px 0">···</div>` : '';
    lastIdx = idx;
    const isYou = e.isPlayer;
    const rankCol = rank===1?'#ffd700':rank===2?'#c0c0c0':rank===3?'#cd7f32':'var(--muted)';
    const rowBg = isYou
      ? 'background:rgba(212,165,72,0.12);border:1.5px solid rgba(212,165,72,0.35);'
      : 'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);';
    const spCol = e.netSp>=0?'#4ade80':'#e63946';
    const spStr = `${e.netSp>=0?'+':''}${e.netSp}`;
    return `${gap}<div style="${rowBg}border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:${rankCol};min-width:28px;text-align:center">#${rank}</div>
      <div style="font-size:22px;min-width:28px;text-align:center">${e.avatar}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:${isYou?'var(--gold)':'var(--white)'};letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.name}${isYou?' 👈':''}</div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px">${e.tag||''} · ${e.wins}W · ${e.matchesPlayed}G</div>
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:${spCol};text-align:right">${spStr}<div style="font-size:8px;font-weight:700;color:var(--muted)">NET SP</div></div>
    </div>`;
  }).join('');

  // ── Recent match history rows ────────────────────────────────────
  const icons  = {player:'🏆',ai:'💀',tie:'🤝'};
  const labels = {player:'WIN', ai:'LOSS', tie:'TIE'};
  const colors = {player:'#4ade80',ai:'#e63946',tie:'#fbbf24'};
  const recentRows = hist.length ? hist.slice(0,15).map(m => {
    const d = new Date(m.date);
    const dateStr = `${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const coinStr = m.coins>=0?`+${m.coins}`:String(m.coins);
    const coinCol = m.coins>0?'#4ade80':m.coins<0?'#e63946':'#7a8fa8';
    const oppStr  = m.opponent ? ` vs ${m.opponent}` : '';
    return `<div class="lb-row">
      <div class="lb-result" style="color:${colors[m.result]||'#fff'}">${icons[m.result]||'?'} ${labels[m.result]||'?'}</div>
      <div class="lb-scores" style="font-size:10px">${m.inn1} / ${m.inn2}${oppStr}</div>
      <div class="lb-pitch">${m.pitchIcon||''}</div>
      <div class="lb-coins" style="color:${coinCol};font-family:'Bebas Neue',sans-serif">${coinStr}</div>
      <div class="lb-date">${dateStr}</div>
    </div>`;
  }).join('') : `<div style="text-align:center;color:var(--muted);padding:20px;font-size:12px">No matches yet. Play your first game!</div>`;

  return `
  <div class="screen" style="background:var(--navy);flex-direction:column;align-items:center;overflow-y:auto;padding:16px 14px;gap:14px">

    <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:4px">GLOBAL STANDINGS</div>

    <div class="career-strip" style="max-width:340px;width:100%">
      <div class="career-stat"><div class="cs-val">${stats.played}</div><div class="cs-label">PLAYED</div></div>
      <div class="career-stat"><div class="cs-val" style="color:#4ade80">${stats.wins}</div><div class="cs-label">WINS</div></div>
      <div class="career-stat"><div class="cs-val" style="color:#e63946">${stats.losses||0}</div><div class="cs-label">LOSSES</div></div>
      <div class="career-stat"><div class="cs-val" style="color:var(--gold)">${winPct}%</div><div class="cs-label">WIN%</div></div>
      <div class="career-stat"><div class="cs-val" style="color:${stats.coins>=0?'#4ade80':'#e63946'}">${stats.coins>=0?'+':''}${stats.coins||0}</div><div class="cs-label">NET SP</div></div>
    </div>

    <div style="font-size:10px;color:var(--muted);text-align:center;max-width:300px;line-height:1.5;opacity:0.7">
      You're #${playerRank} globally. Win matches and out-bet your rivals to climb.
    </div>

    <div style="width:100%;max-width:380px;display:flex;flex-direction:column;gap:6px">
      ${boardRows}
    </div>

    <div style="font-size:11px;color:var(--muted);letter-spacing:2px;font-weight:700;align-self:flex-start;margin-top:4px">RECENT MATCHES</div>
    <div style="width:100%;display:flex;flex-direction:column;gap:5px">
      ${recentRows}
    </div>
    <button class="end-play-again" onclick="G.phase='home';render()" style="max-width:200px;width:100%;margin-top:8px">← HOME</button>
  </div>`;
}

    </div>` : '';

  let bodyContent = '';
  if(s.content === 'intro') {
    bodyContent = `
      <div class="tut-icon">${s.icon}</div>
      <div class="tut-title">${s.title}</div>
      <div class="tut-subtitle">${s.subtitle}</div>

window.tutNext = function() {
  const step = G.tutorialStep || 0;
  if(step >= TUT_STEPS.length - 1) {
    skipTutorial();
  } else {
    G.tutorialStep = step + 1;
    render();
  }
};

window.tutPrev = function() {
  G.tutorialStep = Math.max(0, (G.tutorialStep||0) - 1);
  render();
};

window.skipTutorial = function() {
  try { localStorage.setItem('oo_tutorial_seen', '1'); } catch(e) {}
  initGame();
};

        <div class="settings-row-action" id="haptic-toggle">${hapticOn?'ON ✓':'OFF'}</div>

        <b style="color:var(--gold);font-size:12px">THE FORMULA</b><br><br>
        Each ball resolves like this:<br><br>
        <code>DIFF = Batter Total − Bowler Total</code><br><br>
        <b class="pos">BATTER TOTAL</b> = Card ★ rating<br>
        &nbsp;&nbsp;+ matchup modifier (shot vs delivery)<br>
        &nbsp;&nbsp;+ special ability bonus<br>
        &nbsp;&nbsp;+ pattern read bonus/penalty<br>
        &nbsp;&nbsp;+ full toss punishment<br>
        &nbsp;&nbsp;+ dice modifier (roll 1→−2, 2→−1, 3/4→0, 5→+1, 6→+2)<br><br>
        <b class="neg">BOWLER TOTAL</b> = Card ★ rating<br>
        &nbsp;&nbsp;+ special ability bonus<br>
        &nbsp;&nbsp;+ dice modifier<br><br>
        <b style="color:var(--gold)">OUTCOME THRESHOLDS</b><br>

        <b style="color:var(--gold)">BALANCE MECHANICS</b><br>
        📖 Pattern Read: same aggressive shot 2× in a row → −1<br>

window.openSettings = function() {
  document.getElementById('app').style.overflow = 'visible';
  const existing = document.getElementById('settings-overlay');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.innerHTML = renderSettings();
  document.getElementById('app').appendChild(el.firstElementChild);
};

window.closeSettings = function() {
  const el = document.getElementById('settings-overlay');
  if(el) el.remove();
  document.getElementById('app').style.overflow = 'hidden';
};

window.toggleHaptic = function() {
  try {
    const on = localStorage.getItem('oo_haptic') !== '0';
    localStorage.setItem('oo_haptic', on ? '0' : '1');
    const el = document.getElementById('haptic-toggle');
    if(el) el.textContent = on ? 'OFF' : 'ON ✓';
  } catch(e) {}
};

window.resetCareerStats = function() {
  try {
    ['oo_stats','oo_bot_stats','oo_history'].forEach(k => localStorage.removeItem(k));
    closeSettings();
    render();
  } catch(e) {}
};

window.showCardInfo = function(cardId, cardType) {
  const card = cardType === 'batter'
    ? BATTER_CARDS.find(c=>c.id===cardId)
    : BOWLER_CARDS.find(c=>c.id===cardId);
  if(!card) return;
  const st = getCardStats(card);
  const tierColor = st.tier==='gold'?'#f0c060':st.tier==='silver'?'#c8d0dc':'#a07840';
  const isBatter = card.type === 'batter';
  const keys = isBatter ? ['PWR','TIM','TEC','SPL'] : ['SPD','LNE','VAR','SPL'];
  const vals = [st.a, st.b, st.c, st.d];
  const stars = '★'.repeat(card.rating) + '☆'.repeat(5-card.rating);
  const specialName = card.special ? (SPECIAL_LABELS[card.special]||card.special) : null;

  const barsHTML = keys.map((k,i) => `
    <div class="cib-row">
      <span class="cib-key">${k}</span>
      <div class="cib-bar"><div class="cib-fill" style="width:${vals[i]}%;background:${tierColor}"></div></div>
      <span class="cib-val" style="color:${tierColor}">${vals[i]}</span>
    </div>`).join('');

  const specialHTML = specialName ? `
    <div class="card-info-special">
      <div class="card-info-special-name">⚡ ${specialName}</div>
      <div class="card-info-special-desc">${card.desc}</div>
    </div>` : `<div class="card-info-desc">${card.desc}</div>`;

  const roleTag = isBatter
    ? (card.bigHitter ? '🏏 BATTER · BIG HITTER' : '🏏 BATTER')
    : (card.spinner ? '🌀 BOWLER · SPINNER' : '⚡ BOWLER · PACER');

  const html = `
  <div class="card-info-overlay" onclick="closeCardInfo(event,this)">
    <div class="card-info-box" onclick="event.stopPropagation()">
      <div class="card-info-header" style="border-top:4px solid ${tierColor}">
        <div class="card-info-role">${roleTag}</div>
        <div class="card-info-name">${card.name}</div>
        <div class="card-info-nick">"${card.nick||''}"</div>
      </div>
      <div class="card-info-body">
        <div class="card-info-ovr-row">
          <div class="card-info-ovr" style="color:${tierColor}">${st.ovr}</div>
          <div>
            <div style="font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:3px">OVR</div>
            <div style="font-size:14px;color:${tierColor};letter-spacing:1px">${stars}</div>
            <div style="font-size:8px;color:var(--muted);letter-spacing:1px">★ ${card.rating}/5 RATING</div>
          </div>
        </div>
        <div class="card-info-bars">${barsHTML}</div>
        ${specialHTML}
      </div>
      <button class="card-info-close" onclick="closeCardInfo(null,document.getElementById('card-info-overlay'))">CLOSE ×</button>
    </div>
  </div>`;

  document.getElementById('app').style.overflow = 'visible';
  const app = document.getElementById('app');
  const existing = document.getElementById('card-info-overlay');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.innerHTML = html;
  el.firstElementChild.id = 'card-info-overlay';
  app.appendChild(el.firstElementChild);
};

window.closeCardInfo = function(e, el) {
  if(e && e.target !== el) return;
  const ov = document.getElementById('card-info-overlay');
  if(ov) ov.remove();
  document.getElementById('app').style.overflow = 'hidden';
};

        <div class="card-info-name">${b.name}</div>
        <div class="card-info-nick">${b.tagline}</div>
      </div>
      <div style="padding:10px 0">
        <div style="font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(74,222,128,0.7);padding:8px 12px 4px">🏏 BATTERS</div>
        ${bats.map(playerRow).join('')}
        <div style="font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(96,165,250,0.7);padding:12px 12px 4px">🎳 BOWLERS</div>
        ${bowls.map(playerRow).join('')}
      </div>
      <div style="padding:10px 14px">
        <button onclick="selectBundle('${bundleId}');closeSquadInfo(null,document.querySelector('.squad-info-overlay'))"
          style="width:100%;padding:12px;background:linear-gradient(135deg,#e0b050,#c08828);
          color:var(--navy);font-family:'Bebas Neue',sans-serif;font-size:18px;
          letter-spacing:2px;border:none;cursor:pointer;border-radius:8px">SELECT THIS SQUAD →</button>
        <button onclick="closeSquadInfo(null,document.querySelector('.squad-info-overlay'))"
          style="width:100%;margin-top:6px;padding:10px;background:transparent;
          color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:14px;
          letter-spacing:1px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;border-radius:8px">← BACK</button>
      </div>
    </div>
  </div>`;

  document.getElementById('app').style.overflow = 'visible';
  const app = document.getElementById('app');
  const existing = document.querySelector('.squad-info-overlay');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.innerHTML = html;
  el.firstElementChild.classList.add('squad-info-overlay');
  app.appendChild(el.firstElementChild);

window.closeSquadInfo = function(e, el) {

  const ov = document.querySelector('.squad-info-overlay');
  if(ov) ov.remove();
  document.getElementById('app').style.overflow = 'hidden';
};


// ================================================================
// RENDER FUNCTIONS
// ================================================================
function render() {
  const app = document.getElementById('app');
  switch(G ? G.phase : 'home') {
    case 'home':         app.innerHTML = renderHome(); break;
    case 'tutorial':     app.innerHTML = renderTutorial(); break;
    case 'pitchReveal':  app.innerHTML = renderPitch(); break;
    case 'bundleSelect': app.innerHTML = renderBundleSelect(); break;
    case 'overStake':    app.innerHTML = renderOverStake(); break;
    case 'deal':         app.innerHTML = renderDeal(); break;
    case 'powerPick':    app.innerHTML = renderPowerPick(); break;
    case 'play':         app.innerHTML = renderPlay(); break;
    case 'inningsSwap':  app.innerHTML = renderInningsSwap(); break;
    case 'overScorecard': app.innerHTML = renderOverScorecard(); break;
    case 'gameEnd':      app.innerHTML = renderGameEnd(); break;
    case 'leaderboard':  app.innerHTML = renderLeaderboard(); break;
    case 'lobby':         app.innerHTML = renderLobby(); break;
    case 'lobbyWaiting': app.innerHTML = renderLobbyWaiting(); break;
    case 'mpStakes':     app.innerHTML = renderMpStakes(); break;
    case 'mpBundleWait': app.innerHTML = renderMpBundleWait(); break;
    case 'mpWaiting':    app.innerHTML = renderMpWaiting(); break;
    case 'mpWaitingResult': app.innerHTML = renderMpWaitingResult(); break;
    case 'mpWaitingContinue': app.innerHTML = renderMpWaitingContinue(); break;
    case 'mpRejoin':     app.innerHTML = renderMpRejoin(); break;
    case 'mpRejoinHost': app.innerHTML = renderMpRejoinHost(); break;
    default:             app.innerHTML = renderHome();
  }
}

function renderHome() {
  const stats = JSON.parse(localStorage.getItem('oo_stats')||'{"wins":0,"losses":0,"ties":0,"coins":0,"played":0}');
  const winPct = stats.played > 0 ? Math.round(stats.wins/stats.played*100) : 0;
  const netSP = stats.coins || 0;
  // Rotate today's rival based on day of week
  const todayBot = BOT_PLAYERS[new Date().getDay() % BOT_PLAYERS.length];

  const statsHTML = stats.played > 0 ? `
    <div class="home-stats-strip">
      <div class="home-stat"><span class="home-stat-val">${stats.played}</span><span class="home-stat-lbl">PLAYED</span></div>
      <div class="home-stat"><span class="home-stat-val" style="color:var(--green)">${stats.wins}</span><span class="home-stat-lbl">WINS</span></div>
      <div class="home-stat"><span class="home-stat-val" style="color:var(--gold)">${winPct}%</span><span class="home-stat-lbl">WIN%</span></div>
      <div class="home-stat"><span class="home-stat-val" style="color:${netSP>=0?'var(--green)':'var(--red)'}">${netSP>=0?'+':''}${netSP}</span><span class="home-stat-lbl">NET SP</span></div>
    </div>` : '';

  const rivalHTML = `
    <div class="home-rival-card">
      <div class="home-rival-left">
        <div class="home-rival-eyebrow">TODAY'S RIVAL</div>
        <div class="home-rival-name">${todayBot.name}</div>
        <div class="home-rival-tag">${todayBot.personality} · ${todayBot.tag}</div>
      </div>
      <div class="home-rival-avatar">${todayBot.avatar}</div>
    </div>`;

  return `
  <div class="screen home-bg">
    <span class="home-deco home-deco-l">🏏</span>
    <span class="home-deco home-deco-r">🏏</span>
    <div class="logo-wrap">
      <div class="logo-main">OVER<br>&amp; OUT</div>
      <div class="logo-sub">Cricket · Cards · Mind Games</div>
    </div>
    <div class="tagline">Read the pitch. Pick your play.<br>Outthink the AI.</div>

// RANDOM SQUAD GENERATOR — balanced, no 90+ stacking
// ──────────────────────────────────────────────
function generateRandomSquad() {
  function pickBalanced(pool) {
    // Balance rules: max 1 ★5, max 2 ★4, rest ★3 or below
    const r5 = pool.filter(c => c.rating === 5);
    const r4 = pool.filter(c => c.rating === 4);
    const r3 = pool.filter(c => c.rating === 3);
    const r2 = pool.filter(c => c.rating <= 2);

    const shuffle = a => [...a].sort(() => Math.random() - 0.5);
    const sr5 = shuffle(r5), sr4 = shuffle(r4), sr3 = shuffle(r3), sr2 = shuffle(r2);

    // Pick 1 ★5, 1–2 ★4, rest from ★3/★2
    const chosen = [];
    if(sr5.length) chosen.push(sr5[0]);                          // 1 elite
    const num4 = Math.floor(Math.random() * 2) + 1;              // 1 or 2 ★4s
    sr4.slice(0, Math.min(num4, sr4.length)).forEach(c => chosen.push(c));
    // Fill remaining slots from ★3 then ★2
    const remaining = [...sr3, ...sr2];
    let i = 0;
    while(chosen.length < 6 && i < remaining.length) {
      chosen.push(remaining[i++]);
    }
    return chosen.slice(0, 6).map(c => c.id);
  }

  return {
    batIds:  pickBalanced(BATTER_CARDS),
    bowlIds: pickBalanced(BOWLER_CARDS),
  };
}

window.randomiseSquad = function() {
  const squad = generateRandomSquad();
  G.randomBatIds  = squad.batIds;
  G.randomBowlIds = squad.bowlIds;
  G.selectedBundle = 'random';
  render();
};

function buildMatrixHint(selected, isPlayerBatting, selectedCard) {
  // BUG 3 FIX: when batting, derive spin/pace from the AI's actual available bowler
  // G.aiCard is null at pick-time, so use best available AI bowler from hand as proxy
  const aiBowlerProxy = isPlayerBatting
    ? (G.aiBowlHand || []).find(c => !c._played) || {spinner:false}
    : null;

  const counters = isPlayerBatting
    ? (aiBowlerProxy && aiBowlerProxy.spinner ? SPIN_DELIVERIES : PACE_DELIVERIES)
    : SHOTS;

  const cells = counters.map(c => {
    const mod = isPlayerBatting
      ? getMatchupMod(c, selected, G.pitch, false, aiBowlerProxy || {spinner:false})
      : getMatchupMod(selected, c, G.pitch, false, selectedCard||{spinner:false});
    const cls = mod>0?'pos':mod<0?'neg':'neu';
    const label = mod>0?`+${mod}`:String(mod);
    const abbr = c.length<=4?c:c.slice(0,4);
    return `<div class="mh-cell">
      <div class="mh-label">${abbr.toUpperCase()}</div>
      <div class="mh-val ${cls}">${label}</div>
    </div>`;
  }).join('');
  return `<div class="matrix-hint">${cells}</div>`;
}

function buildChoiceButtons(inn, isPlayerBatting, selectedCard, selectedChoice) {
  const choices = isPlayerBatting
    ? SHOTS
    : (selectedCard ? getAvailableDeliveries(selectedCard, inn) : PACE_DELIVERIES);
  const label = isPlayerBatting ? 'SHOT' : 'DELIVERY';
  const isSpin = !isPlayerBatting && selectedCard && selectedCard.spinner;
  const lastShot     = inn.ballLog.length>0 ? inn.ballLog[inn.ballLog.length-1].shot     : null;
  const lastDelivery = inn.ballLog.length>0 ? inn.ballLog[inn.ballLog.length-1].delivery : null;
  const aggressiveShots = ['Slog','StepDown','ReverseScoop','Pull'];

  const btns = choices.map(ch=>{
    const isSel=ch===selectedChoice;
    let capped=false;
    if(isPlayerBatting){
      if(ch==='Slog'         &&(inn.shotsUsed['Slog']        ||0)>=2) capped=true;
      if(ch==='ReverseScoop' &&(inn.shotsUsed['ReverseScoop']||0)>=2) capped=true;
    } else {
      if(ch==='Bouncer'  &&inn.bouncerChips<=0) capped=true;
      if(ch==='Yorker'   &&(inn.deliveriesUsed['Yorker']   ||0)>=2) capped=true;
      if(ch==='Googly'   &&(inn.deliveriesUsed['Googly']   ||0)>=2) capped=true;
      if(ch==='Doosra'   &&(inn.deliveriesUsed['Doosra']   ||0)>=2) capped=true;
      if(ch==='ShortBall'&&(inn.deliveriesUsed['ShortBall']||0)>=3) capped=true;
    }
    const usedCount=isPlayerBatting?(inn.shotsUsed[ch]||0):(inn.deliveriesUsed[ch]||0);
    const hasCap=['Slog','ReverseScoop','Yorker','Bouncer','Googly','Doosra','ShortBall'].includes(ch);
    const dots=hasCap?`<span class="sBtn-dots">${usedCount>=1?'●':'○'}${usedCount>=2?'●':'○'}</span>`:'';

    // Risk/warning badges
    let badge='';
    if(isPlayerBatting){
      if(ch===lastShot && aggressiveShots.includes(ch) && !capped)
        badge=`<span class="sBadge read" title="Repeat aggressive shot — bowler expects it! −1">📖−1</span>`;
    } else {
      if(ch==='FullToss')
        badge=`<span class="sBadge danger" title="Real bowlers don't bowl these. Big gift vs attacking shots.">⚠️</span>`;
      else if(ch==='Yorker')
        badge=`<span class="sBadge warn" title="Dice 1 = misfire becomes Full Toss. High risk/reward.">⚡</span>`;
    }

    return `<button class="sBtn${isSel?' active':''}${capped?' capped':''}${ch==='FullToss'?' ft-risk':''}" onclick="selectChoice('${ch}')" ${capped?'disabled':''}>
      ${dispName(ch)}${dots}${badge}
    </button>`;
  }).join('');
  const hint=selectedChoice?buildMatrixHint(selectedChoice,isPlayerBatting,selectedCard):'';
  return `<div class="shot-label">${isSpin?'🌀 SPIN ':'⚡ '}${label}</div>${btns}
    <div style="grid-column:1/-1">${hint}</div>`;
}

function renderPowerRail() {
  const p = G.playerPower;
  if(!p) return `<div class="power-rail"><div class="pr-label">PWR</div></div>`;

  const isUsed     = !!G.playerPowerUsed;
  const isDeclared = G.playerPowerDeclared && !isUsed;
  const isPlayerBatting = playerIsBatting();
  const roleBlocked = (p.role==='bat' && !isPlayerBatting) || (p.role==='bowl' && isPlayerBatting);
  const canUse     = !isUsed && !isDeclared && !roleBlocked;

  let cls = 'pr-slot mine';
  if(isUsed)       cls += ' used ghost';
  if(isDeclared)   cls += ' declared';
  if(roleBlocked)  cls += ' ghost';

  const showGhostHint = canUse && !G.powerHintSeen && !G.playerPowerDeclared;

  const ghostHint = showGhostHint ? `
    <div class="pr-ghost-hint">
      <div class="pr-ghost-arrow">↑</div>
      <div class="pr-ghost-text">TAP TO ACTIVATE<br><b>${p.name}</b><br><span style="font-weight:400;font-size:9px">${p.effect||p.desc}</span></div>
    </div>` : '';

  const statusBadge = isUsed ? `<div class="pr-used-badge">USED</div>`
    : isDeclared ? `<div class="pr-declared-badge">ACTIVE!</div>`
    : roleBlocked ? `<div style="font-size:6px;color:var(--muted);text-align:center;line-height:1.2;margin-top:1px">${p.role==='bat'?'BAT ONLY':'BOWL ONLY'}</div>` : '';

  return `
  <div class="power-rail" style="position:relative;overflow:visible">
    <div class="pr-label">PWR</div>
    <div class="${cls}" onclick="${canUse?'declarePower()':''}" title="${p.name}: ${p.effect||p.desc}"
         style="position:relative;cursor:${canUse?'pointer':'default'}">
      <div class="pr-icon">${p.icon}</div>
      <div class="pr-name" style="font-size:7px;letter-spacing:0.5px;line-height:1.1;text-align:center">${p.name.split(' ').slice(0,2).join(' ')}</div>
      ${statusBadge}
    </div>
    ${ghostHint}
  </div>`;
}

function saveMatchToHistory(winnerCls, coinDiff, pitch, oppName, botId) {
  try {
    const hist = JSON.parse(localStorage.getItem('oo_history')||'[]');
    hist.unshift({
      date: Date.now(),
      result: winnerCls,
      coins: coinDiff,
      inn1: G.inn1.runs + '/' + G.inn1.wickets,
      inn2: G.inn2.runs + '/' + G.inn2.wickets,
      pitch: pitch.name,
      pitchIcon: pitch.icon,
      squad: G.selectedBundle || '?',
      opponent: oppName || 'Opponent',
      botId: botId || null,
    });
    localStorage.setItem('oo_history', JSON.stringify(hist.slice(0,50)));

    // Update lifetime stats
    const stats = JSON.parse(localStorage.getItem('oo_stats')||'{"wins":0,"losses":0,"ties":0,"coins":0,"played":0}');
    stats.played++;
    if(winnerCls==='player') stats.wins++;
    else if(winnerCls==='ai') stats.losses++;
    else stats.ties++;
    stats.coins = (stats.coins||0) + coinDiff;
    localStorage.setItem('oo_stats', JSON.stringify(stats));

    // Update bot win stats so leaderboard stays realistic
    if(botId) {
      const botStats = JSON.parse(localStorage.getItem('oo_bot_stats')||'{}');
      if(!botStats[botId]) botStats[botId] = {wins:0, losses:0, sp:0, played:0};
      botStats[botId].played++;
      if(winnerCls==='ai') { botStats[botId].wins++; botStats[botId].sp+=Math.abs(coinDiff); }
      else if(winnerCls==='player') { botStats[botId].losses++; botStats[botId].sp-=Math.abs(coinDiff); }
      localStorage.setItem('oo_bot_stats', JSON.stringify(botStats));
    }
  } catch(e) {}
}

function renderGameEnd() {
  const inn1 = G.inn1;
  const inn2 = G.inn2;
  const target = inn1.runs + 1;

  const bot = G.opponent;
  const oppDisplayName = G.mpMode ? (G.mpOppName||'Opponent') : (bot ? bot.name : 'Opponent');
  const oppAvatar = G.mpMode ? '🎮' : (bot ? bot.avatar : '🏏');

  let winnerText, winnerCls, marginText;
  if(inn2.runs >= target) {
    winnerText = `${oppAvatar} ${oppDisplayName.split(' ')[0].toUpperCase()} WINS`;
    winnerCls = 'ai';
    const margin = inn2.runs - inn1.runs;
    const rem = 3 - inn2.wickets;
    marginText = `Chased down ${target} — won by ${rem} wicket${rem!==1?'s':''} (${margin} runs clear)`;
  } else if(inn2.runs === inn1.runs) {
    winnerText = 'TIE!';
    winnerCls = 'tie';
    marginText = 'An incredible tie! Both teams level on runs.';
  } else {
    winnerText = G.mpMode ? 'HOST WINS!' : 'YOU WIN!';
    winnerCls = 'player';
    const margin = inn1.runs - inn2.runs;
    marginText = `Defended ${inn1.runs} and won by ${margin} run${margin!==1?'s':''}!`;
  }

  const coinDiff = G.coins.player - G.coins.ai;
  saveMatchToHistory(winnerCls, coinDiff, G.pitch, oppDisplayName, bot?.id);

  // Load career stats
  const stats = JSON.parse(localStorage.getItem('oo_stats')||'{"wins":0,"losses":0,"ties":0,"coins":0,"played":0}');
  const winPct = stats.played > 0 ? Math.round(stats.wins/stats.played*100) : 0;

  // Confetti if player wins
  let confetti = '';
  if(winnerCls==='player') {
    const colors=['#d4a548','#f0c060','#4ade80','#60a5fa','#f472b6'];
    confetti = '<div class="confetti-wrap">' +
      Array.from({length:30},(_,i)=>{
        const col = colors[i%colors.length];
        const left = Math.random()*100;
        const dur = 1.5+Math.random()*2;
        const delay = Math.random()*1.5;
        return `<div class="cpiece" style="left:${left}%;background:${col};animation-duration:${dur}s;animation-delay:${delay}s"></div>`;
      }).join('') + '</div>';
  }

  const pc=G.coins.player, ac=G.coins.ai;
  let chipWinnerHTML;
  if(coinDiff>0){
    chipWinnerHTML=`<div class="bet-chip-bar" style="max-width:280px;border-color:rgba(74,222,128,0.3)">
      <div class="bet-stack"><div class="bet-stack-label">YOU</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green)">🪙${pc}</div></div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--green);text-align:center;padding:4px 8px;background:rgba(74,222,128,0.1);border-radius:6px">SKILL<br>LEAD</div>
      <div class="bet-stack"><div class="bet-stack-label">${G.mpMode?'OPP':'AI'}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--red)">🪙${ac}</div></div>
    </div>`;
  } else if(coinDiff<0){
    chipWinnerHTML=`<div class="bet-chip-bar" style="max-width:280px;border-color:rgba(230,57,70,0.3)">
      <div class="bet-stack"><div class="bet-stack-label">YOU</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--red)">🪙${pc}</div></div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--red);text-align:center;padding:4px 8px;background:rgba(230,57,70,0.08);border-radius:6px">${G.mpMode?'OPP':'AI'}<br>LEADS</div>
      <div class="bet-stack"><div class="bet-stack-label">${G.mpMode?'OPP':'AI'}</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--green)">🪙${ac}</div></div>
    </div>`;
  } else {
    chipWinnerHTML=`<div style="font-size:14px;color:var(--muted);text-align:center">🤝 Skill points all square — 🪙${pc} each</div>`;
  }

  return `
  <div class="screen end-bg">
    ${confetti}
    <div class="end-eyebrow">MATCH RESULT</div>
    <div class="end-winner ${winnerCls}">${winnerText}</div>
    <div class="end-scoreboard">
      <div class="end-block">
        <div class="end-block-label">${G.mpMode?'HOST':'YOUR'} SCORE</div>
        <div class="end-block-score">${inn1.runs}/${inn1.wickets}</div>
        <div class="end-block-detail">${getOvStr(inn1.balls)} overs</div>
      </div>
      <div class="end-block">
        <div class="end-block-label">${G.mpMode?'GUEST':'AI'} SCORE</div>
        <div class="end-block-score">${inn2.runs}/${inn2.wickets}</div>
        <div class="end-block-detail">${getOvStr(inn2.balls)} overs</div>
      </div>
    </div>
    <div class="end-margin">${marginText}</div>
    ${chipWinnerHTML}
    <div class="career-strip">
      <div class="career-stat"><div class="cs-val">${stats.played}</div><div class="cs-label">PLAYED</div></div>
      <div class="career-stat"><div class="cs-val" style="color:#4ade80">${stats.wins}</div><div class="cs-label">WINS</div></div>
      <div class="career-stat"><div class="cs-val" style="color:#e63946">${stats.losses}</div><div class="cs-label">LOSSES</div></div>
      <div class="career-stat"><div class="cs-val" style="color:var(--gold)">${winPct}%</div><div class="cs-label">WIN %</div></div>
      <div class="career-stat"><div class="cs-val" style="color:${stats.coins>=0?'#4ade80':'#e63946'}">${stats.coins>=0?'+':''}${stats.coins}</div><div class="cs-label">NET SP</div></div>
    </div>
    <div style="font-size:10px;color:var(--muted);text-align:center;opacity:0.5">SP = Skill Points · tracks your decision-making quality across sessions</div>

  </div>`;
}

  if(IS_PREVIEW) throw new Error('preview_blocked');
  const r = await fetch(`${DB_URL}/${path}.json`, {
    method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)
  });
  if(!r.ok) throw new Error('DB patch failed');
  return r.json();
}

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

// ── TWO INDEPENDENT TIMERS — never interfere ───────────────────────
let _hostTimer = null;  // host only: waits for guest pick
let _guestTimer = null; // guest only: master state machine

function _clearPolls() {
  if(_hostTimer)   { clearInterval(_hostTimer);   _hostTimer   = null; }
  if(_guestTimer)  { clearInterval(_guestTimer);  _guestTimer  = null; }
  if(_rejoinPollTimer) { clearInterval(_rejoinPollTimer); _rejoinPollTimer = null; }
  const notify = document.getElementById('rejoin-notify');
  if(notify) notify.remove();
}

// ── HOST PICK POLL ─────────────────────────────────────────────────
// Starts ONLY after host submits own pick. Polls until guest pick
// arrives, then immediately resolves. Never called for guest.
function _startHostPickPoll(code) {
  if(_hostTimer) clearInterval(_hostTimer);
  _hostTimer = setInterval(async () => {
    try {
      const ball = await dbGet(`rooms/${code}/ball`);
      if(!ball || ball.status !== 'picking') { clearInterval(_hostTimer); _hostTimer = null; return; }
      if(ball.hostPick && ball.guestPick) {
        clearInterval(_hostTimer); _hostTimer = null;
        await _mpHostResolveBall(code, ball);
      }
    } catch(e) {}
  }, 1500);
}

// ── GUEST MASTER POLL ──────────────────────────────────────────────
// Runs continuously for guest. Single function drives all state changes.
// No other polling needed for guest.
function _startGuestMasterPoll(code) {
  if(_guestTimer) clearInterval(_guestTimer);
  _guestTimer = setInterval(async () => {
    try {
      const ball = await dbGet(`rooms/${code}/ball`);
      if(!ball) return;

      const seq   = ball.seq ?? 0;
      const known = G.mpBallSeq ?? 0;

      // ── New ball available (host advanced) ──
      if(ball.status === 'picking' && seq > known) {
        G.mpBallSeq = seq;
        G.mpPickSubmitted = false;
        G.mpResultShown   = false;
        _syncGuestInnState(ball);
        if(G.currentInnings !== ball.inn) {
          G.currentInnings = ball.inn || 1;
          if(ball.inn === 2) {
            const amt = Math.min(G.overStakeAmt, G.coins.player);
            G.coins.player -= amt;
            G.overPot = amt;
          }
        }
        G.playerCard = null; G.playerChoice = null;
        G.phase = 'play';
        render();
        return;
      }

      // ── Result available (host resolved) ──
      if(ball.status === 'resolved' && ball.result && seq === known && !G.mpResultShown) {
        G.mpResultShown = true;
        _syncGuestInnState(ball);
        // Mark played cards
        const iPB = playerIsBatting();
        const myPickId  = ball.guestPick?.cardId;
        const oppPickId = ball.hostPick?.cardId;
        const myHand  = iPB ? G.pBatHand   : G.pBowlHand;
        const oppHand = iPB ? G.aiBowlHand : G.aiBatHand;
        if(myPickId)  { removeCardFromHand(myHand,  myPickId);  const r=myHand.find(c=>c.id===myPickId);  if(r) r._playedOutcome = ball.result.outcome; }
        if(oppPickId) { removeCardFromHand(oppHand, oppPickId); const r=oppHand.find(c=>c.id===oppPickId); if(r) r._playedOutcome = ball.result.outcome; }
        G.playerCard = null; G.playerChoice = null;
        G.lastResult = _reconstructResult(ball.result);
        showResultOverlay(G.lastResult);
        return;
      }

      // ── Innings swap ──
      if(ball.status === 'swap' && G.phase !== 'inningsSwap') {
        _syncGuestInnState(ball);
        G.phase = 'inningsSwap';
        render();
        return;
      }

      // ── Game end ──
      if(ball.status === 'end' && G.phase !== 'gameEnd') {
        clearInterval(_guestTimer); _guestTimer = null;
        _syncGuestInnState(ball);
        G.phase = 'gameEnd';
        render();
        return;
      }

    } catch(e) {}
  }, 1500);
}

function _syncGuestInnState(ball) {
  if(ball.inn1) {
    G.inn1.runs=ball.inn1.r??G.inn1.runs; G.inn1.wickets=ball.inn1.w??G.inn1.wickets;
    G.inn1.balls=ball.inn1.b??G.inn1.balls;
    if(ball.inn1.log) G.inn1.ballLog = ball.inn1.log;
  }
  if(ball.inn2) {
    G.inn2.runs=ball.inn2.r??G.inn2.runs; G.inn2.wickets=ball.inn2.w??G.inn2.wickets;
    G.inn2.balls=ball.inn2.b??G.inn2.balls;
    if(ball.inn2.log) G.inn2.ballLog = ball.inn2.log;
  }
}

function _ballInnState() {
  return {
    inn1: {r:G.inn1.runs, w:G.inn1.wickets, b:G.inn1.balls, log:G.inn1.ballLog},
    inn2: {r:G.inn2.runs, w:G.inn2.wickets, b:G.inn2.balls, log:G.inn2.ballLog},
  };
}

window.lobbyBack = function() { _clearPolls(); G.phase='home'; render(); };

// ── CREATE ROOM ────────────────────────────────────────────────────
window.createRoom = async function() {

    });

function _pollForGuestJoin(code) {
  if(_guestTimer) clearInterval(_guestTimer); // reuse guestTimer for pre-game polls
  _guestTimer = setInterval(async () => {
    try {
      const room = await dbGet(`rooms/${code}`);
      if(room && room.guestName) {
        clearInterval(_guestTimer); _guestTimer = null;
        G.mpOppName = room.guestName;
        G.mpStakeAmt = 0; G.phase = 'mpStakes'; render();
      }
