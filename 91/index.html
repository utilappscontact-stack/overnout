// ── REJOIN FLOW ────────────────────────────────────────────────────

// Guest: polls for host's decision (continue / restart)
function _pollForRejoinDecision(code) {
  if(_guestTimer) clearInterval(_guestTimer);
  _guestTimer = setInterval(async () => {
    try {
      const room = await dbGet(`rooms/${code}`);
      if(!room) return;
      if(room.rejoinDecision === 'continue') {
        clearInterval(_guestTimer); _guestTimer = null;
        // Restore guest game state from Firebase
        _guestRejoinContinue(room);
      } else if(room.rejoinDecision === 'restart') {
        clearInterval(_guestTimer); _guestTimer = null;
        // Full restart — host will re-init
        G.mpStatus = 'Restarting…'; G.phase = 'lobbyWaiting'; render();
        _pollForStakeAndPitch(code);
      } else if(room.rejoinDecision === 'denied') {
        clearInterval(_guestTimer); _guestTimer = null;
        G.mpStatus = 'err:Host declined the rejoin request.';
        G = newState(); G.mpStatus='err:Host declined the rejoin. Start a new game.';
        G.phase='lobby'; G.mpLobbyMode=null; render();
      }
    } catch(e) {}
  }, 2000);
}

// Guest: restore state after host says "continue"
function _guestRejoinContinue(room) {
  const ball = room.ball;
  const savedCode  = G.mpRoomCode;
  const savedName  = G.mpMyName;
  const savedOpp   = G.mpOppName;
  const savedStake = G.overStakeAmt || room.stakeAmt || 50;
  const savedBundle= room.bundleGuest;

  G = newState();
  G.mpMode=true; G.mpIsHost=false; G.mpRoomCode=savedCode;
  G.mpMyName=savedName; G.mpOppName=savedOpp;
  G.overStakeAmt=savedStake; G.mpStakeAmt=savedStake;
  G.pitch = PITCHES.find(p=>p.id===room.pitchId) || pick(PITCHES);
  G.playerPower = pick(POWERS);

  // Restore inn state
  if(ball) {
    G.mpBallSeq = ball.seq ?? 0;
    G.currentInnings = ball.inn || 1;
    _syncGuestInnState(ball);
  }

  // Rebuild decks from saved bundle
  const rebuildDecks = (val, isMine) => {
    let batIds=[], bowlIds=[];
    if(typeof val==='string') { const b=BUNDLES.find(b=>b.id===val); if(b){batIds=b.batIds;bowlIds=b.bowlIds;} }
    else if(val?.batIds) { batIds=val.batIds; bowlIds=val.bowlIds; }
    const bats  = batIds.map(id=>cloneCard(BATTER_CARDS.find(c=>c.id===id))).filter(Boolean);
    const bowls = bowlIds.map(id=>cloneCard(BOWLER_CARDS.find(c=>c.id===id))).filter(Boolean);
    if(isMine) { G.pBatDeck=bats; G.pBowlDeck=bowls; }
    else        { G.aiBatDeck=bats; G.aiBowlDeck=bowls; }
  };
  if(room.bundleGuest) rebuildDecks(room.bundleGuest, true);
  if(room.bundleHost)  rebuildDecks(room.bundleHost,  false);
  dealHands();

  // Mark already-played cards from ball log
  if(ball?.inn1?.log) ball.inn1.log.forEach(()=>{});// log exists — cards marked by host separately

  G.mpResultShown=true; // don't re-show old result
  G.mpPickSubmitted=false;
  G.phase = 'play'; render();
  _startGuestMasterPoll(savedCode);
}

// Host: poll for rejoin requests during the game (runs alongside _hostTimer)
let _rejoinPollTimer = null;
function _startRejoinPoll(code) {
  if(_rejoinPollTimer) clearInterval(_rejoinPollTimer);
  _rejoinPollTimer = setInterval(async () => {
    try {
      const room = await dbGet(`rooms/${code}`);
      if(room?.rejoinRequest && room.rejoinRequest !== G._lastRejoinSeen) {
        G._lastRejoinSeen = room.rejoinRequest;
        _showRejoinNotification(room.rejoinRequest, code);

  }, 3000);
}

window.hostRejoinDecision = async function(decision, code) {
  const notify = document.getElementById('rejoin-notify');
  if(notify) notify.remove();
  if(decision === 'continue') {
    await dbPatch(`rooms/${code}`, { rejoinDecision:'continue', rejoinRequest:null }).catch(()=>{});
    // Host continues — nothing changes for host
  } else if(decision === 'restart') {
    await dbPatch(`rooms/${code}`, { rejoinDecision:'restart', rejoinRequest:null, phase:'waiting', ball:null, pitchId:null, stakeAmt:0 }).catch(()=>{});
    // Host also restarts
    emergencyExit();
  } else {
    await dbPatch(`rooms/${code}`, { rejoinDecision:'denied', rejoinRequest:null }).catch(()=>{});
  }
};

// ── JOIN ROOM ──────────────────────────────────────────────────────
window.joinRoom = async function() {
  if(IS_PREVIEW) { G.mpStatus='err:Open the HTML file directly in your browser — not in a preview embed.'; render(); return; }
  if(!G.mpMyName) { G.mpStatus='err:Enter your name first'; render(); return; }
  const code = G.mpJoinInput.trim().toUpperCase();
  if(code.length !== 4) { G.mpStatus='err:Enter 4-letter code'; render(); return; }
  G.mpStatus='joining…'; render();
  try {
    const room = await dbGet(`rooms/${code}`);
    if(!room) { G.mpStatus='err:Room not found'; render(); return; }
    if(room.phase==='done') { G.mpStatus='err:That match has ended'; render(); return; }

    // ── REJOIN: game already in progress ──
    if(room.phase==='playing' && room.ball) {
      G.mpRoomCode = code; G.mpIsHost = false; G.mpMode = true;
      G.mpMyName = G.mpMyName || room.guestName || 'Guest';
      G.mpOppName = room.hostName || 'Host';
      G.mpStatus = 'ok';
      // Store rejoin info for the screens
      G.mpRejoinRoom = room;
      G.phase = 'mpRejoin'; render();
      // Signal host that guest wants to rejoin
      await dbPatch(`rooms/${code}`, { rejoinRequest: G.mpMyName, rejoinTime: Date.now() }).catch(()=>{});
      // Poll for host decision
      _pollForRejoinDecision(code);
      return;
    }

    // ── FRESH JOIN ──
    await dbPatch(`rooms/${code}`, { guestName: G.mpMyName, phase: 'ready' });
    G.mpOppName = room.hostName || 'Host';
    G.mpRoomCode = code; G.mpIsHost = false; G.mpMode = true;
    G.mpStatus = 'ok'; G.phase = 'lobbyWaiting'; render();
    _pollForStakeAndPitch(code);
  } catch(e) { G.mpStatus='err:'+e.message; render(); }
};

function _pollForStakeAndPitch(code) {
  if(_guestTimer) clearInterval(_guestTimer);
  _guestTimer = setInterval(async () => {
    try {
      const room = await dbGet(`rooms/${code}`);
      if(!room) return;
      if(room.stakeAmt && G.phase === 'lobbyWaiting') {
        G.mpStakeAmt = room.stakeAmt; G.phase = 'mpStakes'; render(); return;
      }
      if(room.stakeAmt && G.phase === 'mpStakes' && G.mpStakeAmt !== room.stakeAmt) {
        G.mpStakeAmt = room.stakeAmt; render();
      }
      if(room.pitchId && G.phase !== 'pitchReveal' && G.phase !== 'bundleSelect' && G.phase !== 'mpBundleWait') {
        clearInterval(_guestTimer); _guestTimer = null;
        _guestJoinGame(code, room);
      }
    } catch(e) {}
  }, 2000);
}

function _guestJoinGame(code, room) {
  const savedStake = G.overStakeAmt || G.mpStakeAmt || 50;
  const savedMyName = G.mpMyName;
  G = newState();
  G.mpMode=true; G.mpIsHost=false; G.mpRoomCode=code;
  G.overStakeAmt=savedStake; G.mpStakeAmt=savedStake;
  G.mpBallSeq=0; G.mpPickSubmitted=false; G.mpResultShown=false;
  G.mpMyName = savedMyName || room.guestName || 'Guest';
  G.mpOppName = room.hostName || 'Host';
  G.pitch = PITCHES.find(p=>p.id===room.pitchId) || pick(PITCHES);
  G.aiPower = pick(POWERS);
  G.phase = 'pitchReveal'; render();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const fi=document.querySelector('.flip-inner'); if(fi)fi.classList.add('flipped');
    setTimeout(()=>{ const h=document.querySelector('.pitch-tap-hint'); if(h)h.classList.add('show'); },800);
  }));
  // ⚠️ Do NOT poll for opponent bundle here.
  // Guest must go through pitchReveal → bundleSelect → bundleConfirm first.
  // _pollForOpponentBundle is started by _mpBundleSubmit after guest submits their own bundle.
}

// ── STAKES ─────────────────────────────────────────────────────────
function renderMpStakes() {
  const isHost=G.mpIsHost, selected=G.mpStakeAmt||0, opts=[50,100,200,500];
  const optsHTML=opts.map(v=>`<div class="mpstakes-opt${selected===v?' selected':''}${!isHost?' disabled-opt':''}"
    ${isHost?`onclick="mpStakeSelect(${v})"`:''}>🪙${v}</div>`).join('');
  const balance=G.coins?G.coins.player:1000;
  if(isHost) return `<div class="screen mpstakes-screen">
    <div class="mpstakes-title">SET MATCH STAKES</div>
    <div class="mpstakes-sub">How many SP per innings? Both put in — winner takes.</div>
    <div class="mpstakes-grid">${optsHTML}</div>
    <div class="mpstakes-balance">Your balance: 🪙${balance}</div>
    <button class="mpstakes-confirm" onclick="mpStakeConfirm()" ${selected?'':'disabled'}>CONFIRM STAKES →</button>
  </div>`;
  return `<div class="screen mpstakes-screen">
    <div class="mpstakes-title">MATCH STAKES</div>
    <div class="mpstakes-sub">Host is setting stakes…</div>
    ${selected
      ? `<div class="mpstakes-opt selected" style="width:120px;margin:0 auto">🪙${selected}</div>
         <div class="mpstakes-balance">Your balance: 🪙${balance}</div>
         <button class="mpstakes-confirm" onclick="mpStakeConfirm()">ACCEPT & PLAY →</button>`
      : `<div class="mpstakes-waiting">Waiting for host to pick stakes…</div>`}

}

window.mpStakeSelect = function(amt) {
  if(!G.mpIsHost) return;
  G.mpStakeAmt=amt; render();
  if(G.mpRoomCode) dbPatch(`rooms/${G.mpRoomCode}`,{stakeAmt:amt}).catch(()=>{});
};

window.mpStakeConfirm = function() {
  if(!G.mpStakeAmt) return;
  G.overStakeAmt = G.mpStakeAmt;
  _clearPolls();
  if(G.mpIsHost) {
    const code=G.mpRoomCode, stake=G.overStakeAmt;
    initGame(); // picks pitch, sets G.phase='pitchReveal'
    // Restore MP state lost in initGame/newState
    G.mpMode=true; G.mpIsHost=true; G.mpRoomCode=code;
    G.overStakeAmt=stake; G.mpStakeAmt=stake;
    G.mpBallSeq=0; G.mpPickSubmitted=false; G.mpResultShown=false;
    dbPatch(`rooms/${code}`,{stakeAmt:stake,pitchId:G.pitch.id,phase:'playing'}).catch(()=>{});
  } else {
    const code=G.mpRoomCode, stake=G.overStakeAmt;
    dbPatch(`rooms/${code}`,{guestStakeOk:true}).catch(()=>{});
    // Guest: wait for pitchId to appear
    G.mpStatus='Waiting for host…'; G.phase='lobbyWaiting'; render();
    _pollForStakeAndPitch(code);
  }
};

// ── BUNDLE SELECT (MP paths) ───────────────────────────────────────
// bundleConfirm() is in the game logic section — MP path here:
window._mpBundleSubmit = async function(bundleKey, payload) {
  const code = G.mpRoomCode;
  await dbPatch(`rooms/${code}`, {[bundleKey]: payload}).catch(()=>{});
  _pollForOpponentBundle(code);
};

function _pollForOpponentBundle(code) {
  // Safety: guest must have their own decks before we look for opponent's
  if(!G.mpIsHost && (!G.pBatDeck || G.pBatDeck.length === 0)) {
    console.warn('_pollForOpponentBundle called before guest picked squad — ignored');
    return;
  }
  if(_guestTimer) clearInterval(_guestTimer);
  _guestTimer = setInterval(async () => {
    try {
      const room = await dbGet(`rooms/${code}`);
      if(!room) return;
      const oppKey = G.mpIsHost ? 'bundleGuest' : 'bundleHost';
      if(!room[oppKey]) return;
      clearInterval(_guestTimer); _guestTimer = null;
      // Build opponent decks
      const val = room[oppKey];
      const makeDecks = (batIds, bowlIds) => {
        G.aiBatDeck  = batIds.map(id=>cloneCard(BATTER_CARDS.find(c=>c.id===id))).filter(Boolean);
        G.aiBowlDeck = bowlIds.map(id=>cloneCard(BOWLER_CARDS.find(c=>c.id===id))).filter(Boolean);
      };
      if(typeof val === 'string') {
        const b = BUNDLES.find(b=>b.id===val);
        if(b) makeDecks(b.batIds, b.bowlIds);
      } else if(val.batIds && val.bowlIds) {
        makeDecks(val.batIds, val.bowlIds);
      }
      // Deal and proceed
      G.phase='deal'; render();
      setTimeout(()=>{
        dealHands();
        const cards=[...document.querySelectorAll('.deal-mini')];
        cards.forEach((c,i)=>setTimeout(()=>c.classList.add('dealt'),i*120));
        G.playerPower=pick(POWERS); G.selectedPowerIdx=POWERS.indexOf(G.playerPower);
        setTimeout(()=>{ G.phase='overStake'; render(); }, cards.length*120+800);
      },100);
      // Guest: start master poll; host: nothing yet (waits until game ball is written)
      if(!G.mpIsHost) {
        setTimeout(()=>_startGuestMasterPoll(code), 2000);
      }
    } catch(e) {}
  }, 2000);
}

// ── CONFIRM PICK (MP path) ─────────────────────────────────────────
// Called from confirmPick() in game logic when G.mpMode===true
window._mpConfirmPick = async function(cardId, choice) {
  const code = G.mpRoomCode;
  const myKey = G.mpIsHost ? 'hostPick' : 'guestPick';
  try {
    await dbPatch(`rooms/${code}/ball`, {[myKey]: {cardId, choice}});
  } catch(e) { console.error('pick write failed', e); }
  G.mpPickSubmitted = true;
  G.phase = 'mpWaiting'; render();
  if(G.mpIsHost) _startHostPickPoll(code);
  // Guest: master poll already running, will see 'resolved' when ready
};

// ── HOST RESOLVE BALL ──────────────────────────────────────────────
async function _mpHostResolveBall(code, ball) {
  try {
    const hostIsBatting = G.currentInnings === 1;
    const batterPick = hostIsBatting ? ball.hostPick : ball.guestPick;
    const bowlerPick = hostIsBatting ? ball.guestPick : ball.hostPick;
    if(!batterPick || !bowlerPick) { G.phase='play'; render(); return; }

    const findBat  = id => G.pBatHand.find(c=>c.id===id)||G.aiBatHand.find(c=>c.id===id)||cloneCard(BATTER_CARDS.find(c=>c.id===id));
    const findBowl = id => G.pBowlHand.find(c=>c.id===id)||G.aiBowlHand.find(c=>c.id===id)||cloneCard(BOWLER_CARDS.find(c=>c.id===id));

    const batCard  = findBat(batterPick.cardId);
    const bowlCard = findBowl(bowlerPick.cardId);
    if(!batCard||!bowlCard) { G.phase='play'; render(); return; }

    const inn = getCurrentInn();
    const overBall = (inn.balls%6)+1;
    const prev = inn.ballLog.length>0 ? inn.ballLog[inn.ballLog.length-1] : {};
    const bDice=rollDie(), wDice=rollDie();

    const result = resolveBall({
      batterCard:batCard, shot:batterPick.choice,
      bowlerCard:bowlCard, delivery:bowlerPick.choice,
      batterDice:bDice, bowlerDice:wDice,
      pitch:G.pitch, homeGround:false,
      overBall, prevOutcome:prev.outcome||null,
      batterBallsPlayed:inn.batterBallsPlayed||0,
      prevShot:prev.shot||null, prevDelivery:prev.delivery||null,
    });

    // Update local inn state
    inn.runs+=result.runs; if(result.isWicket)inn.wickets++;
    inn.balls++; inn.batterBallsPlayed=(inn.batterBallsPlayed||0)+1;
    inn.deliveriesUsed[bowlerPick.choice]=(inn.deliveriesUsed[bowlerPick.choice]||0)+1;
    inn.shotsUsed[batterPick.choice]=(inn.shotsUsed[batterPick.choice]||0)+1;
    if(bowlerPick.choice==='Bouncer') inn.bouncerChips=Math.max(0,inn.bouncerChips-1);
    inn.ballLog.push({ball:inn.balls,outcome:result.outcome,runs:result.runs,shot:result.shot,delivery:result.delivery});

    // Mark played cards
    const myId   = hostIsBatting ? batterPick.cardId : bowlerPick.cardId;
    const oppId  = hostIsBatting ? bowlerPick.cardId : batterPick.cardId;
    const myHand = hostIsBatting ? G.pBatHand   : G.pBowlHand;
    const oppHand= hostIsBatting ? G.aiBowlHand : G.aiBatHand;
    removeCardFromHand(myHand, myId);  const mr=myHand.find(c=>c.id===myId);  if(mr)mr._playedOutcome=result.outcome;
    removeCardFromHand(oppHand,oppId); const or=oppHand.find(c=>c.id===oppId); if(or)or._playedOutcome=result.outcome;

    G.playerCard=null; G.playerChoice=null; G.aiCard=null; G.aiChoice=null;
    G.lastResult=result; G.batterDice=bDice; G.bowlerDice=wDice;

    // Write resolved state to Firebase
    const fbResult = {
      outcome:result.outcome, runs:result.runs, isWicket:result.isWicket,
      batterCardId:batCard.id, bowlerCardId:bowlCard.id,
      shot:result.shot, delivery:result.delivery, effectiveDelivery:result.effectiveDelivery,
      batterDice:bDice, bowlerDice:wDice, bDiceMod:result.bDiceMod, wDiceMod:result.wDiceMod,
      matchupMod:result.matchupMod, batSpecial:result.batSpecial, bowlSpecial:result.bowlSpecial,
      bRating:result.bRating, wRating:result.wRating,
      batterTotal:result.batterTotal, bowlerTotal:result.bowlerTotal,
      difference:result.difference, patternPenalty:result.patternPenalty, ftPunish:result.ftPunish,
      commentary:result.commentary, balanceNote:result.balanceNote, specialNote:result.specialNote,
    };

    await dbSet(`rooms/${code}/ball`, {
      seq: G.mpBallSeq, status:'resolved', inn:G.currentInnings,
      hostPick:ball.hostPick, guestPick:ball.guestPick,
      result:fbResult, ..._ballInnState(),
    });

    G.phase='play'; showResultOverlay(result);

  } catch(err) {
    console.error('Resolve error:', err);
    G.phase='play'; render();
  }
}

// ── HOST DISMISS RESULT → next ball ────────────────────────────────
window._mpHostAdvance = async function() {
  const code = G.mpRoomCode;
  const inn = getCurrentInn();
  if(isInnOver(inn)) {
    settleOverPot();
    if(G.currentInnings===1) {
      const nextSeq=(G.mpBallSeq||0)+1; G.mpBallSeq=nextSeq;
      await dbSet(`rooms/${code}/ball`,{seq:nextSeq,status:'swap',inn:1,..._ballInnState()}).catch(()=>{});
      G.phase='inningsSwap'; render();
    } else {
      const nextSeq=(G.mpBallSeq||0)+1; G.mpBallSeq=nextSeq;
      await dbSet(`rooms/${code}/ball`,{seq:nextSeq,status:'end',inn:2,..._ballInnState()}).catch(()=>{});
      await dbPatch(`rooms/${code}`,{phase:'done'}).catch(()=>{});
      G.phase='gameEnd'; render();
    }
  } else {
    const nextSeq=(G.mpBallSeq||0)+1; G.mpBallSeq=nextSeq;
    G.mpResultShown=false; G.mpPickSubmitted=false;
    await dbSet(`rooms/${code}/ball`,{
      seq:nextSeq, status:'picking', inn:G.currentInnings,
      hostPick:null, guestPick:null, result:null, ..._ballInnState(),
    }).catch(()=>{});
    G.phase='play'; render();
  }
};

// Host startInnings2 — write ball node for inn2
window._mpHostStartInn2 = async function() {
  G.currentInnings=2;
  G.playerCard=null; G.playerChoice=null; G.aiCard=null; G.aiChoice=null;
  const amt=Math.min(G.overStakeAmt,G.coins.player);
  G.coins.player-=amt; G.overPot=amt;
  const nextSeq=(G.mpBallSeq||0)+1; G.mpBallSeq=nextSeq;
  G.mpResultShown=false; G.mpPickSubmitted=false;
  await dbSet(`rooms/${G.mpRoomCode}/ball`,{
    seq:nextSeq, status:'picking', inn:2,
    hostPick:null, guestPick:null, result:null,
    inn1:{r:G.inn1.runs,w:G.inn1.wickets,b:G.inn1.balls,log:G.inn1.ballLog},
    inn2:{r:0,w:0,b:0,log:[]},
  }).catch(()=>{});
  G.phase='play'; render();
};

// ── FIRST BALL: Host writes initial ball node after overStake ──────
// Called from overStakeConfirm in the SP flow but MP needs to write the
// initial ball node when inn1 starts
window._mpHostInitBall = async function() {
  if(!G.mpIsHost) return;
  const code = G.mpRoomCode;
  G.mpBallSeq = 0;
  await dbSet(`rooms/${code}/ball`,{
    seq:0, status:'picking', inn:1,
    hostPick:null, guestPick:null, result:null,
    inn1:{r:0,w:0,b:0,log:[]}, inn2:{r:0,w:0,b:0,log:[]},
  }).catch(()=>{});
  // Clear any stale rejoin signals
  await dbPatch(`rooms/${code}`,{rejoinRequest:null,rejoinDecision:null}).catch(()=>{});
  // Start listening for reconnect requests
  _startRejoinPoll(code);
};

// ── LOBBY SCREENS ──────────────────────────────────────────────────
function renderLobbyWaiting() {
  const code=G.mpRoomCode||'----';
  const msg=G.mpIsHost
    ?'Share this code — waiting for opponent to join'
    :(G.mpStatus&&G.mpStatus!=='ok'?G.mpStatus:'Connected! Waiting for host…');
  return `<div class="screen lobby-screen">
    <div class="lobby-title">${G.mpIsHost?'ROOM CREATED':'JOINED!'}</div>
    <div class="lobby-code-label">ROOM CODE</div>
    <div class="lobby-code-display">${code}</div>
    <div class="lobby-waiting">${msg}</div>
    <div class="lobby-back" onclick="emergencyExit()">← BACK TO HOME</div>
  </div>`;
}

function renderLobby() {
  const mode=G.mpLobbyMode, status=G.mpStatus||'';
  const statusHTML=status.startsWith('err:')
    ?`<div class="lobby-status err">${status.slice(4)}</div>`
    :status&&status!=='ok'?`<div class="lobby-status ok">${status}</div>`:'';
  const nameInput=()=>`
    <div style="width:100%;max-width:280px;margin-bottom:8px">
      <div style="font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:5px">YOUR NAME</div>
      <input class="lobby-input" type="text" maxlength="16" placeholder="Enter your name…"
             oninput="lobbyNameChange(this.value)" value="${G.mpMyName||''}"
             autocomplete="off" autocorrect="off" spellcheck="false" style="margin-bottom:0"/>
    </div>`;

  if(!mode) {
    const previewBanner=IS_PREVIEW?`<div style="background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);border-radius:6px;padding:10px 14px;font-size:11px;color:#fbbf24;text-align:center;max-width:280px;line-height:1.5">⚠️ Open the HTML file directly in Chrome/Safari — multiplayer won't work in a preview embed.</div>`:'';
    return `<div class="screen lobby-screen">
      <div class="lobby-title">MULTIPLAYER</div>
      <div class="lobby-sub">Play a friend — both need this page open.</div>
      ${previewBanner}
      ${nameInput()}
      <div class="lobby-btn-row">
        <button class="lobby-btn create" onclick="setLobbyMode('create')">CREATE<br>ROOM</button>
        <button class="lobby-btn join"   onclick="setLobbyMode('join')">JOIN<br>ROOM</button>
      </div>
      <div class="lobby-back" onclick="lobbyBack()">← BACK TO HOME</div>
    </div>`;
  }
  if(mode==='create') return `<div class="screen lobby-screen">
    <div class="lobby-title">CREATE ROOM</div>
    ${nameInput()}
    ${statusHTML}
    <button class="lobby-btn create" onclick="createRoom()" style="max-width:200px;width:100%">GENERATE CODE</button>
    <div class="lobby-back" onclick="setLobbyMode(null)">← BACK</div>
  </div>`;
  if(mode==='join') return `<div class="screen lobby-screen">
    <div class="lobby-title">JOIN ROOM</div>
    ${nameInput()}
    <div style="font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:5px;width:100%;max-width:280px">ROOM CODE</div>
    <input class="lobby-input" type="text" maxlength="4" placeholder="CODE"
           oninput="lobbyInputChange(this.value)" value="${G.mpJoinInput||''}"
           autocomplete="off" autocorrect="off" spellcheck="false"/>
    ${statusHTML}
    <button id="lobby-join-btn" class="lobby-btn join" onclick="joinRoom()"
            style="max-width:200px;width:100%" ${(G.mpJoinInput||'').length===4?'':' disabled'}>JOIN →</button>
    <div class="lobby-back" onclick="setLobbyMode(null)">← BACK</div>
  </div>`;
  return renderHome();
}

// ── MP WAITING SCREENS ─────────────────────────────────────────────
function _mpHomeBtn(label) {
  return `<button onclick="emergencyExit()" style="
    margin-top:12px;background:rgba(255,255,255,0.05);color:var(--muted);
    border:1px solid rgba(255,255,255,0.12);border-radius:8px;
    font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;
    padding:10px 20px;cursor:pointer;width:100%;max-width:240px">
    ← ${label||'BACK TO HOME'}
  </button>`;
}

function renderMpBundleWait() {
  return `<div class="screen lobby-screen" style="gap:20px">
    <div class="lobby-title">SQUAD LOCKED 🔒</div>
    <div class="lobby-sub">Waiting for <b style="color:var(--gold)">${G.mpOppName||'opponent'}</b> to pick…</div>
    <div class="mpw-spinner">⏳</div>
    <div style="font-size:11px;color:var(--muted)">Room: <b>${G.mpRoomCode}</b></div>
    ${_mpHomeBtn('ABANDON')}
  </div>`;
}
function renderMpWaiting() {
  const inn=G.currentInnings===1?G.inn1:G.inn2, ballNum=Math.min(inn.balls+1,6);
  return `<div class="screen lobby-screen" style="gap:20px">
    <div class="lobby-title">PICK LOCKED 🔒</div>
    <div class="lobby-sub" style="font-size:14px">Ball ${ballNum} of 6<br>Waiting for <b style="color:var(--gold)">${G.mpOppName||'opponent'}</b>…</div>
    <div class="mpw-spinner">🤔</div>
    <div style="font-size:11px;color:var(--muted)">Your pick is submitted</div>
    ${_mpHomeBtn('ABANDON')}
  </div>`;
}
function renderMpWaitingResult() {
  return `<div class="screen lobby-screen" style="gap:20px">
    <div class="lobby-title">BOTH PICKED!</div>
    <div class="lobby-sub">Resolving ball…</div>
    <div class="mpw-spinner" style="animation:mpSpin 1s linear infinite">🎲</div>
    ${_mpHomeBtn('ABANDON')}
  </div>`;
}
function renderMpWaitingContinue() {
  return `<div class="screen lobby-screen" style="gap:20px">
    <div class="lobby-title">BALL DONE</div>
    <div class="lobby-sub">Waiting for <b style="color:var(--gold)">${G.mpOppName||'host'}</b> to continue…</div>
    <div class="mpw-spinner">⏳</div>
    ${_mpHomeBtn('ABANDON')}
  </div>`;
}
function renderMpRejoin() {
  const room=G.mpRejoinRoom||{}, ball=room.ball||{}, inn1=ball.inn1||{r:0,w:0,b:0}, inn=ball.inn||1;
  const scoreStr=inn===1?`${inn1.r}/${inn1.w} (${inn1.b} balls)`:`Chasing ${(inn1.r||0)+1}`;
  return `<div class="screen lobby-screen" style="gap:16px">
    <div class="lobby-title">RECONNECT</div>
    <div class="lobby-sub">Match in progress · Room <b style="color:var(--gold)">${G.mpRoomCode}</b></div>
    <div style="background:rgba(212,165,72,0.08);border:1px solid rgba(212,165,72,0.2);
                border-radius:10px;padding:14px 18px;text-align:center;width:100%;max-width:280px">
      <div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:4px">LIVE SCORE</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold)">
        Inn${inn} · ${scoreStr}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px">vs ${G.mpOppName||'Host'}</div>
    </div>
    <div style="font-size:12px;color:var(--muted);text-align:center;line-height:1.6;max-width:260px">
      Waiting for <b style="color:var(--white)">${G.mpOppName||'host'}</b><br>to accept your rejoin…
    </div>
    <div class="mpw-spinner">⏳</div>
    ${_mpHomeBtn('CANCEL REJOIN')}
  </div>`;
}
function renderMpRejoinHost() { return renderPlay(); }
function _escapeBtn() {
  return `<div onclick="emergencyExit()" style="font-size:9px;color:rgba(255,255,255,0.12);cursor:pointer;padding:4px 6px">⟨ exit</div>`;
}

// Reconstruct result from Firebase data
function _reconstructResult(fr) {
  const batCard=BATTER_CARDS.find(c=>c.id===fr.batterCardId)||{id:fr.batterCardId,name:'?',rating:fr.bRating||3,type:'batter'};
  const bowlCard=BOWLER_CARDS.find(c=>c.id===fr.bowlerCardId)||{id:fr.bowlerCardId,name:'?',rating:fr.wRating||3,type:'bowler'};
  return {...fr, batterCard:batCard, bowlerCard:bowlCard};
}
